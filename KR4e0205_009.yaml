body:
  text: 海壑吟稿卷九明趙完璧撰髙八姐傳髙八姐者膠東鴻臚南泉翁季媛早孤鞠於匡慈匡出憲長公淑源有自孀閨風節蒸以性成古列史種種默識溫然良璞在韞也及適密也礪山進士之仲子管二元者閫儀雅慰堂室戒二元緝學勵行光休維奕及二元遊虎闈省鄢陵而東值餘疴未殄嚴霙野飇長征遄勞黧然頽然幾不獲稅駕故密八姐一睇震惶神爽飛越即趣赴膠幸圖餌砭盧扁察而謝焉八姐審不可為飛悉宦所阿姑星戴以還二元劇且慰薄請金遺别八姐不忍忤泣懷之無何罄珥飾暨二元堂授備以札歸姑前一號投頓彌日乃蘇諸莫諳故二元尋就含八姐掩罔知潛自密經衆亟索釋之二元少蘇聞故求閲嗟痛久之遂幽約會合越日棄客八姐自二元報革即不甘食至是憊餒彌甚伺間三死未果五日哭不輟泣盡音竭待斃而已或以寡姊之生例解焉乃懊憤曰吾方寸事已定為常識拂擾憐我者愧我深矣天云墜不徒作未亡人若阿姊撫有襁孤用延線緒是可無死管無遺育其誰與圖存荀氏之緩已為下策為身防者吾衷且叵窺焉遂絶水飲僵卧不起凡六日母姑泣勸直一沾潄即吐曰起若兒吾可食矣五內蒸灼舌燥以稿齒漸以脫骨立容毁母憐之曲為調攝覬少延焉八姐矉謂逆已兒以死慰以生忌也匪石之心徒爾勞益我苦耳再逾日厥息寖微暢然曰今果貞初志愧二懷也一節有終從容為諸骨肉訣無憾矣乃殁時嘉靖辛酉閏五月之草一日越二元之殂其浹辰也八姐以草一卺合甫三祀萃涣靡常恩愛幾何管之宦裕可以溫飽髙之雄宗科名儒俊可以終賴矧古今奪志之權抑亦不鮮八姐沖年弱質乃能精識茂見就死不易青女炎烏超氛埃而特烈美丈夫弗逮也英皇之死有商均焉死而過也叔姬存紀無裔緒焉過而生也徇義蔑生邈焉其罕嫓矣夫海壑子棲遑溟曲厭衰頽久矣駭聞而槩紀之用彰聖化表堅貞勵靡風也異時備良史薄采張老傳張老者不知山左何許人亦不悉其名字但東人率以老張稱之性敦朴鄙嗇鮮以賄交人多與其厚而賤其吝也適有惡少往訪之堅拒不應索之亟力拉於庭瞬息格殺而出至門驚惶莫措踟蹰而言曰我將焉往觸其門者再俄亦仆斃少焉張漸蘇以生惡少竟以死矣候徼特聲惡少之死絶不允張先見殺惡少因以自殘也聽者卒以相毆鞫煅抵死雖屢録未決其誰能輕脫之噫始以無故之死而人自償我繼以不死之故而我顧償人寃哉雖然惡少之死其究也貪而忿無足罪者張之死而生生而死得非蓄祟其身嗇囮其纍耶蠨蛸傳蠨蛸搆羅牖側大才若杯局狹而縷微僅以困蠛蠓蚊蚋即為巨充曷敢橫異圖哉伏匿羅際用需來者會有飛蠅卒悮觸之窘鳴間蠨蛸震慰望表速前以承天隕既而所以為具與力尋集私揆忽復却目伺之罔措中殆幸以一獲蠅鼓翼奮躍極力蹴踏小羅旋空而脫蠨蛸亦隨蕩越相失海壑子嗢噱歎曰微質也本不足以制宏幸覬也竟顧以滅家小而謀大曷可不程懵以幸免者其戒諸古粧鏡記先大夫收春翁博洽好古正德間宦遊開封曽購獲一古粧鏡背銀黧而寖玄朱翠斑駁銘字宛然余竊愛慕先大夫因以畀之余敬承良用珠櫝未暇考究嘉靖乙酉之十月曝日短簷漫閲菊坡叢話適有宋景德間軍人楊起於鳳州遁赤山郭家崖下洞穴中入見有石鏡臺一座鏡圓五寸背鑄水族回環有三十二字云煉形神冶瑩質良工當眉寫翠對臉傅紅如珠出匣似月停空綺忩繡幌俱涵影中方取鏡聞後有風雨聲既出洞則鏡存而匣爛矣詳是粧鏡不知何代文義甚佳惜不見於文集而獨見於郡志故傳録之以補欵識之一云注出學齋占畢也閲既掩而嘆曰有是哉相遇之竒也其所述規迹文字相質無舛但中二聨與鏡文差越前後想亦當時紀録誤耳及再考博古圖形製有大小之異文字有多寡之殊皆云自漢不可證據大抵世久傳誤誠難得真即今存者是則庶可以徵諸傳非也謂為漢製亦宜噫器物之在天地間如金石類者歷古今遭常變寓隱顯如絮流風如萍渙水惡知其有定在耶要不可以意圖而力致乃者傳之古汴者越千里而歸於吾室藏之先人者於諸昆而遺之不肖况入洞以前楊起以後歷年幾世傳經幾手雖紀於學齋時亦不識此鏡攸寓纂於菊翁時亦徒慕此鏡芳聲耳今宛在兹物雖微理數存焉不亦良可幸矣乎乙丑秋慎修兒舉進士出令鹽瀆以便省歸余會倦於家政悉付諸郎而是鏡特授之慎修以方民社攸歸觀人觀已之間足為明法厥意滋深豈徒傅紅寫翠已哉其繹之其世守之海壑翁識書諸子姪自社引我列祖諸丘壠皆在南山下去城百里時祀維艱自先大夫欲遷之不果而逝以是先大夫卜葬城南之二里許諸兄弟相繼而亡序昭從之子孫之拜掃者始便於時又趨赴各異萃合無常情雖同而禮不一甚非所以睦下而事上也隆慶辛未冬會慎修兒以兵曹郎送婦喪歸懷慎姪相與議其事以質於余適符吾志因可其言遂集諸子姪世恩堂而教之曰奉先惟孝不以禮非孝也孔子曰生事之以禮死葬之以禮祭之以禮吾於爾生事葬祭無容喙矣而祭祀之儀得無諭焉已乎搆祠未竟况晦翁家禮已有成式亦將待時舉行姑以墳祀論之昔我尼甫亦不以為非春秋已為野祭而東漢初遂成俗焉繼今不可不遵古奉先以立吾家之準也月為三會會有常品因人以序齒無越酌家以出資有差掌握一人每嵗時致祀預委一二幼而才者置之於吾父為尊祖之義特一具雖豐而不為奢於爾等親為追慕之均雖殺而亦必成禮禮竟而合享之著為定式似於逝者粗有常制而生者又不可無常訓焉每會畢除宦遊者不遑考問官守徐圖寄勉其餘士農商賈必詢其課某業作某田居行某貨學業進而家道亨及安常生理者則誘掖之誦美之其有頽惰不才驕橫非禮者勸戒之再三不率將必痛懲之期爾善斯安矣倘終不悛恐非吾門子弟也然又或别有處焉是會也遵行無怠孝思可謂有永而義訓不為無方泉臺慰血食之休子弟樂中才之養淑厥家而風厥俗不亦善乎噫吾兄弟五人長兄南泉享年四十有一遺孟焕次兄春泉享年七十有五遺之藺之蘇之范之蔡之琴四弟介泉享年五十有一遺懷慎懷貞懷禮懷明懷逺五弟垂璧享年四十有二遺懷中豫今年七十有二子三人慎修慎幾慎動俱已成立但吾之內外同胞零落已盡而龍鍾衰老頽然獨存幸年齡之過望顧骨肉之不相及可勝悼哉所冀吾兒當喜懼之年宜愛日以承歡諸子向無天之期敦猶父以悲慶趨耄之論恐不足以悚清狂然垂老之年亦或可以繫骨肉也其恪循之尚期不替代撰明威將軍匡公墓志銘隆慶庚午夏五月十九日詔進階明威將軍署指揮僉事匡公卒越年冬余將還任京師其孤受爵衰絰踵門捧同年公弟兵科給事匡君松野所狀行實丐余志銘余不忍辭按狀公諱天倫伯仁字北田號也仰遡遙宗故魯匡卜勾須後初寓海州及七世祖以兵徙贛榆之赤澗里祖福者值元末之亂志奮廓清却偽吳元帥之授歸翊我太祖髙皇帝茂樹竒績纍封東萊副千戶子德移鎮膠州尋以功擢正秩遂世守兹郡德生濟濟生英英生勳勳生允中弗嗣允道以次弟承之實生公焉公賦性頴異器度豁如敬修厥職忠勇之略不忝先世參涉書史古儒將風烈也屯田海上利裕軍需提旅京師勤勞屢效分甘恤苦士卒樂附伈伈有禮以遇鄉人敦睦宗族惠愛優渥其有負愆自暴者則務規於善嘗歷圖先像纂製譜牒奕世英風宛然在目豈徒光美前烈而照激後昆之意殊為深切憫伯父之女於孤貧雖及其嗣而弗怠全伯母之姪於荒歉終始賙恤恆情所難普濟於無私垂恩於罔報仁人君子之心推而無所不至者殆不可以縷數也公生於正德丁卯九月初一日距奄棄之期享年六十有四配吳氏贈宜人繼李氏封宜人男三人長受爵正千户三薦武闈一占鄉解總戎即墨赫然有聲時亦有上之帝廷者佇膺異寵次受業補弟子員次受誥尚幼女二長適本所正千戶汪士𢎞次適士人髙一夔孫五人曰持曰極甫成童進學未艾曰揚曰擇曰拱尚幼孫女八長適本州士人紀國瑞次適國子生郭景完次聘庠生劉漢嗣宋一魁次聘千戶應襲劉肇基次聘楊時春餘幼在室辛未冬十一月二十有六日甲申葬於州之郊南髙卓山銘曰桓桓神武輝昭厥祖仁勇性生帝臣維虎維世之英維國之楨于朝有紀于鄉有評長眠南畝佳城不朽大樹蕭蕭攸欽彌久巔如相望白雲渺茫海山休逸萬古無疆髙麗硯銘英英紫玉渺渺滄波貞歸華夏契結賢科龍光香靄澤潤江河登瀛竒選百戰良多補天髙節五色靡過水旌厥信無胥緇磨宣和硯銘真確懿質漸磨惟良文林竒品世寶彌光來自宣和其獲也有隕究自御用其歸也靡常又硯銘貞而固也不磷溫而潤也近仁依之朝夕翰墨崇勳磨之嵗月輝光日新允斯文之良友其子孫之世珍也夫收春先大夫暨先母恭人髙氏行狀先君諱從龍子雲其字收春其别號也世家膠西生而穎異有竒識鄉人竒之以為先大父未揚之報先大父諱本字宗源績學種德純雅君子𢎞治間有司貢禮曹輒厭奔趨歸頥天和因授先君以易學先君甫弱冠義理精深文詞俊逸金陵沈公鍾督學海上一試大竒之極加題品才識迥超塵俗稟賦優出倫儕殆鳳毛出色者也取冠膠庠先叔亦列上第兄弟一日隱然名動齊魯先大父一喜而殞沈為之震悼命有司禮葬東人恆為美談我先君居喪哀毁弗勝哭嘗嘔血葬之日先是祖塋去膠南百里先君狹之迤南百餘步别創新域沙水特秀遂改遷我髙祖以我先大父合敘於穆北遷之舉雖有志焉未敢卒議至𢎞治戊午先君領鄉薦凡五謁南宫不遇辛未以太母夫人就衰乃即銓曹簡判開封水任是寄先君阻絶姦貪大革弊政行所無事水政修焉始塞荆隆再完銅瓦繼而羅蔔張口之患尋已焉凡三大工皆前哲歷歲所難而先君以初仕次第就緒且復隄防疏導民安而運利數十年間皆先君子之力也專職之外且多造官舫以便度廣修廨署以便公慨包老之祠嵗久卑隤一新焕美神妥而人安之斷獄則公無私託法無寃民雖異境疑獄莫不懇請當道以趨速理凶頑無知釋讎息忿皆棄利敦德有藏我先君之主而報祀者彌久不衰也正德壬申大河南北流賊猖獗當道殷憂乃於先君倚任不二兵馬大政一時偕歸早夜憂遑用圖報稱大購駿馬廣募驍雄旬日之間軍聲大振且調遣有方輸餉不匱是用𠞰絶鯨鯢以濟平定之功又嘗行寓屬邑賊勢突至方經殘破城無完堵先君通夕率理達旦俱興居民賴全河北渠魁裴昆者諸帥攻之久而不下我先君外張兵以窘其勢內遣使以讋其衷不血一刃元凶授首河非以寧撫臣鄧公璋歷試諸勛既偕衆以聨揚復特章而超薦其略曰轉輸效勞督調有策才力既贍勤苦亦多而中丞劉公承華御史陸公鰲李公元皆以賢能交薦六年之間凡五疏焉丙子春擢二武昌士林歌誦以華其行曰導水疏壅曰作舟利涉曰平分寃獄曰增壘禦防曰募勇得人曰智獲渠魁曰轉輸效勞曰督調紆策今猶未泯也度江而南當道嘉其廉能吏民懷其威德三月之間聲動江漢丁丑春先以不狎媚恱中傷萋菲拂衣而東士民嗟泣上下挽不可留侍御王公度有舍斯人其孰與理之嘆行之日方舟琴書殊無長物來歸海上蕭然灑然黃犢在畝青襟在孰偕三五同志髙年酣觴賦詩陶寫林壑以終天年嘗喜詠未老得間真是間及回看官爵是泥沙之句謂古人良不我誣也隱念宗族之流離貧困者招輯而慰恱之老弱有養壯者有給一身蔭庇靡所不至蓋恆以祖宗為心平仲文正為法也嘗置一宅第故主悲愴不能舍去輒留之不令遽徙撫諭之久仍益金帛以悅其意有揚州士人自東海來者病瘡窮途垂死蕭寺賙恤生全輿馬遣歸南北美之嘉靖乙酉東方大疫叔父分訓潞庠子病於家不至殞絶者特一息耳先君日夜憫撫哀禱之曰我先君育我兩人吾子有五而弟惟兹一焉吾老矣復何為願以身代以永弟傳以慰先人於地下鄉人嘆服叔父之子尋愈是秋先君亦漸不豫遂卧疴不支鬼神之理雖不可知而先君之疾會逢其適嗚呼痛哉先君知不可為言念先大父夙愛萬無一酬泣下交頥顧諸兒曰某初欲搆甲第建先祠修古蒸嘗以報先德傳之子孫再欲恪卜佳城移請先骸哀疇昔之薄葬易今日之美完棄遐就邇以時祀掃實抱區區也更將妥老母於幽宫盡人子之終事豈意垂白者爾康而我顧先零也惟此春秋窀穸之事兩無一得送死莫大之故竟莫能及皇天有終此恨不朽兹不有俟諸爾曹焉矣乎嗚呼嗚呼夫復何言越明年五月二日子時忽謂吾母曰適有人衣我仙衣指示之曰是何鮮美也停午卒於正寢先君體幹秀偉丰神英爽天性仁孝才識通敏理義充然襟度豁如慷慨有古人風而康濟之志老而不倦博通書史多識物理文章雅健詩律清古善楷書行草圖畫其騎射百工技藝之事亦莫不諳曉好音律而不暇於琴命子學之以適古懷不多飲酒常愛醺然談論有章聲音朗徹衣裳有度進退可儀篤愛賓友情如同胞四方知名之士罔不悅契接物則務謙退奉身則欲留有餘勤以持躬儉以垂訓不喜逢迎鄙視齷齪制行之美每為鄉人取則耿介之標絶非塵俗可班也生於成化己丑十二月四日戌時距終之期享年五十有八仕至奉政大夫嘉靖戊子冬權厝介城之北俟先母别議改葬先母姓髙氏膠西處士浩之女也維性貞慧維質淑雅勤以奉我先大父母慎以侍我先大夫先大父早卒先大母孀居嚴肅我先母朝夕溫慰委曲周旋未食不敢先未卧不敢休恆恐炎涼之不攝於時而安養之不適其宜也凡我先子所不能躬致者舉一身悉之而不遺或謂母曰太夫人早嘗苦汝留怨乎母曰夫苦我者乃以進婦德以勞阿母罪也今復以怠敬尤罪也吾不圖家世學禮可以懟親乎甚非所以垂訓表風也日慎一日四十餘年終始惟一大母臨終之日亦以賢婦歸之從我先君蓬茅中燈火辛勞久而不倦十餘年相取鄉第二十年從仕梁楚報國恤民之心未嘗無助早見之明處制之宜堅貞之操潔素之行先子每有取焉淑子女以禮義貞諸婦以典法勤儉有恆虔恭茂著家聲有赫於鄉邦懿德不忝於前烈也嘉靖丙午秋兒完壁應省試白璧較庠首母戒曰各勉旃以紹汝先志以慰我餘齡各勉旃既而門下有膺薦者吾兄弟俱未捷母嗟兒之不利而悼已之益衰因不懌宿疾增劇凡六越月而逝生於成化己丑三月之八日寅時卒於嘉靖丁未三月九日戌時享年七十有九制封宜人生子四長良璧讀書未仕先我母卒娶蕭氏繼娶崔氏孫男一孟焕女孫一適雅士楊憲次廷璧無為州同知娶李氏生孫男一之藺次完璧國子生娶髙氏生孫男三慎修慎幾慎動女孫二長適千戶楊世芳次適尚寶司丞毛照次白璧庠生娶欒氏生孫男二懷慎懷貞女孫一生女二長適髙密儀宸國子生次適安丘黃禎吏部文選郎側室薑氏生子一垂璧女一適諸城庠生張西銘今將遷先君柩合先母葬於城南完璧不敏不能詳悉先行草述槩略以俟采風者志之故鄉進士直𨽻和州知州進階奉直大夫行齋毛公行狀公諱槃字世用别號行齋世居東萊掖邑之東里髙祖考諱伯全曾祖考諱福英祖考諱敏由鄉貢士任杭州府學教授俱贈光祿大夫柱國少保兼太子太保戶部尚書武英殿大學士考諱紀號礪菴晚號海翁早擢省元舉進士纍官光祿大夫柱國少保兼太子太保吏部尚書謹身殿大學士致仕贈太保諡文簡髙祖妣丁氏曾祖妣王氏祖妣趙氏劉氏俱贈一品夫人妣官氏纍封一品夫人兄棻癸酉舉人順天府推官槩乙未進士户部員外郎弟渠亦以省元登丙戌進士任太僕卿業治儒術未第俱先公卒集官生都勻府知府公天性嗜學𢎞治丁巳甫六嵗即欲從兄治業文簡以沖靳竟弗已比長慨然欲盡友天下士德業日益茂正德庚子以儒生應試補員府庠及弱冠文簡愛攜宦邸學易於汪東麓太史領其微奧發為文詞彌無尚焉嘉靖壬午大中丞浚川公督東士閲其文以偉士竒之是秋領鄉薦凡六不偶於春官辛丑春文簡書諭有命且又致爾年我暮之警及是亦顯揚之道公得書志以命制遂謁天曹授守泰倉編氓當海寇初平流移未定公推誠興發曲為招來復安如昔州東境舊築堤數里用虞潮汐厥利維深嵗久駸夷兹為民患公毅然增修不擾而矗崒宛然士林贊永賴焉壬寅文簡公夀登八帙聖天子篤念元老馳遣撫按官及門存問公荷主懷親守官雲望將圖海岱長春之慶維時文衡山朱玉峯太宰洎吳下縉紳且繪且文以從歡祝遣延照子恪致遙夀張天恩慰庭怡誠一時忠誼仁孝之盛癸卯侍史周公南疏薦略云純誠篤慎練達老成除姦弊而事克有濟理海虞而民利無窮遂調知和州蓋移簡就劇彰德辨才也行之日迓以來蘇留以去思道路相屬得民若兹亦鮮矣及視和城闉故存雉堞樓櫓已就凋敝公曰預備不修何以待暴非政也殫心力懲苟且不再踰月頽者興敝者焕矣和人慰維新之仰初文簡蓄文稿二十六卷歸田集識二卷聖朝存問録二卷久未傳播雖文簡不欲彰人而人未嘗無探珠之志也公勻序於徐崦西少宰捐俸梓之文簡手書與其顯親繼志之一端甲辰公入覲傾境遮留相與歌誦不盡懷私侍御舒公汀疏薦略云性資老練事務精詳真實心以愛民堪任重而致逺復改西陜之乾州蓋掄才試用倚效邊籌也居無何公以塞程巇嶮耄親杳隔髙志詘于盛時孝誠違於西日輒解組浩然以東慕乎乾者亦猶慕乎和與泰也琴鶴以隨鮮聞長物會太僕都勻二弟咸以省還金紫相慶鄉人以古萬石榮之越明年乙巳夏文簡翁不起公獲侍屬纊咸自盡焉公可謂有感有見也尋與二弟謀請恤典悉獲如制戊申建祠寢東遵禮奉祀公倣徨祠墓間永慕弗替冡子延照以恩授尚寶司丞考績進公奉直大夫制詞有世家宿學科目流英仕罔玷於官針居克敦乎鄉行之褒公稟受靈淑雖抵暮氣鮮失平庚申夏偶攖微疴即不就砭藥至五月二十有七日寅刻處正寢神間氣定無亂無惕從容以還元化公生𢎞治壬子十月二十有七日時距終期享年六十有九配雷氏贈宜人萊州衛指揮勳之女也前二十有一年卒繼王氏封宜人廣西南寧府通判廷臣之女側室薑氏子男三長延照尚寶司丞次延慧次延炯俱府庠生女五長適萊州衛指揮張棟次適平度州國子生崔旦餘幼孫男三長引增次引塤次引來俱庠生女孫三長聘萊州衛指揮王道男梓餘幼曾孫男一鈇曾孫女四公孝友夙成事親曲盡其道雖宦遊異土時獻不爽約以自奉享祀致涓篤愛宗親終始不衰晚年與季弟集偕休林壑觴詠陶寫琴瑟好合王謝髙風非塵庸所知垂訓以善繼居官以清慎恭無諂和無驕人咸慕之守有先廬扁堂裕慶郭田百畝他無厚蓄清白世紹無改焉每春秋掃祀躬率諸子若孫禮成齒序文會盡歡而返居暇則坐一室圖書前後日夕潛泳隨筆詞章不事雕飾涣理可愛著有行齋手稿數卷藏於家善行書有晉風公鴻筆懿行嫓美前修不幸制詘禮闈擬古則過人逺矣况位刺史夀古稀蕭散溪壑歷久完名無異議公亦人所難矣哉某舊以通家兼忝葭莩其世系事業粗得考聞今葬且有期始掇其槩略僭為狀託立言君子圖不朽焉海壑吟稿卷九
