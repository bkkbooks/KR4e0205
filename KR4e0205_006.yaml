body:
  text: 海壑吟稿卷六明趙完璧撰三言五雜組五雜組宮姝色徃復還歌換拍不得已東方白五雜組便佞口徃復還豺虎走不得已中散酒四言翟家嘴道中髙山嶄巖氷溪沍結北風凜如同雲雨雪太荒隂烟飛鳥欲絶僕夫怳然征車未輟前途何依想望天闕愴彼東溟我心已折過西巖寺山陟彼東巘寒雲蒼蒼驅我軒車險阻且長猿猴我戯虎豹我當氷雪蔽途顧望斜陽左攀雙輈右慫干将奮然萬里以趨康荘五言絶句髙玉翁左史見枉用韻賦簡五首夜堂酣若下春豆薦王餘酒興䦨珊後乘龍過太虛其二孤雲棄朱祓五栁謝金魚蕭散風塵外相將慰索居其三山鳥避人飛丘林遯自肥不縁黄鶴度盡日鎖烟扉其四春殘兼暮景志協怨離居處處堪乗興時時有報書其五南極星飛彩東溟月漸西青藜扶去晚伴影度雲溪感物二首欲繫日沉彩欲障水湍流東西不我與耿耿心獨憂嗟嗟三閭子不復得懐王早以蕙蘭悞豈虞蕭艾香春閒四首曦射忩烟破風飄花露寒鶯聲清夢覺春色獨凭欄其二鶯囀玉笙細苔涵碧錦滋楊花春欲暮睡起和陶詩其三寂寂閒庭静離離春草生朱簾白日永空復落花情其四春隂山館閒雲静松花老玉琴寂不調清觴為誰倒早春有感東風吹老鬢衰槁漸成銀不及閒庭草年年緑意新草露漙漙草上露珠璣明日華豈不照青眼湏㬰良可嗟鹽城獨坐獨坐淮南邑經年不可禁囊琴望秋浦對曰又西沉感朝雨昨夜衆星列今朝雨不絶天時無定期人情那可説有感早有看花興烟雲竟不開每當花時節腸斷幾千迴鬢上偶見一白鬢上一莖雪眼中一㸃血萬事竟蹉跎難教心似鐵寳應湖漁舟湖天一葉舟舉網此生謀幾許風波惡艱危不自由小箑芙蓉圖幽石結靈根繁華不相識仙姿媚晚秋金屋無顔色六言秋夜凉月叫殘蟋蟀西風落盡梧桐滿耳秋聲不寐寂寥延佇庭中春日㣲雨洗明苔色暖風吹破桃花竹裏酒醒無事徘徊春日西斜宿静寧州踈竹半忩横影濃霜滿院飛花夢破燒殘紅蠟更䦨冷墜金蟆晩遊温玉齋官邸亭臺幽境亭虚緑䕃良宵花落青燈殘月蒼蒼人去斷雲夢寐武陵醒眼楚臺烟月推襟晉代風流中夜燒殘絳蠟孤城唱徹銀籌七言雨曉看菊向曉踈籬看菊黄夜來㣲雨沐新粧西風好待吹雲霽合送清香到玉堂對菊小飲小徑黄花艷艷開晚風時有異香來長楊紅粉知多少爭似年年照酒杯青州道中觀古塜荒塜纍纍春草青行人指㸃未分明英雄寂寞前朝跡落日東風恨未平道遇寒食憶宋之問馬上逢寒食句五咏其韻鞦韆女兒桃李下栁外行人駐征馬驕馬嘶風桃李香愁人落日雲平野東風浩浩吹平曠紅淚紛紛號塚上滿地梨花春又來松楸海上悽行况荒村寒食雨濛濛栁拂嬌青桃欲紅山館留連聊把酒佳時塵世苦難逢雲外烏衣怯曉寒花間杜宇泣春殘冷風踈雨行不得南陌清光自可嘆小雨清明烟火熄寒茶冷酒強飲食雲冥家遠野草青盡日相逢不相識山猿竊桃圖佳實祗應酬國士緑香翻為野猿探不縁便捷先偷眼自是山翁午夢酣觀泉圖懸泉髙挹九天迴雪瀑虹飛塵抱開合笑狥名徒洗耳灑然何似洗心來琵琶寫怨圖紅顔共䇿息金戈淚落哀絃奈若何昨夜單于氊帳底分明猶説漢山河紅葉題情圖潺潺御水出重關空復題紅信不還薄命誰云秋葉似爭如隨水到人間夜聞琵琶何處琵琶向月明粉墻低度晚風清夜深多少王嬙怨寥落江州恨未平次韻野居滄溪遶屋野人家風静門閒鳥篆沙清夢乍回春晝永黄鸝啼上碧桃花次韻春日感懐朱箔㣲風燕子斜江山紅緑總春華酒酣偶作懵騰睡夢醒飄零幾樹花次韻答張當軒節判白晝樓臺空對酒朱簾烟雨獨看花瑶華慰我惟平子祗恐春深早及𤓰一枝春色自應憐羞向東風鬬媚妍可恨少陵寥落乆無人驅馬過寒川秋閨思西風凄凄木葉下凉月皎皎抱君思思君見君一相慰夢回不如無夢時次韻宮詞五首宮栁垂垂露欲黄西風吹冷妾衣裳妾身宮栁難相似咫尺東風入建章昭陽殿裏醉陽春歌管風來夜夜新錯向臺前怨顔色施恩承寵不由人踈鐘夜半過長楊歌舞争能得帝王書巻筆牀何所益當年悔不事宮商聞道仙幢下九垓是誰巧引羯車回慇懃學挿朱扉竹又恐君王緩歩來中使開扄曉一通雲車傳駐上陽宮黄鶯喚醒殘春夢獨對東風惜落紅塞下曲萬里胡天一寳刀霜風透骨不知勞壮心豈為封侯賞不遣旄頭傍夜髙次韻古城陳迹興懐空野芳賢愚千載總亡羊牧兒不解丘墟恨横竹秋風弄夕陽攜琴小圖滿天秋色月明中散歩石梁趂晚風是處寒蛩縱繁響乾坤無地理絲桐次韻趙松雪胡馬圖俊逸風流帝室人素衣無計染燕塵畫來胡馬千年在遺恨中原要認真次韻王嬙出塞圖昨夜燈前舊守宫朝來零落向胡風無縁紅粉違明主錯恨黄金買畫工冬日過崔侍郎墓殘麟蕭索半梅開潮咽悲風萬古哀金盌玉魚猶地下行人誰謁侍郎來次韻雪夜侯門燈火尚遲眠酒美歌樓别是天却有鐵衣三十萬誰憐徹骨冷屯邊風流太守風流太守飲西家纔自東家日已斜樂意未央夜未曙不知門外雪飛花讀朱淑貞弔林和靖二絶因用韻偶成婺女躔分處士星楚波宋焰有餘清何縁紅粉孤山弔技癢千名豈令名十二欄干腸斷時鸞凰失意却縁詩不將化石心應老猶向詩人弔古祠用韻京邸春夜感懐寂寂松忩凉月斜客身何事滯京華青燈落盡愁無盡酒美燕山不是家坐對楊花何處楊花小院輕捲簾孤坐午風清一春寥落江南夢腸斷吳姬勸客情都城聞西郊閲武金郊月落促戰鼔壮士喊聲怒如虎将臺百尺髙入雲北風寒透将軍股月夜㑹寧縣道中半天𤣥靄浮沙漠萬里荒山接草萊千古嬋娟恒此度不堪人自海邊來次韻鴿山晚釣一片閒心繫野藤羈人紫翠遶千層孤雲小艇迷春夢月滿寒灘未起罾感懐六十餘齡羈海頭山川遠興恨難酬龍鍾鶴髪心猶壮日逐白雲天際遊春夜深院鞦韆兒女情桃花香暖月華清碧窓夢破啼鴉散楊栁風前笑語聲鹽城初夏雨中誦不知春去幾多時紗忩幾㸃黄梅雨之句用賦十四首雨中紅瘦空肥緑强把餘香留寸曲酒酣陡覺壮前春為問來春還勝不寂寥粉署少相知㣲雨霏霏織暮絲惆悵故山飛客夢不堪楊栁喚鶯兒芳菲零落已殘春可惜韶華客邸身清吏戒嚴孺子事旋将狂叟作羈人紅芳夢裏謝春歸白髪天涯仍醉去瞢騰幾日未開簾莓苔緑遍閒吟處齷齪之畏何首尾七十餘齡知有幾賞心莫問春去來秉燭風流自英偉雨落殘紅曉更多留春不住柰春何春來莫遣傷春後幾度春歸兩鬢皤正是桑榆陶寫時客中絲竹媿羲之淮南四月風和雨盡日垂簾獨賦詩異鄉紅紫老春華故國芳時不在家柰爾青青數竿竹天涯風雨伴忩紗連朝風雨度滄江接地烟雲暗海邦王事沈郎仙棹迥白頭半夜倚寒忩踈雨冷風暮復朝翠林紅萼知餘幾十二闌干無限情錦囊清晝閒焦尾兒役王程我拘檢官衙雨漬重門掩淼圍湖水緑千重不見蓬山青一㸃别将鼔吹慰詩腸斗酒芳柑傍海棠調得玉笙無覔處青烟低度小䵩黄楚天四月熟黄梅雲雨年年㑹早來日夜不堪江上客寂寥惟有掌中杯酒醒蕭索桃花塢雲冷玉屏詩思苦楊栁風清燕子低幽軒簾捲黄昏雨古意飛夢依郎不可招郎音杳杳妾寥寥思郎不見郎帆在日日門前送暮潮鶴林玉露紀王荆公晚歸鍾山放魚詩或因刺一絶余亦效次相業當年負讀書一畨新法太迂踈蒼生望絶公孫恵何事終山學放魚七月十四日觀虹半天雲雨半天晴雌蜺連蜷斜照明莫自巫陽歸意倦晚拖腰帶背人横曉起小雨落花滿地感賦小雨亷纎曉意寒捲簾秋色落花殘無情一夜風吹盡可柰多情滿地看丁夘鹽城九日江峰迢遞獨登臺滿眼黄花暫舉杯兩度重陽歸未得秋風千里望鄉來問僮碧紗離離清影開青僮掃花來玉堦隔忩朝朝數相問隂晴一夕不易猜春殘漫書啼殘野鳥春歸去開遍好花人不知向曉髙堂對青鏡蕭騷惟見鬢邊絲翫庭前風竹戯書㛹娟細竹玉玲瓏嫋嫋纎腰不耐風誰遣楚宮如意舞婆娑對酒日西東次韻李亨菴辛夷花惆悵春殘盡日中新詞欲寫倦柔風珠璣不逐猩毫落意匠悠悠鑄未工閱來承寵若為容倦寫蛾眉獨倚風滿目楊花心緒亂彷他桃李不言中鹽城官署對葵偉幹穠妍冒雨華粉墻摇曳晩風斜黄昏小院無人見孤負年芳獨自嗟雨夜城頭落日雲重重倦吏閉門睡正濃雷雨滿天來半夜定知海上起蟠龍翟家嘴感懐老妻海上腸應斷弱子河西淚滿襟獨向關山對明月離懐三處總傷心春日即事四首滿庭芳意緑茸茸獨向瑤臺歩晩風一片殘紅飛翠蘚可憐春色寂寥中一聲兩聲山鳥啼三日五日春雨凄柴門暗鎖栁花碧閒館無人醉似泥松篠隨風如意舞石牀雜蘚五色組悠然醉卧了不關一夢落盡桃花雨脩竹㛹娟塵外幽蒼苔滿地落花浮青藜散步東風軟無箇軒乗無箇愁睡起寂寂清軒老病身閒情無頼寫無因日長飜為琴書累恰度華胥意興新劉春臺太守州治有大觀天日近雄勝海山連之聫因十詠其韻簡上䕫契唐虞值良㑹熈熈四海春無外酒酣欲作太平歌吷然劍首乾坤大海國熊軺一縱觀凋殘此日際劉寛東風到處蘇春槁紅樹啼鶯物色歡聖明側席苦遴賢卓老東來慰所天籬落不驚明夜月桑麻無事鎖春烟焦枯潤溥商家霖凝沍欣宜盾之日岐陽曠矣三千秋青荒赤子今寧一天地爾我元相近四知今古欽髙韻何物猶煩暮夜辭私門争似無人問風流儒雅慕豪雄勲業文章海岱空天地無私人似約仲舒端合到天東癯自從肥窺戰勝清操氷玉呈孤瑩負義封侯自烈然塵埃詎為如鈎應廬陵太守來東海政和化美春常在慣尋山水積英賢朱絃欲奏朱顔改龔黄芳譽重如山可慕當年不可攀銀筆恨無今日傳循良猶在口碑間散逸雲林彷恵連佐時全仗廟廊賢閉門不解當時務只合教兒讀諌篇次韻髙侍郎鵓鴿山百年幽癖向烟霞海岳茫茫日已斜開老蘋花秋浦静野鷗來往水邊沙次韻東山樵逕謝組樵雲白髪餘閲來塵世合幽居蕭然一逕林巒外未必人心似坦如栢䦨将軍廟俗傳将軍戰韓信敗死廟於此将軍身自舊周來大義還當仔細裁禦漢秪知今日死帝秦已遣後人哀落日二首碧簟凉生愜日斜胭脂飛滿玉堦花幽閒簾捲汀烟紫遙送輕鷗過海涯古木隂隂獨據牀㣲風颯颯暗生凉餘酣清眺暮雲盡萬㸃碧山秋興長金身范蠡報國忠良義自深幾㣲早已見君心金身却恨功成去不去終難保似金雪朔吹飄飄雪滿城瓊飛月瑩眼中明君看千古興亡迹謝館袁門一様平乆雨新晴小歩雲雨連朝不下堂新晴小歩翫庭芳莓苔為我開清興是處氤氲翡翠光瓶中花清秋紅翠浸氷壺浪遣人誇絶世無壮志肯教摧寸草長松古栢擬身圖閱閻鐸斮脛河之作用韻感賦當年斮脛劇相看股慄行人阻曉湍莫笑行人行不得不知天步已艱難獨酌緑酒金樽花正開閒庭白日好風來樽中酒盡還沽得花落明朝可易迴正月九日夢與春泉先兄凭欄看花賦詩覺來記首二句續補一絶日暖風清花正開雕欄雙倚共徘徊春忩夢破夜沉寂浙瀝寒聲竹裏來癸酉次韻新春試筆十首酬友人綵筆氷消試早春墨花香暖暗薫人媿無珠玉篇篇瑩却有龍蛇字字真玉函暖透碧泓春猩頴鸞箋更可人掃去忽驚風雨落右軍瀟灑自清真揮毫不敢和陽春逸少休論北面人但使醉中常作客有神詞賦却怡真蕭蕭短髪又經春萬事峥嶸屬後人惟有中書不終老漫憑哦句寫天真七十髙齡又始春衰延愧過魯儒人一生詞翰空成拙曽悟𤣥關三昧真筆陣珍傳幾百春杜家詩法要驚人年來漫興揮毫處草草花箋不用真大夢悠悠幾許春浮生不悟古今人酣觴髙詠暫須樂蕉鹿從來認未真風軟晴開碧海春日長暖惬白頭人風流對客揮毫處何用蓬山漫訪真紫極恩光萬里春觴詩歡賞百年人木公金母知何許雙夀重逢此樂真時叨膺寵命鄉人有雙夀重封之慶故云揮灑憑誰共好春青雲何幸挹詩人十分佳句凝清聽大厯風流亦迫真聞蟬清響踈桐向夕流年年一度使人愁白頭已盡驚如雪又被催人鼓缶遊海壑吟稿巻六
