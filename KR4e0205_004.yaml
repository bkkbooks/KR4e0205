body:
  text: 海壑吟稿巻四明趙完璧撰七言律詩中西莊晩歸嶺頭旋斾已斜陽十里山城緩不忙酒向晩風消未得詩從野色興偏長川横白鳥烟光暮潮擁滄波海氣涼鴻鴈㝠㝠誰得慕朝來暮去水雲鄉春日得二翟進士書兼枉佳篇日邊雙鯉海邊來愁絶惺惺塵抱開忽發仙函驚對面更依藻思苦憐才鶯花異地春仍暮雲樹經年老共催懐袖字應終不滅斷魂芳草向髙臺次韻楊契𤣥秋日閒居風清踈栁咽寒蟬拽杖芳庭自快然䔩䔩落花飛晩徑依依閒鷺睡秋蓮蘋溪何意三千釣竹塢忘情五十絃終日看雲無一事不知霜鬢向殘年虹逸勢翩翩挂海頭神光燁燁炫人眸長橋朗跨蓬瀛迥美錦誰纒醉舞休銀釜雲平從痛飲玉人烟際暫淹留斜陽相送天涯暮擬破巫陽一夜愁六月二十九日過小莊丘壑﨑嶇偶一經暄炎適得片時清主人十里春來少桃李千株子已成欲去未能窺晩照乍醒還醉聽啼鶯年來何事城中乆書閣留人不放行次韻冬日小雨海國寒雲鎖晝晴北風旋作雨絲輕疎梅冷浸嬌含玉黄竹低垂暗有聲室藹芳蘭躭逸靜門閒枯栁謝將迎楚騷歌徹虞絃雅環堵何妨近市城夜坐用韻滄溟無夢遶秦關日絶塵勞夜更閒雲吐月來看不厭風吹雪散酒初䦨殘更詩思碧窻靜半夜琴聲絳蠟寒布被茅堂從坐臥浪無羈束漫成歡喜晴疾雨飛雲慘淡收清風蕭颯曉涼浮石榴浥潤紅粧膩水藕凌寒紫豔羞四野凭欄詩裏畫八窻欹枕夢中秋日長細栁柴門靜一曲𤣥蟬竟夕幽入夜大雨不絶黒雲㝠㝠來海東翻盆急雨吹狂風驚雷走電晝還夜傾牆頽屋家幾空峻湍崔巍捲平地隂烟上下俄鴻濛更深誰為乞鄰火坐聽瀑布心忡忡庚申秋苦雨海國窮隂雨散絲秋風不見霽開時千峯秀色知何處一刻清光費夢思石燕歡騰洲渚外荳花零落水雲涯泉聲不盡蛙聲劇攪夜無眠漏更遲秋日雨霽病况蕭然庭下閒適雨後新涼不自持枯藤搘去遶寒籬龍鍾老鶴秋風勁寂寞閒庭落日遲把酒頽齡心易醉看花滿眼鬢成絲夢中日月籠中鳥猶自蹉跎訪藥期送王冠峯分敎舒城魯鐸聲殘馬帳開淮南生色向春雷匡時禮樂從周典復古文章陋漢才丹桂天涯尋舊約碧桃雨後試新栽龍泉晩効秋江捷得意清聨玉笋囘寄舒城孫小渠長憶匡廬孫子荆燕山契雅豈忘情雪中詩酒淹瓊漏月下笙歌遶鳯城萍梗天涯嗟宦跡桂香秋晩慕才名江湖雙鯉開春渌珍重緘書達海瀛辛酉寒食同春泉兄小飲用韻暝掃春雲宴小堂孤城海月正蒼蒼清風拂夜侵簾冷紅雨飄烟入户香人靜竹窻猶共語酒酣花萼好同牀良宵且莫抛春夢曽向寒原聽白楊商林曉行雲暖烟消欲曙天行人驅馬杏花前故園桃李春如錦客路風塵日似年山水倦人休未得功名老我少無縁蓬瀛苒苒東來近早晩華堂萊綵翩次韻中秋獨酌感懐鼓絶山城夜正幽雅懐對酒更何愁功名勘破浮生夢風月清餘海國秋一醉良宵情洩洩孤吟殘漏思悠悠徘徊未遣嫦娥别遮莫雞人五報籌沭陽早發山城撾鼓四更時官道蕭蕭馬正嘶霜重敝貂寒透骨月明啼鴈迥生思長風遊子驅千里喬木微禽羡一枝坐損紅顔成底事吳山楚水轉相嗤送張蓴江太守擢貳南安風正滄溟白鷁輕東山翻仰大江名紫泥有寵慿誰借赤子無縁空復情身世百年揖雋傑口碑千古自分明青錢那復期君一為祝髙門覬後生早春雪後獨坐東風吹雪劇春寒幽室孤居對碧山簾外凍雲青不散簷前新月冷初彎十年宦迹驚殘夢一息塵機慰老閒竹裏酒杯㝠日夜流年休問鏡中顔雪中思梅憶向東風雪幾畨小庭寥落玉欄干暗香何處凌寒度疎影誰家徹夜看獨弄虞絃春晝靜空餘羌管月明殘金樽彩筆孤清賞惆悵江雲興未䦨用韻春閒二首白髮恬居滄海濱蘭裾不涴屬車塵風前聽竹衝牙細雨後看山翠黛新香惹梵烟蓮社叟醉沉花塢葛天民不教拾得芳菲恨數把金樽挽却春秦關東下罷征驂乆客燕山此日南萬里秋塵孤鳥倦五湖春水寸心涵清樽夜夜情何極碧樹年年人豈堪飛翰謝無風雨駛鉢催客次毎教三次韻秋興二首一葉銀牀早報秋天聲濤捲下西樓翠篁逸興開三徑黄菊清光專一丘千古英雄翻浪雪一身天地笑蜉蝣年來嘆息風塵事潮落潮生青海頭窮海幽潛傍鶴田優游清境不知年松隂月落收忩外山色雲開到案前渡晩紅迷霞際水汲晨青破石龕烟閒閒敢自忘斯世秋釀醺人日酩然雨中桃花驚風疎雨度新枝曉裛紅粧半不支含淚有情胡塞别沐芳無力華清時胭脂冷濕青烟合絳雪香沉碧蘚滋簾捲幽軒看不厭漫漫春浸武陵涯閒坐幽人無事坐虛堂小院風清日正長芳圃雨晴翻紫藥短牆雲靜倚脩篁紅塵車馬迷清晝金谷笙歌共夕陽多少欲閒閒未得一般深味滿詩腸小珠山秀倚城南咫尺嶔崟老未登覽聞其勝而慕之用楊公可乆韻謾賦寄懐白頭伊邇未躋攀聞道竒觀絶宇寰送盡歸雲殘照裏興髙終日翠微間緱山鶴去塵縁𣺌天姥魂飛月下還竟欲晩尋麋鹿跡俗羈爭得片時閒次韻仇太守背兒山山風颯颯向清秋古屋探幽一暫留飛瀑訇雷青壁下弱雲如水翠岩流閒中日月抛雙鳥靜裏烟霞笑五侯何用紅塵空白首全身是處即丹丘次韻滴水菴靈源莫測此歸渟千古摩尼下翠屏環珮有聲寒出谷蛟龍沉碧夜吞星清開塵眼還侵骨靜照禪心不役形擬訪真如來物外㝠㝠白首坐烟青次韻嵗寒亭絶壁荒亭嵗月深長松鬱鬱䕃寒林曽教炎暑來酷吏誰向清風㑹賞音氷雪有情偕暮節乾坤無地表貞心寂寥盡日啼幽鳥何事遊人未解襟次韻張蓴江太守過松山古榦蟠雲老翠虬清風騷屑暫來休半天晴影蒼崖畔一𣲖新涼碧海陬秋色故餘還似水濤聲欲㵼未成流煩襟乆已無從滌此日經過許散愁北窻北窻一枕寄髙情乆息塵機心獨清臥看閒雲來自變靜聽啼鳥暗遺聲蒼筠冷浸華胥夢赤夏涼生白玉京老去日休無一恙不須藥物更身輕古城古城矗矗碧雲茫徃迹經過感喪亡流水有聲號暮靄逺山無語送斜陽豪華恨逐何時盡野草愁餘故國長風景蕭然徒極目平沙𣺌𣺌鴈行行唁月林謫歸道中喜見羣山終日紛紛俗務中出門喜見翠螺峯幽情乆抱空斑鬢勝槩長孤秪醉翁擬採紫芝休晩嵗便從白鹿仰髙風同心欲拉丹丘子又恐春雷起臥龍獨居獨居獨坐獨閒行豈有比隣慰此生翠岱向人原不語緑溪遶我去無情焦桐古調慿誰奏綵筆新詩秪自賡一片野鷗蒼海上好風良月共魂清都城冬夜醉眠霜滿珠簾月滿天鳯城撾鼓夜悠然風塵宦況淡于水山海歸心急似弦一醉清宵㝠世態五更銀燭攬愁眠蓼蟲合是忘辛物白首衰頽恨未前曉過紀省吾靈濟宫次舍曙色蒼蒼駐繡鞍銀臺仙子夢初殘晴霞玉闕韜秋日青靄朱門瑣曉寒病骨可能依睡鶴旅魂常自遶吟壇西風合笑塵羈乆鬱鬱慿誰説肺肝送管勵山進士尹六合夷吾秋晩之江左鮑叔情深􅀈水頭百里蒼生明主意萬山青靄故人愁彈琴更有昔人興鳴鳯終看盛世休衰栁西風一杯酒好將忠赤答旁求小雪初晴夜坐有懐倪若谷中舍小雪初晴永夜寒挑燈長憶老倪寛襟涵淵海探非易調入陽春和更難雲冷鴈聲人不寐窻虛月轉漏將殘小橋猶自限南北孤負良宵興未䦨北司獄中用蘇長公韻二首嘉靖甲寅秋秋曹檄捕豪校某因獲罪東湖翁劾執坐死賴元老科臺之力僅復瓦全垂死中時洩幽悃直從枯槁探陽春翻作㝠投却殞身地下不慚今日鬼天涯望絶故鄉人獨知心上原無累豈信人間更有神松菊海邊千里恨殘魂零落更何因金吾肅穆晩風悽玉漏遲遲銀漢低何意㣲軀投猛虎秪縁薄禄混羣鷄如弦速患思先哲繞指全身負拙妻或覬一生瀕萬死漁樵雲水任東西西臺獄中簡楊椒山北風沉漏夜如年輾轉愁人獨不眠頽壁濃霜寒冽冽破窻殘月冷娟娟故鄉有夢人千里病骨誰憐雪滿顛垂老自嗟還自笑飛鴻誰復慕江天次韻酬楊椒山四首夙挹風流效折巾低頭此日愧山人出門有礙應懐古學道無成合累身筋力日衰猶蹈險風霜夜寂更傷神拂衣未遂江湖意補衮終慚社稷臣蓬瀛囘首欲沾巾勢入艱危託故人褊性由來難避俗迂儒垂老拙謀身赭衣相值仇秦越綵筆誰看泣鬼神辛苦不妨淹日月授書喜有漢良臣海上長思鳥角巾樊籠愁殺宦遊人空隨秋鴈頻囘首安得晨風一奮身古柏凌風常淅瀝老梅含雪更精神賦詩共荷天王聖取罪還知自小臣曽向王公浪脱巾英豪跌宕邁稠人乾坤老我凋雙鬢風月慿誰伴一身事變蒼黄堪墮淚天髙視聽豈無神窮隂急景催年暮引領金雞釋罪臣大名野水舟中野渡茫茫接曉烟艱難世路復登船蒹葭聲裡風驚雨楊栁叢中水拍天釣艇日閒誰是主蘋洲秋老自應憐天涯宦況澹如許一望東溟一慨然淇縣道中望西山有感海天囘首思茫茫入眼青山欲斷腸縹𣺌烟蕪秦塞逈飄零霜樹楚雲涼逢人把酒酣清夜髙興題詩付錦囊自嘆路難難未巳此行真自媿王陽閿鄉道中六十頽齡獨可歎五千餘里一微官河臨斷岸魂應斷逕入寒岩膽亦寒白鴈關心秋杳杳黄塵吹面日漫漫籬英爛漫情如失嶺樹迢遙興欲䦨清豐道中逢雲南戴玉園推府漫漫長路可堪愁何幸英雄際盛遊落木晩山人似約短亭濁酒意無休陽春雅調曽誰和雪夜髙情此日酬萍梗秋風仍萬里隴雲滇水思悠悠觀諸陵有感人間富貴只如斯地下英魂莫自癡兩漢風流秋寂寂二秦功業草離離丘陵何用千年計指㸃空令萬古悲西餓匹夫今不見髙名竟與首陽夷乾溝驛道中迢逓秦川合斷腸病軀白髮日倉皇黄雲𣺌𣺌望不極紫塞茫茫情自傷淅瀝髙風初作凛朣朧冷月尚含光山城半夜無燈火調盡霜笳漏正長宿青家驛古驛蕭條獨宿時悲風吹動故鄉思踈燈半夜窻前暗殘漏孤城月下遲人為浮名來絶塞書因遙阻到無期夢魂忽忽驚寒榻唱徹鷄聲又路岐青家驛曉發肩輿清曉出山城塞上風烟愴客情日畔旌旗微有色霜中鼙鼓暗無聲凝寒割面重裘薄晩節忘身一羽輕多病不堪勞逺役羞將藥裹伴微名次韻落花蔌蔌飄零絳雪光合烟蒼蘚不成粧蝶蜂幾日憐春色風雨連宵妬異香浮去澷隨無意水拾來長憶有情郎玉階不掃黄昏月檀板金樽坐晩涼鷄冠花亭亭斜倚玉欄秋緩帶仙粧塵外幽對日欲酣紅暈臉舞風如意錦纒頭奪炎自惜班姬扇妬夜還生青女愁誰把芳姿擬驍健爭妍鬬寵一生羞野人鬻鶴何事臯禽縶野狂雲霄仙格墮塵鄉兒童白日駭心眼肉食黄金議豕羊雪羽投人混鷄鶩青泉得意笑林塘瑶池萬里嗟殘夢靈囿千年空斷腸南山曉行石徑無媒野草青悠悠驅馬曉烟横霞分曙色浮蒼莽雲冷秋空倚翠屏麛鹿閒眠駭征轡山花開口笑行旌西風捲地迥蕭索獨叩龍泉吁紫㝠過蘇州雲錦乗風吳水頭繁華滿眼過蘇州青樓簾箔烟花暖畫舫笙簫瀲灩浮薄霧山鐘驚市晩斜陽漁笛使人愁孤舟對酒不成醉明月胥門坐未休宿望江北風雲暗雨如絲曖曖孤村欲暝時野港繫舟聊寓宿寒宵沽酒獨吟詩乾坤曠蕩渾無用湖海淹淫未有期一㸃青燈千里夢江山嵗晩結幽思落葉霜冷風清緑已休紛紛黄紫總驚秋僧廊凌亂無人掃江國蕭條劇客愁山麓一空天際濶紗窻終夕雨聲悠青娥豈是無情物剥復真機不自由晩春小齋即事小庭人靜愜春長珠箔微風度暗香雨過檻花開錦繡日髙樊鳥哢笙簧脩篁鬱鬱雲依石晴絮霏霏雪滿廊一曲焦桐一榻夢不知身世在羲皇秋夜秋色愁人夜不眠鳴蛩四壁意蕭然小窻影落松簷月虛室寒生竹户烟巧偽向人今有靦文章憎命古無縁平生合恨謀生拙坐遣白頭媿少年道見饑民掃拾草子𣺌𣺌荒原雪欲殘窮民無計掃凝寒置錐無地周田壊潦水滔天舜帝難囷簏已空猶菜色簸揚何日足飢餐散金不解書生䇿徒向陳紅發浩歎諸城道中孤村酒盡促征鞍急景凋年道路難四野荒烟迷客望半山殘雪迫人寒孤依𤣥鶴林間唳百中青骹草際餐冉冉危岡下餘暎馬啼何處説辛酸春夜懐馬珠岩春夜沉沉春月明春光不與故人并星河庭院何時曙烟靄溪橋無限情滄海交游齊鮑叔玉堂文藻漢張衡迢遙畫角吹殘夢寥落梅花負短檠已酉除夕五十今宵除已盡明朝五十一相依年逾尼父未知命老過蘧翁曽悟非世事無慿慚我拙文章何益壯心違酒杯且莫浮椒栢辛苦平生豈細微賀吳司訓榮膺臺奬妙簡蓬瀛適可親風流儒雅更無論𤣥機秘啟青藜夜大造潛囘絳帳春桃李門前新雨足絃歌海上古風淳明時豈負旌賢寵㑹見霜臺荅紫宸夏日乆雨簡髙介亭三首淫雨凄凄乆不收烟雲迢逓暗滄洲畫簷泉落消煩暑疎竹涼生歘早秋青眼誰為心上友蒼筠夢遶滸南樓芭蕉聲裡無窮思獨倚閒窻聽未休對雨髙齋興未收幽居清曠亦仙洲雲來雲去朝還暮花落花開春又秋已遣亂蛙喧鼓吹不成雌霓挂岑樓巫陽合自仙衣濕何事霏霏不肯休溪頭雨暗釣綸收蒻笠纔歸蘆荻洲逸興喚來西舍酒清風臥向北窻秋梧堦滴破江湘夢烟景題堪海岳樓日夜瀟瀟渾不已老懐佳趣亦無休用韻喜晴二首幾日愁霖一夕收晴薫吹緑滿蘋洲山光浥潤濃如畫水氣生寒忽作秋竹塢烟銷頻駐履海天雲盡一登樓啼鶯恐負芳時飲花外催人故不休雲雨從前夢一塲園林轉覺倍生芳青青楊栁聽齊女嫋嫋芙蓉慰楚裳别沼旋添三尺渌小窻新透百花香光風拂面吟懐爽緩步青蕪到夕陽春夜對瓶中杏花獨酌紅明團雪水晶中對酌幽軒入暝清絳蠟光涵香玉瑩緑觴影動錦波生瑤臺十二春何在粉黛三千意獨輕叵耐芳妍終夜醉不須歌舞自多情用翟樓村進士原韻寄乃兄雩泉進士一生襟抱二難知金石論心豈易移夢裏禁鐘猶勸酒腸迴僧宇共題詩秋鴻十載南飛日老鶴孤雲北望時春草才名空悵恨一行寥落對殘巵用韻喜姪懐慎至鹽城二首𤣥子南遊白鷺洲謝安乆客慰賡酬良宵有興頻燒燭急景酣歌不下樓青眼天涯春幾許白頭鄉思日三秋重嗟筋力江天濶擬伴青藜返故州月明寒暎荻花洲骨肉相逢重與酬酒美他鄉抛駿馬話殘清漏向朱樓孤兒不滅終天恨老夢翻驚斷鴈秋吳楚壯遊尋勝迹伍員英烈尚中州鹽城殘臘乆雪窮隂晦朔雪毶毶殘臘嚴凝冷不堪萬里楊花飛漠北千峯玉笋換江南畫簷瓊筯清聨閣古硯𤣥氷暗透函羔袖龍鍾無那老月明長夜酒杯酣寄弔丘月林喪塜器肖林進士紫綬青春玉帝歸哀君腸斷旅魂飛緑芳早為青娥妬白髮翻驚丹桂違郗老情深損眠食山翁淚落濕裳衣題詩春鴈遙相慰珍重琅玕待紫微丁卯鹽城再逢初度時慎修公出南都秋風颯颯鬢蕭蕭從宦殘年思尚饒江上征帆迷逺樹瀛西歌管隔重霄乆違親故虛風月暫狎兒童慰寂寥明逐翥鸞歸去後還人景色倍逍遙隆慶丁夘八月九日感懐二首八月九日天氣清同文四海試羣英蟾宫媿我昔年志蠶食看人此際聲江左朱衣非是夢謂慎修與簾事戒也海邊丹鳯擬先鳴謂慎幾與試事勉也白頭已誤青袍拙奕世科名覬後生壯圖曽此淚沾衣老向人間混是非得失功名春夢斷古今榮利露華晞身歸大塊茫茫𦕈心向空門種種稀莫説風簷爭寸晷且將杯酒送斜暉丁卯鹽城中秋感懐有序是秋慎修分簾南都慎幾應試東省老妻攜慎動兒膠東衰叟從銀鶯孫鹽瀆固皆一時美事然值此良宵而能無感漫賦用紀客懐云中秋雲盡月華涼骨肉良宵寄四方一鳯南飛奎耀彩三郎西赴月探香荆簪攜幼滄溟曲藜杖弄孫淮水傍共向一輪清影下離情各自抱衷腸次韻吹笛牧兒短笛山童學跨牛英音不著利名愁雨昏楊柳堪腸斷月冷關山合淚流三弄緩歸荒落晩數聲吹老緑蕪秋太平有象清風外飄落梅花遍海陬已巳元夕二首考鼓搥鐘夜正賒暢懐春事老烟霞樓臺月暎蓬山色歌管風清仙子家綺席有情催刻漏山城無事共諠譁黄柑緑酒堪乘興一醉相忘兩鬢華新逢三五興初賖玉漏遲遲進紫霞明月翫來知幾醉華燈看去説誰家祠開太乙春方劇禁弛金吾夜正譁七袠放歌歡故里十年羇客笑京華登樓晴眺宿雲收盡曉初晴獨倚樓臺寓目清亂水拖藍遙接海千峯凝翠藹連城興髙平楚朱欄外酒送飛花小院輕塵㸃不侵寥廓靜超然身世在蓬瀛夏日雨後閒居簡秦余臺太守夏木隂隂雨乍過幽人獨適向山阿啼鶯隔岸笙簧細古蘚侵堦翡翠多竹杖緩移蒼靄徑釣絲偶動碧雲波巢由樂有明良在枕上華胥醉後歌髙時齋節推署膠事春日簡上九霄旌斾拂春烟遐域蒼生慰所天關隴豪華輝海岱伊周聲聞達幽燕青陽化協窮隂後玉樹清依暖吹前林壑熙熙歡不已佇看鳴鳯五雲邊次韻唐人劉阮五首劉阮遊天台翠微深入興方新却笑浮生誤紫塵絶壁恍開他日夢片雲擬老此生身真機有悟元非晩清景無涯别是春採徧紫芝從浩漫綺園猶笑漢羇人劉阮洞中遇諸仙子洞遶寒溪古木蒼偶窮雲際出微茫不知天上歸蟾窟疑有人間奏鳯簧青眼夢中心未稳瑤池春邇興初長匆匆却訝相逢好自是相逢悞二郎仙子送劉阮出洞名山髙峙倚三台何事郎歸何事來紫帳儵驚青鳥别翠岑遙送綵雲開楊花決絶應難致溪水悠長可易迴洞口歌殘千古恨蕭條風雨老莓苔仙子洞中有懐劉阮臥憐薄倖損霓裳古洞生寒思正長芳草不歸春寂寞斜陽凝望晩蒼茫鶴飛滄海雲初斷人逺瑤臺花自香風樹蕭蕭月炯炯晤郎彷彿復羞郎劉阮再到天台不復見諸仙子歡合從前記尚真不堪重問杳音塵玉簫金粉遺新恨紅樹青山失舊隣野鳥喚囘花底夢水雲悽斷洞中春故鄉落寞故人去空對斜暉愁殺人次韻懶出門酬水南柴門反閉動經旬竹石琴書是所親半榻清風成獨坐一瓢春酒共誰斟浮雲有變歸㝠黙世務無慿混偽真却笑生平多滯礙出門何處可容身逆前韻出門何處可容身夢裡乾坤莫認真晉楚豪華渾不見阮劉寂寞更能斟在天富貴應難必到手壺觴自可親月夕花朝從我好合期共醉百餘旬癸卯中秋酒滿金樽月滿天清秋兒女笑星前喬松空自傳千古金石誰同固萬年三百清銅直土苴沉酣良夜擬神仙人生莫遣佳時負豈有江河西復還次韻胡虛白公蘇武牧羊圖羝乳何年仗節旄中原君相乆忘勞珊鈎歌擊秋風細金屋沉酣夜月髙多病茂陵歸駟馬詼諧方朔已緋袍中郎老迓歸來寵獨把青銅歎鬢毛癸酉秋苦雨帶雨閒雲西復東朝昏巫女意匆匆蓬瀛望絶連天霧湖海波翻驀地風臨水花涵青鏡裏看苔人在翠帷中炊珠爨桂秋將晩秪有題詩興未窮又天空石破偶驚猜逗漏鴻泉海國來長晝翻盆迷白日連宵注瀑鬬狂雷三旬水潦無餘地八十年來未見灾老揷漁竿閒臥處中原㸃檢濟川才小樓晩興獨倚䦨干眺夕暉山城秋色正依稀蟬聲不定風枝裊虹影初殘雨意微看去墨雲雙鳥沒聽來紫塞一鴻歸悠然清興不可冩明月滿庭梧葉飛春曉枕上偶成語燕匆匆傍曙歸幽人慵起閉柴扉夢囘花塢啼春鳥人靜松窻鎖曉霏城市意閒青嶂在交游情澹紫塵違衰殘無事㝠搜苦清對琴牀臥翠微蛩聲清秋何事此悲蛩散入塵寰恨不同舊國荒榛寒雨裏古陵衰草夕陽中沉沉庭院殘更月寂寂樓臺落木風無奈年年苦相值是誰沉醉在笙鏞春日樓上琴餘小飲長晝如何愜好懐琴樽清暇畫樓開朱絃乆為王門絶白雪新傳郢客來駿馬五花能換酒浮生一夢可銜杯醉中更有慿闌興滿目山川媿匪才鹽城新秋即事涼風吹人七月前清秋爽氣開新鮮狂雨既過亂蘚濕逺山欲瘦孤雲連黄葉萎庭自作舞青蟲吐絲相對懸稻花飛香海署靜何處老翁來醉眠海壑吟稿巻四
