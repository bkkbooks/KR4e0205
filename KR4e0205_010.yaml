body:
  text: 海壑吟稿卷十明趙完璧撰祭毛行齊親家太守文公輔之胄賢聖之徒社稷楨幹宗廟璉瑚清才通朗輝映天衢武繼三世芳聨五株三守名邦琴鶴與俱白雲興思𤣥髮來趨抗章解組林石江湖桑榆承慶塤箎偕娛一觴一詠蕭灑從吾盈虛伸縮造化一途髙標逸韻超然萬夫嶠南鄙叟乃敢趨隅喬絲不棄慚與葭莩篤我懇至慷慨交孚情瀾不既玉魄陽烏送我魏闕識我區區秦隴懷君同味秋鱸江山十載胥視凋枯哉舟未剡君豎回盧君垂夙愛我抱今辜悲心忽折淚下嗚嗚臨哭未即窀穸罔圖支離莫慰幽鑒不誣遙託哀誠以薦芳酤渺不可測天潯愁豫邇不可招奏鼓吹竽瞻望咨嗟何射何虞代祭匡環溪文閥閲之裔雄於海鄉清俊之才沈於林塘陶真觴詠娛情文章竹林逸韻蓮社清光一經垂訓四國斯揚桂窟秋擢桃水春芳慙豫不肖謬附翺翔昔分南邑慶過華堂今還北覲嗟慕沾裳悼彼電露胡存胡亡公不我留我為公傷仰公一哭誰云非福五十餘齡不稱夭速身棄國榮子崇君祿忠良有聲公遺之穀紫誥濊澤黃壚永沐澤溢松楸芳流山谷顧此殯宫梨雪春風淑嗣有情王程倥偬不遑素車結此丹衷聊爾薄奠以表無窮代祭劉石渠給事文君負雋才迥茂佳名君崇令德宜夀此生胡方階於青瑣倏謝塵於𤣥冥小試秦關甫兆大行蒼生不幸奪我豪英仰昭昭之禍善窺渺渺而未明追憶淮南慰聚風萍瞻望悴顔恍爾惕驚送君南渡煙水關情聞君北歸鴻鴈稀征擬雲閒於海山冀日休於蓬瀛胡為乎盧扁無功哀此同盟江鄉杳香幽襟痛盈乃今過便一吊孤檠酹觴在手不覺失聲代彭麟野祭丘母夫人文嗚呼母有順德藹如慈祥母有令範則於家邦佐宜君子閫閾用彰肅有懿訓薰蘭叢芳秋捷春榮滄岱輝煌耳目魏闕勾陳孔陽國崇英俊賢哉厥昌峻惟作艾焕錫寵光龍飛鳳翥猗歟青鄉垂白珠錦鳩杖華堂邈禧優優既夀且康理數之極今古之常頃復莞含九地何傷幽明一情樂意洋洋業慙菲陋瑞鷟相將春霆桃水偕我翺翔微蘿罔棄寄託千章久揖堂下沐德何疆聞母之訃惕母之亡紛我涕泗絶我衷腸適我先慈三載未忘還侍天陛執紼不遑道出琅琊展我心藏愧無生芻忝有勺漿秋風蕭蕭愁雲茫茫青眼同袍靡恃雪裳離魂飛越靈鑒我傍祭宋南亭舉人文别君久矣莫挹夫咫尺望君邈矣徒仰夫空碧君之文章散為雲霞君之徽音寂夫泉石君之芳聲早已達於雲漢君之竒才猶未試夫霹靂惜哉逝而沈珠毁璧哭君以綵筆言盡而思深弔君以朱絲琴破而恨積曠萬古其何期適星霜之兩易撫九原其誰招冀椒蘭於一格忝君婭戚痛君夙昔淚淒淒以衝襟風梢梢而過柏代春泉兄率諸弟祭東溟翁太叔文昔我先大父畎畝髙人樹德績學志存廓清屯淹未揚産我先君及叔父舉有竒資時以達人致望其誰曰不然𢎞治戊午秋我先君膺薦叔父失利先君嘗憾其不得為蘇氏同榮且曰我弟負雋才必魁東人終當不隕厥聞芳聲嘉譽震灼海隅莫不逆知其非塵埃中人詎意木難殊珍竟遺澥渤可若何孔子曰賢不肖才也遇不遇時也叔父亦久諳斯言安於所寓又焉怨嘉靖癸未有司貢於朝分教西潞文澤汪濊上下恱之庚寅春奔我先大母喪越明年叔父以疾終於戲於戲何痛如之我先君宦遊七載倦還叔父甫出先君卧疾鴻絶離傷兄弟不獲一訣而逝及叔父來歸我諸孤咸庸劣失怙仰其撫我祐我義訓我等動定其又或雨夕風辰春亭秋圃娛情觴詠倣阮謝清風所深願也不圖皇天罔吊爰棄我老成宗親蘭蓀其摧矣琬琰其碎矣迸淚失聲潺湲其如霰也吾弟楚珍負梧篁秀姿抱鴻鵠逺圖信叔父所未信者擬在斯人叔父其又何憂廷璧不肖粗通書史忝厠下舍無足言我母弟完璧淬礪不墮亦欲罔忝先世而白璧又進學未艾所可哀者我母兄良璧殂於去年之七月而不得同哭於柩前是為泣盡而心死也幽冥如知覯我先君暨我兄妹骨肉相將顧念故鄉事何如楚惻家勢殊昔書生亦悉有令圖叔父其又以是為先君慰焉爾者楚珍弟卜於容成筮於巫咸曰維庚申是為佳辰將厝之王村之陽以安窀穸廷璧等致薄奠臨哭之嗚呼蘄我享代同鄉諸朝紳祭杜太翁文即墨杜介菴進士太翁也福莫大於夀也而公惟遐齡夀恆本於德也而賢嗣足徵瞻滄溟而緬懷逸韻邇玉麟而遙挹芳聲德教如春公之器度太虛也茫然莫測義訓名世公之文章龍蛇也變化可驚康濟之學曽無少試於一匕幽潛之德竟亦淑伴夫寒星鴻鵠髙翔於碧落蕙蘭獨秀於中陵陶意海濱弄濤聲而金紫長辭於煙駕放懷詩酒玩雲影而利害不怵乎天精公所不得於人者得之天龎眉鳩杖迥出風塵之外公所未信於身者信之後鳳毛虎變垂光虹霓之明公其無知耶其有知耶黃腸雖沒於窮塵而𤣥壚殆開夫一噱公其果逝耶其未逝耶雪羽驚翻於華表而金身或脫於五行蘭香係屬蓋邈乎其難倣蓬山密邇信蕭然其先登但悲莫悲兮銀燭凄凄父不得易簀於其子慟莫慟兮金臺渺渺子不得招魂於其庭抱黃泉之恨者鳳闕華封兹莫待以膺夫榮寵慕昊天之德者龍章美贈終猶可以慰乎衷情春風蕩而梨花飛回首英魂之莫即曉煙開而山水緑墮淚頽波之益增某等哀哲人兮天潯冥冥送孤帆兮楊柳青青靈不返兮芳草蘋蘋杯不乾兮憂心忡忡代祭同年丘肖林太守墓文仰君桂芳妙齡騰光渴依輝采百里渺茫甫丑之春挹袂易陽彼蒼莫違合并孔良慰斯蘭臭江曲徜徉忝君尺木比翼翺翔愧我萑葦伊邇琳琅看花春永翦燭宵長膠漆異境風雨連牀豈無同袍誰其范張豈無相知兩世相將我志子心子無我忘歘焉而涣波駭雨散南北相違天涯目斷淮水悠悠塞雲漫漫懷子沈疴冀子鶴算五馬方來胡遺一旦并訃江飛爽越意亂天乎斯尤奪我良儔摧此玉樹華乃瓊樓春紅雹碎夏緑霜休九霄子期夕景子遒豫獨何心而不悽愁淚盡千里抱痛曷已吊不及哀祖云邈矣夢魂勞思寸心負此緑琴悲鳴原草青青一死一生何如為情擾擾逾時豈易生平遙馳一觴敬酹幽旌劒意猶存不罄逺誠祭逸菴丘翁文公雄豪之氣英敏之才製荷結蕙鏟跡海涯不以顯慕不以隱憂殆古之有道君子今天下之不可望焉者也然盛德無當世之榮於穆有豐後之報月林仲嗣琬琰淑姿鳳麟嘉瑞非由庭教曾不信然乃爾早擅科名顯崇樞要天下想望風采罔不有太平之慶公之意於是乎殆慰矣乙卯冬歘然來京曾不知凝沍之嚴馳驅之艱其君臣之義父子之仁蓋兩懷之也諄諄詳切輔郎所未及而勉旃以清忠髙節此真愛主上無已而因以愛子有道欲凝其志使無分焉公其賢矣哉既而浩然東還吾黨諸賢弗克為遲留之計祖侍道左瞻望芝顔不惟知仁者之必夀而且逆識矍鑠翁之終迓天錫也兹聞逝矣精爽飛越五內痛傷夙有葭莩之好今不得倣其形聲素有山斗之仰今不復揖其輝彩老成云亡吾道其可哀也夫嗚呼我心有惻天道不誣七十餘齡不為夭矣賢士登庸不為窮矣子孫繩繩幾於昌後矣異時龍章焕九原之光不以死而亡矣公於幽冥不亦慊乎哉但髙堂雲斷於海天孤兒魂飛於蓬闕生者倐而殁萃者忽而離造化無常人事靡定變若浮雲運同逝水此不肖所為交痛於相知對泣於羇旅也吁嚱其戚也何涯其靈也何招姑一酹惟鑒之祭妹丈黃海野文部郎文嗟乎公逝矣於公何言哉公靈鍾海嶽貞超塵埃落落胸襟淺鄙莫測德誼評於鄉閭文章品於翰苑政在朝廷名在天下何假煩言但三十餘年締結親情有莫能忘焉者如春如醪溫然藹然同胞之愛出自純誠骨肉之好久於初竟發我覆䝉達我幽曲雖同乎相接殆異乎相遇也方公小試夏郎豫亦叨業成均值偶燕亭聊足相慰者幾再易寒暑復無妄適災於奄忽風萍各涣於天涯可樂者無幾可悲者尋至矣相續來歸違越百里煙草芊眠塵機縈滯情雖親而迹益疏雖公之再起再歸日月逝而㑹晤稀青眼寥寥白髮種種矣况乃牽絲冀北解組關西中間相去又幾十年鴻魚固不相棄而留想亦自遙然也仰過公閭扣門秉燭把袂披心悲歡交切覽容鬢之凋然慨精爽之殊昔且驚衰老而猶喜有香山之約也指屈海峯遙期勝槩拽藜雲石帆錦煙溟掃殘紅於春醉採落英於秋風擬襟抱一時之豁如式爾我崦嵫之竒遇也何意宿隕山摧老成云逝冥漠其不吊矣哉聞訃震惶魂越而淚血悼離合之靡常傷嵗月之莫待公其如遺我生其無意矣夫腸斷遙天扳舁罔遂託愛子執絮酒一表厥衷嗚呼公不以生樂不以死哀蕭然於造化中與元氣相徘徊今古誰能不死公何戀於塵埃墓門寂寂雨雪皚皚白楊含風𤣥泉生苔生人之情曷既逝者之往詎追三甥在傍英爽若來九原冥冥使我心摧公其風雲而浮耶水之在地而沈耶精爽攸寓將無感於斯哉祭亡壻毛尚寶文嗚呼子之心胸涵千古而莫測子之才華豈近代之易得聆子之唾嗽瓊珠綺粲之恱心依子之光儀玉樹清標之動色詩禮浸涵自五馬之庭金紫承傳本三公之德北超鳳闕匪懈之義履霜月於娟娟東慕鶴巔無忘之誠睇雲溟而惻惻播芳聲於畿輔以得御為榮仰芝采於依稀以封侯未亟忽鳳臺而失侣屑膠水以求皇荆布不鄙幽燕相將海人衰晚爰資清光豈意帝簡金城一方忝與葭莩朝夕相忘久子之處也飲醇醪而罔覺其醉美子之度也探淵海而莫可或量把酒論文落青燈於殘月鳴琴逸興共清風於偉篁蓋冀其同遊百載尚虞其各宦一方何意一疾之奄歘竟致百醫之莫良仁者必夀兮子何為天天何迂濶兮善有可疑要自有數兮今不能移而尚亦有報兮胡可度思秋風淅淅兮使我心悲燕臺悽悽兮老鶴如癡惟酒兮在罌惟痛兮有情魂來歸兮鑒此誠淚不斷兮吞此聲代京師王次菴舉人兄弟祭亡妹文嗚呼淑人復能覿閒雅之貌耶復能寧故里以慰骨肉之情耶翳其長逝而不可復追矣夫神飛越而震惶氣填胸而淚漬尚忍言之夫以柔順之德謂其可以衍後也而椒聊摧焉堅貞之質謂其可以永世也而昆岡火焉得非冥冥迂濶昧以難明天道有足憾而人情有不能堪者耶然青鸞杳而瑶池寒顧氛濁其莫攖霓裳邇而瓊樓迥何世俗之足戀淑人諒其有歸矣奈離腸斷而骨驚方寸死而魂銷其招之何據挽之何由也哉覽春花其在目挹寒松之可哀清氷凝而留想素月流而恍驚淑人之去若不可得而知兄弟之情抑豈可得而或盡耶况髙堂人散於斜陽南浦鴻分於夜雨謂存於少者可延而後於悲者相慶矣今復若兹殆出於意之所弗及而事之難以逆焉者矣亦復何如其痛撫焦鬚其若割慨睿謀以何偕曹闥虛而影滅秦臺寂而聲沈蘭薰充堂醁香泛斚同胞之酸恨無窮異路之芳魂莫即嗚呼嗚呼其來歸祭濰邑通家翁文嗚呼德蓄諸躬幽巖沈而未揚善薰諸逺頽風易而淳龎不以其銷然者悶然於懷乃以其充然者暢然於鄉井里之璞含光短褐空谷之蘭斂艷羣芳衣薜蘿兮以歌以觴老嵗月兮惟瀛與滄淑後之義要有本於嚴詁達人之報亦何爽於𤣥蒼奮跡青雲大魁天下徵昌白首晚慊斜陽廊廟之猷其庭除之藴奎章之焕協褒錫之良韋布珍於萬乘波澤演於無疆囂然宇內而何憂何歉陶然冥漠而匪存匪亡通家之誼情每關於哀惻執紼之違迹有間於渺茫匍匐後期望松楸而絮奠愧慙無既掃泉臺於蕪荒靈兮來兮我依我將祭內叔髙翁文公跌宕於山海間垂老猶有英氣八十餘齡酣歌陶陶不役聲利終始克家之操共德無忘平生力善之心早夜不置純孝之誠老而且慕垂訓之良義方無替諸郎滚滚冠裳躍馬季子昻昻風雲展驥昌於後者垂黃曳紫九地華榮光於前者飛龍舞鳳九天寵異悠悠冥漠中𤣥鶴崑崙青鸞蓬島則又何事嬋媛於塵世然而薰斯芳也酹斯漿也南氏之於尼翁豈無揮淚代祭年家孫翁文哲人逝兮江之水湯湯靈莫擬所之兮雲飛大荒純德何依兮蓬瀛景望英聞不朽兮清風以長淑嗣不偶兮𤣥報未疆追琢有自兮美哉圭璋忝附驥末兮竊淑餘芳遙藉慶祉兮雲衢聨揚敦同袍兮抱寸心而夙降延世好兮趨杖屨之未遑山川兮雲雨異方蒼苔兮日夜以黃二豎幻兮侍藥罔將石城鬱兮夢魂渺茫切哀感於區區負遙懷於未彰兩愧幽明一罪滄洋顧秋巔以游神託霜鴻以致傷楸梧悲而西風淅淅寒花萎而宿莽蒼蒼灑涓滴於雲隈達誠欵於海鄉逺兮邇兮我心有藏靈揚揚兮慰我以回翔祭丘母夫人文嗚呼母之謝塵寰而去也曾莫掩乎雲旌母之歷清虛而遊也伊何慕乎遙征蓬瀛歸而波淺瑶池返而花明偕萼緑於鳳馭追杜蘭之雲軿揮珠璣而弗屑委錦綺以何輕蔑泥封於宸極鏘珮玉於太清超氛埃其如遺陟仙界於渺冥有範在庭有訓在經有子維楨有孫惟繩福夀巋乎兼美生死允乎兩榮早內交於賢嗣將以淑孟母之芳聲越山川而百里竟不慰范子之幽情違晨昏於海曲忽飛訃而震驚愁霖冥而秋徂北風發而寒凝某也歷墟莽登丘隴而西來於以敬祖乎佳城和薤露以銜哀俯金扃以致誠三酹瑶漿一哭𤣥靈代諸僚友祭邊太夫人文嗚呼母之逝也良可哀傷母之生也曷掩其光産自名閨春松茂清標於煙雨歸於巨室夭桃成淑教於家邦屬既絶之哀絃辛苦無違戒雞鳴而弗怠拂先遺之弱鷟劬勞莫恤懲葭絮以何忘既而秦臺鳳失隻冷孤楊鄭館蘭摧一存兩亡天地永而堅百年之苦節氷霜冽而繫萬古之綱常分熊檗於寒宵勉學小子刃機絲於暇日激紹先良不欲墜厥緒者母之貞志必欲昌厥後者母之遺芳果而挺桂林之仙枝香浮蟾窟出芙蕖於緑沼秀絶帝鄉玉闕生輝賦羔羊以裨盛世金郊播譽屏豺虎以衛明王萍蹤倐而相值蘭馨契而相將令範表清朝而勳茂醇德醉素交以心降光於君上者母之懿訓益著風於僚末者母之餘澤尤長將覬協斯人之願也攸而彌久厚彼蒼之艾也夀而且康慶泰嶽之崔巍遙遞孟魚於故里沐恩波之涣演終慰萊綵於髙堂君以子賢賚遺有隕子以君祿仁孝未央何意桑榆暮而悲泉沈景望舒缺而婺宿韜芒珠沒瀛川地下抱倚閭之痛恨烏啼燕樹天涯憶杖魚以倣徨報乎我者無盡撫乎我者何殃嗚呼母謝塵界也山川還秀母遺賢俊也金玉其相孔雀堂深乘龍美青錢之選鈞天日邇石麟榮紫誥之章黃泉之幽母其容與青冥之表母其翺翔揚鳳旍兮吾不知其遊瑶池與瓊圃縱鸞馭兮吾不知其偕蕚緑與蘭香某等感風雲而洽骨肉於一旦哀鴻㕍而橫涕泗於萬行忽匍匐以驚骨載夷猶以斷腸北風蕭蕭兮寒山蒼蒼朔雪霏霏兮隂煙茫茫陳絮酒兮靈於何望送氷塗兮子於何方吾於靈慕兮訣絶太荒靈於我感兮依稀在傍代髙氏兄弟祭管子暨貞妹文嗚呼桂林芳枝昆山美瓊何青妙之未揚膺𤣥召於太清而淑人之相從以殞且莫窺其衷誠生同欲也靈胡捐而自輕死同惡也靈胡愛而獨成毅然有以彰天地之大經卒焉無以為骨肉之至情父兮懷汝九原未暝母兮篤汝雙璧斯迎同胞雅愛鸞鳳飛鳴胡隕爾天胡纍爾生視塵寰也若凂趨冥漠也若榮何苟生之不可何苦節以用貞果於自沈不以一勺或慕忍於自毁不以一息易名超然之識出於凡陋烈然之操冠於豪英謂蓋壤之博也嘗以一節而獨咤謂古昔之曠也每於列傳而曽驚邇者金玉之質産於同氣氷霜之烈赫於家聲詩書表垂世之澤山川還儲育之精白髮哭青春於芳草紅淚吊淑女於佳城且不知其死可哀耶行可尚耶聨旌辭祖舉將茫然於蓬瀛送疥文海壑老人七十有三齡病疥痛癢搔楚不勝覬望無痊三年於兹聞昔人有病窮而懟於鬼送之以文余因意其兹或有祟焉者戲效以送曽聞以邾婁取喻者謂患不及於腹心乃有賦楚臣好色者擬穢惡之益深始焉肌膚隱隱芒刺隂侵繼而突顆纍纍珠璣浸淫嗟痛癢之無時悲日夜而難禁搔之而素雪零蠡深無內頃焉而紅露漬熾燎在臨當賓祭而蚤虱潛伏處燕閒而爪甲相尋據不安於綺席僵不妥於錦衾踏月尋階而如慓倚風搘杖以曷任牙籖在案卷舒惟倦停披晴忩忘情文苑屈伸愁豫囊弦索如宫徵不調鸞鶴云疏國手從敵而未瘳虎穴得子以何由猩毫艱於健握驪珠滯於探求綸竿暫歇何意埀鈎斧斤且息無事樵游徒袖手以窺雲谷聊微步以倚煙樓掩鏡扃扉焦心不愜蓬首垢面殘軀如怯自冬徂春擬除舊而更新繼秋復冬轉纒綿以相因胡寒暑之屢易但生滅而仍頻雖康齡其莫支矧頽年而苦辛覬冥逃於壺觴尋復增劇欲效靈於藥石纍見無真良平無以售其智盧扁莫以善其身計無所出籌何所施心煩意亂志倦體疲默仰圓靈潛祝方祈大而四時之運神有所尸小而一人之身鬼或所司如游光之肆癘疫方良之恣隂私三彭傾人於不善二豎為災於出竒或擾於內而沈痼莫及或凶於外而反復顛危適來之咎乃不滋疑渺然衰叟何以罹斯其或不能奪人錦攀天香持毛槊戰文場振修翮於雲漢奮獨步於驌驦負家邦之覬望銷海岱之聲光降罰手足乃若此耶抑或不能獻策金門紓誠帝闕揮翰玉堂分閫鐵鉞勤奉主於鳴琚急親賢於握髮甘貧賤於清時徒懷安於滄渤厚懲手足又若此耶思之思之若將有知甫自成童功名念兹紅顔白髮得意無時不爐不扇手無釋卷暑濕風寒晚齡末見原積漸而身災更崇愆而神厭或不事犁鋤專尚清虛錦衣華堂寒熱媒且彼幽斯瞰患曷可除伊戚本於自貽蹊田過於見奪被其毒者甚於水火主其柄者欲其轉斡以富可戀歟世宦清廉而自若家聲琴鶴以相承汝將窮奢而極欲我非金谷與銅陵以貴可附歟投簪二十餘年結蕙海山云暮汝將炙手而趨炎我非權門與要路反覆長意憤惋不直學道平生四體罔失撝謙敬恭素履坦易薄氷恐陷琬琰如執蹈舞何知樂兹樂實爾稱為鬼號曰通靈胡滯於一胡混於冥指摘萬類用裨紀經德惟錫祉惡用不寧乃有倍孔子之四達道蹈孟云之五不孝翻覆雲雨貪殘虎豹鑽緣相髙奔趨胥效撓亂綱常蠧壞禮教爾宜橫其祟充其類變而通咎而備使之癢疴以反其躬自其疾痛以殺其恣於逆黨死而後已雖偷生少焉知忌不愈於無妄以肆災亦足為乖氣以致異盍知往而察來盍異趨而斯避便須遄駕速宜縱轡蘭薰椒醑之莫陳桃弧棘矢之將纍若其慷慨遂行是謂有知且明如復夷猶濡滯乃謂無識而盲尋畢除而無悔其戒滿而惡盈嗚呼别矣式將訣兮天下之情動之惟誠黯然銷魂者原於意氣之相傾願為比翼者激於交好之莫并爾於我乎何榮吾於爾乎何矜伺行李之將戒覺微躬之方瘥為歌今日之驪駒效贈昔人以不拜海壑吟稿卷十
