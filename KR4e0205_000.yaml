body:
  text: 海壑吟稿别集類五明提要臣等謹案海壑吟稿十一巻明趙完璧撰完璧字全卿號雲壑晩號海壑膠州人由嵗貢生官至鞏昌府通判是集詩六巻文五巻王三錫序其詩集謂嘉靖間筮宦司城抗直忤權奸與楊椒山公同厄按集中北司獄中七言律二首序云嘉靖甲寅秋秋曹檄捕豪校某因獲罪東湖翁劾執坐死賴元老科臺之力僅復瓦全云云東湖者陸炳别號也時炳為錦衣衛都督與嚴嵩表裏為奸其勢張甚完璧以指揮末秩能與之抗其獄中與楊繼盛倡和諸詩有辛苦不妨淹日月援書喜有漢良臣等句繼盛死西市完璧作楊烈婦詞以哀之有小雅怨悱之遺可謂志節之士其詩多觸事起興吐屬天然絶無呌囂怒張之態亦與有明末造矯激取名者有殊徒以名位未髙史不立傳遂幾於湮沒不彰僅賴此集之存猶得畧見其始末亦足見正直之氣有不得而銷蝕者矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀海壑吟稿序海壑趙先生今年八十餘矣吟稿其平生所肆力且以自媮快者也蓋先生位不償才故以其未盡用之志寄之於詩久而成家積之成帙云先生之子為今大名守清廓君於余弟輔為寮長而與余姪坤同進士也則余於先生有世好之誼焉一日弟輔受是稿於清廓君既付之梓已又偕大名倅韓君等致書於余索余言以弁其端余取而閲之因得以見先生於詩詳先生之始末則益嗟嘆歆慕之矣昔太史氏有云詩三百篇大抵聖賢發憤之所為作也迄至盛唐如李翰林杜工部二大家古今稱卓爾者亦皆意有所鬱結不得通其道耳先生幼負才氣謂功名可指取已而數不偶從嵗薦就秩都下而先生業已著詩自娱無他愠居無何績效懋著聲籍籍於縉紳間人謂先生脱頴之才已試囊中矣然先生一意危行不為媕妸媚世竟以被中逮繫方其時人皆為先生震怖顧先生特屹不為動適椒山楊公同時在獄與之吟咏酬答以道義相得甚驩於利害之臨泊如也故余讀是集中至獨知心上原無累與授書喜有漢良臣之句則輒變色動容亟服之焉最後謝天水之郡判以歸世方彈指咄咤以未能究先生之用為惜而先生内沾沾自喜以長有天地之日而竟其適於詩為幸蓋自其立朝時已嘗自命云何時謝朝組隨意踏莓苔由是以觀則先生者尤泥塗軒冕浮㳺塵埃之外古之所謂達者也先生既歸徜徉林壑觸趣成聲或幽踪雅致廣蕭散之懐或精裁婉托寓無聊之感憫時廸志談理訓真則翛然方之内含和茹泊悟𤣥超凡則悠然方之外其所咨嗟咏嘆即時或自鳴其鬱結不平而絶不為呌噪怒張以恣其臆蓋先生之發憤於詩垂數十年而不為儻來之物以滑其内而奪其功故振之以䧺麗而出之以優㳺卓絶一時有如斯者語曰用志不分乃凝於神豈謂是與假令先生以其直節壯猷托景青雲係籍華懋表樹嵓廊之上馳騖萬里之途其勲烈可勝道哉廼其所厯宦踪僅僅止此遂巻之於泉石巖谷之間非其當矣然先生志不鬱道不窮其發為詩章必不能自力以致必傳於世如今雖使先生究所施舊勲烈於一時吾不知先生肯以此易彼否也雖然吾又聞先生年已逾耄而神猶屹屹不衰其文思不少减於壯嵗矧今太守君抱猷宏峻且偉然有公輔之望由茲以往先生之未艾者年未巳者詩而未可量者後人之勲業也則先生於不朽之事可謂兼之矣余復讀先生詩至庭下伊臯之語厯古詩家詎能有之乎􅀈嗟先生固足以自媮快矣哉濟郡見峰王之垣頓首拜撰
