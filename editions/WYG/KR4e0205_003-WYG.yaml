body:
  text: 海壑吟稿巻三明趙完璧撰七言律詩上曉眠枕畔鳴鷄是幾迴不關禁鼓塞笳催曽宦遊都城隴西故云陶然人集彤庭後嗒爾日髙滄海隈門掩松堦昨夜雪濤飜茶竈午時雷朱簾不捲沉清影莫放閒雲擾夢來壬申夏日赴西莊南薫吹醒市塵愁冉冉新涼六月秋夾岸緑楊蟬不息連村青靄雨初收巾車迤邐蒼葭渚藜杖逍遙白鷺洲一片野心何所繫野花啼鳥共優游鹽城官舍暮雨感懐暮雨霏霏動客懐宿雲靄靄伴空齋無端冷氣生虛壁不盡寒聲下緑槐故識夢中揮玉塵舞衣海上溜金釵清風自笑無飛翼滿眼烟波奈楚淮嘉靖丙寅八月十日祝萬夀聖主仙齡甲子週西風吹喜溢中州赤天星彩光宸極瓊島烟波度海籌萬國衣冠朝紫府五雲幽冀仰丹丘軒黄身世全無補天保髙歌舞未休即景八月淮海客孤城髙齋暮景何如情孤鴻落日天邊去雙杵秋風月下鳴滿地花飛紅雪冷一庭竹合翠雲平禁他離思沉酣睡奈爾寒蛩日夜聲鹽署不寐樓頭鶴鼓四更撾枕上蝶飛不到家風透紫綃涼若水露濃催織静生譁詩因苦思聽殘漏燈為無眠數落花夜夜竹窗縁底事碧雲看盡楚天涯懐月林坐杳音塵是幾年思荃心事自懸懸天涯鴻鴈秋將老江上青山日對眠夢斷故人蓬海月杯停新恨菊花天淮南乆負白雲約去住幽情各黯然丁卯鹽城元日喜收雨雪自經旬侵曉晴光逐嵗新大造有知開景象萬方無地不陽春日長詩酒清淮客風暖絃歌太古民垂老唐虞何以報年年庭教漢良臣鹽署凭髙晩望北望滄茫眼欲迷碧峯斜日晩悽悽烟光度鳥白還沒水色連天青更低千里秋顔吾已老萬山雲樹思堪題曽耽麴蘖滄江外不醉闌干玉署西小僮綴磁片代簷鐡風中琅然可聽畫簷飛度玉丁東雜佩仙人緩步空黯黯楚臺隨暮雨迢迢銀浦下秋風無情苦為多情擾動處生憎静處逢一夜不成千里夢轉看殘月向朦朧送温玉齋三尹擢典魯藩一杖清秋且未歸錦㠶先送楚雲飛髙風曠世驚青眼落日遙岑隔翠微江國有情人去後客懐無計鴈來稀王門乆負雲和曲此日淮南正可依秋日署閒即事玉署髙風鎮日清開簾滿院緑苔明慿軒聽鶴鳴晴圃倚杖看雲過古城翠徑幽花留晩色粉牆脩竹撼秋聲居閒不染塵埃迹同調山翁匿姓名鹽署聞丘月林擢赴南太常舟過寳應遣送聞道飛㠶楚水秋碧雲深署奈羈愁參差鴻鴈違青眼咫尺烟波滯白頭八月仙槎天上客十年情思海邊樓青燈莫慰江湖夜新墨淋漓送綵舟次韻鹽城月下聞笛羌管誰家弄月明晩風清度隔雲聲悠悠夜館渾無賴裊裊江天别有情楊栁凄涼鄉夢斷梅花零落鬢絲盈䦨干十二醒殘酒憔悴年年客楚城次韻水中花影穠花瀕渌興悠哉晴滸佳期心眼開帝子綵雲歸極浦影娥明月下瑤臺綺羅錦水經秋澣紅翠青銅向曉囘自是馮夷宫裏勝玉欄長倚碧烟隈鹽城秋夜覺後聽雨分明䰟夢到家來却被閒窻細雨催栩栩千山隨意去匆匆一榻故飛囘懸泉不澣羇愁惡長夜難將曙色開心火不隨爐燼滅倚聽寒鼓下樓臺鹽城歸遷舊居登樓偶成白髪朱欄快一凭珠山南跨枕滄溟烟中浩漫連天浸雲際峥嶸括地青千古畫圖詩興濶四時風月醉䰟醒蓬瀛不用飛翰去坐嘯青雲送暮齡春遊迴文忙裏閒情娛景華度溪尋壑驀晴沙長原翠漾雲浮草暖徑紅飛燕落花狂詠客亭春把酒憩留僧寺晩烹茶香生陌霧飄風軟蒼莽踏來遊路遐夏日迴文紅榴石畔海光晴寂寂閒堦曉翫清風静栁亭凝靄細日曛荷沼映霞明桐青坐暇休炎暑草碧眠慵廢讀耕空院小吟長晝静同誰興飲聽啼鶯秋懐迴文寒烟淡㸃亂山青眺逺傷懐老渤溟湍急落聲風拂樹鴈飛涵影渌開萍榦侵冷月宵吟苦壁訴哀蛩暮酒醒殘調古琴横竹石蘭芳歎寂佇孤亭冬曉迴文紅日初醒睡起遲捲簾朱戸暖烟披鴻飛目斷雲山逺鶴伴人閒曉枕欹松雪覆堦清入畫竹風鳴院靜吟詩東窻爛影移霞綵蓬髪短歌酣酒巵漫興弄罷素琴看鶴舞歌殘空谷聽鶯啼蒼苔細數閒花落白晝清眠春草萋雲去雲來滄海上日生日落翠屏西悠悠野鹿乾坤老垂白無心更釣溪冬夜撥火青宵聽煑茶蘭燈燒落玉蟲花月明當戸清如晝霜氣凝庭靜不譁凍折氷絃驚睡鶴寒生風樹起啼鴉幽人不盡松窻興坐送清隂下碧紗煑茶聲石鼎春茸靜自烹寒泉暖焰戰分明山蟬泣露秋仍細松葉吟風晩更清不雜塵譁隨斷靄偶醒殘酒傍孤檠芳聲不為朱門沸獨聽幽軒慰野情霜月玉魄鉛花晩逐飛素娥青女夜忘歸窺簾暗迫肌生粟到地明看星射輝竊藥路茫蟬鬢老拊膺人去蚌珠依龍墀如水瑤堦滑争似烟光臥掩扉送劉春臺太守朝京朝天旌節海邊來殘雪荒亭送玉杯風樹有情絃管外鶯花如夢水雲隈翠麟烟靄瞻堯日丹扆勲名陋漢才鵰鶚不堪林石思旋將霖雨過蓬萊壬戌秋夜聞雨不寐憶亡弟介泉枯竹窻前雨未闌離鴻聲斷夜生寒哀蛩切切金爐燼銀燭凄凄玉漏殘風樹不休人不寐池塘無夢恨無端聨牀更作來生約慙愧鶺鴒淚暗彈芍藥一枝紅藥紫峯前半出青叢露未乾脂粉不縁粧鏡曉塵凡適偶玉臺寒芳姿苦惜忘斑鬢清賞長將倚畫欄錦瑟無聲終日醉黄昏猶約隔年看次韻玉泉驚飛神錫翠岩開㵼出瓊珠渙不囘風帶潮聲千澗落雪翻寒色一時來清流人逸娛髙枕渟影龍歸撼上台一脉九天輸萬古滄波未必更塵埃簷前鳴玉碧雲初斂畫簷空何處飛瓊向晩風破靄聲疎寒寂寂步虛人邇夜匆匆燒殘銀燭寐不得滴盡銅壺興未窮清影依稀珠箔外二三竿竹月明中曉鐘曉鐘不異夜來鳴昏曉相催合自驚曙色㣲茫分宿靄年光斷送向殘更長鯨殷起風塵思短髮徐添雪刺明老懶無妨停午卧匆匆莫悞鳯樓聲代人送同年推刑泉州風雲萬里覯仙才何事春深白鷁開瀛沼鳯鸞今在簡炎荒雀䑕㑹看摧馬蹄曉送黄梅雨羊角秋生翠栢臺官栁斜暉無可贈民情此日正堪哀冬日過雙塔僧寺漠漠風霾白日黄浮屠繫馬慕清光畫廊烟静魚聲歇寳塔雲中鐡韻長雙鬢塵凝憐俗狀滿懐機擾斷愁腸衰年苦為微官縛白社風流詎可忘都城冬夜不寐感懐雪霽清宵迥未明宫城漏結斷寒更鳴風窻紙驚殘夢如水衾稠冷宦情三徑已荒人未去尺書乆滯鴈無聲衰年猶自甘勤動升斗如何不解輕都城西香山寺獨宿香山正寂寥慿誰詩酒縱良宵檻前山色千年畫枕上泉聲半夜潮風雨滿天劇愁思乾坤無地作逍遙翠微夢破紅塵去清景曽教負聖朝乙卯九月七日西城聞慎修秋捷齊川秋捷迅燕山青妙功名慰鬢斑何益父書標錦奪早繩祖武桂香攀五雲喜溢蓬瀛外一日光生海岱間聖代世恩深雨露馬牛無補汗衰顔咸陽懐古悲風淅淅古咸陽百代遺蹤自可傷王氣有歸弓劒沒寢園無祀野雲涼蒿萊滿眼英雄去翁仲含情嵗月長索寞秋原那可問碧峯斜日向蒼蒼㑹寜縣旅夜簡吳檜皋太守堂翁薄衾寒夜卧如弓萬種羇愁輾轉中有慰月輪來海上無書鴻鴈過天東百年身計老仍拙萬里歸程夢轉空落葉滿窻人不寐坐令銷瘦愧無功南山曉歸苦愛雲山風景幽百年心事幾曽休是誰於此長相絶顧我而今不自由翠巘有情遙送客蒼烟驅馬重囘頭塵羅卒抱崆峒恨多少浮榮多少愁丁酉省試畢曉歸東省飋飋西風已老秋海東歸騎曉悠悠荒亭落木蕭蕭下古渡寒烟冉冉收董賈萬言珍楚璞燕齊三戰逞吳鈎壯圖早晩青雲上折取天香慰白頭瀕溪曉行玉驄䇿曉傍寒流水自悠悠春又秋矗岸颯風飜木葉蒼葭棲靄暗汀洲波間魚逐真相樂沙上鷗眠不解愁漁艇釣磯無限恨塵勞何事不相謀夏日同張蓴江太守海遊得海字即席偶成桂棹蘭橈泛滄海微薫晴日萃僚寀澄波萬里碧泓瀜遙山幾㸃青􅐑嵬笙簫嚦嚦醉醁􅌬烟靄迢迢聽欵乃囘首風塵萬事忘臨江横槊今安在再過金山未得登覽舟中望而有作兩過金山登未得風塵空復抱髙情乾坤勝槩還千古詩酒無縁負此生心逐白雲環巘崿棹隨流水趣江程營魂未慰縁何事挂帶山門愧昔盟春日淮安道中春日遲遲古道賒東風遊子倦塵沙方塘水暖鴛鴦睡平浦烟消鴻鴈斜滿眼青山非故國一鞭羸馬去誰家賦詩飲酒天涯興莫遣離愁老嵗華哭水南翁吁嗟㝠漠太夢夢喪我通家鶴髮翁髙世才華先子畏忘年交誼古人風他鄉風雨愁相慰故里觴詩老更同𣺌𣺌斷魂何所仰凄涼淚落水雲東妓者失明合惜秋波不可醫芳心不滅欲何為綺窻曉日迷青鏡金谷春風謝紫巵絶望逺山空舊恨傳情無地罷新知琵琶記得從前譜一曲嬌歌淚暗垂謝吕乾齋僉憲故人見過蒼唐草樹慘髙秋海上民風殊可憂赤縣恩光宣魏闕碧烟旌斾達瀛洲九霄鸞鳯欣青眼十載江山盡白頭豈有芳聲駐車馬故人雅意自綢繆木魚聲僧魚聲度晩烟青索寞松廊徙倚聽緩急自隨仙梵落迢遙已覺睡魔醒風前暗㸃愁城破月下從教慾海惺清味空門今不厭禪關何處好傳經九月庭下杏花寒露凄凄肅曉旻嗟渠何事再榮新西風化擬東風早落葉枝同未葉春歸燕尚懐寒食約黄花曠值晩秋晨當陽慶際重華聖合有調元此細論上程碧溪太守守名世鵬廣東人萬里雄圖仰徳光扶搖東徙慰窮荒精忠翊聖風雲迥枯槁囘春雨露香一變曠聞周禮教千年喜覩漢循良清時赤子今何幸白髮丹心世未忘已酉下第青門淚落海雲飛青紫曽看拾芥㣲五十文章猶錦字三千勝負有𤣥機朱衣棄我孤豚細翠岱嗤人匹馬歸却喜諸郎盡英妙巍科應復慰重輝次韻顧文昱公白鴈紫塞翛翛素作儀關城寒早帶霜飛湖天曠失雲中影漢水長迷月下輝瑞葉九天曽拂羽荻花何處旋為衣上林玉訝囘陽侣擬自蘓卿雪裏歸李亨菴見枉因示佳製用韻感賦小洞傳呼啟碧蘿逢迎無奈竹婆娑山樽有興花為妓檀板無聲鳥作歌宦海冠裳萍梗跡浮生日月玉人梭冦公此日真難借白首相酬莫厭多送李亨菴太守擢貳河間二首赤夏辭東何處遊五雲直北是瀛洲華胥夢破孤城月𤣥朔情違一葉舟白雪俄驚調滄海綵毫無計侍清秋幽岩莫逆佳期在早晩霜臺慰别愁翠靄銀塘紅蓼花玉人青鏡送仙槎山光悵别孤雲暮㠶影關情落照斜五馬春歸漳水際孤鴻秋斷海天涯何郎無奈𤓰期早坐遣清風去思賒王冠峯見招觀蓮阻雨簡復正憶仙芝豔豔開報書忽下紫鸞催纔驅羸馬西溪度旋逐狂風北雨來絶代妍華勞逺夢片時歡賞阻英才横塘十里烟雲冷自昔佳人不易諧次韻賞蓮芳姿裊裊出晴波烟破虛明照影娥紫豔生香風自逺紅酣吐暈日偏多盈盈帝子來湘浦脉脉天孫隔絳河莫謂無情情亦在休教解語動清歌秋夜聽雨小飲二首坐聽微雨夜如何小飲秋堂樂意多臉上酡顔忘白髮杯中燈影晃金波髙臺魏女空揮淚片石羊公乆自磨今古滔滔春浪湧一迴長歎一髙歌莫教煩惱心常累曽悟空門水不波萬古此生真可惜百杯良夜豈為多逐臣自笑山林僻幽室還宜風雨過縱酒放歌今不樂寒蛩昏曉欲如何沙川東望小橋東畔過沙洲一望清光雨乍收雲矗山腰横玉帶水環屋角遶蒼虬磯邊楊栁堪垂釣天外滄浪好放舟鄉土有情風景勝白頭心事共誰籌詠孤鴈曳曳孤飛何處來嗷嗷四顧不勝哀虞羅駭失遙難合烟浦㝠迷渙不囘故侣有情天逺大斷雲無賴日徘徊長鳴帶月秋江上影落寒波秪獨猜送慎修兒還任兵曹好去神京奉聖王休隨兒女戀髙堂雙藜斜日猶强健百畝終年足稻梁有寵自天皆雨露無能報國祗純良兵權繆與期前美老擬營丘樂未央送江龍所通府署州西還荒城嵗晩事多違無奈悲風送客歸鴻鴈數聲留逺思海山千里尚餘輝春觴漫酌聊相贈冬日遄飛不可依霖雨無私更何地東人空有淚沾衣次韻壬申元日大雪纔看青鳥啟芳辰滕六飛花爛目新帶雨無聲潛入夜裁氷不解暗生春年登南畝知誰卜日醉東風樂更真十四飛鴻促銀燭不知斗柄轉髙旻趙烈婦趙董生妻也董早沒趙隨自經以殉鄉人哀之余亦感賦玉委鴻毛何太輕天常蚤已獨分明破來蛺蝶人間夢合去鴛鴦地下情斑雨恨遺湘竹淚紫簫凄斷鳯臺聲誰將銀筆清風下不為衰頽著令名癸酉膺封萬厯新主覃恩老夫婦以慎修兒備員夏郎叨與殊典鄉人稱慶乃以不肖當年七十有四老妻六十有九而於先朝又曽各沾一命白有司匾雙夀重封以榮之因而喜賦蠢愚翁媪眷清朝秪以兒曹媿冒叨鶴髮雙逢千載慶龍章重下五雲髙虛生豈有㳙埃補小子曽輸犬馬勞末路寸衷無地報肯教庭下背伊皋夏夜落日逍遙向晩涼芳庭孤坐興何長碧虛露下塵寰靜銀浦雲消仙路茫兩腋風生飛海嶠一天星動蕩滄浪通宵無寐超人境祗恐曦明墮舊鄉暮春雨霽感懷風柔雨霽暮春天可恨塵寰不了縁栁色不知城郭外鳥聲巳亂市囂前桃花野逕雲中騎絃管湖天鏡裏船多少風流賞心事白頭擾擾是何年冬夜聞逢迎鼓角寒夜三更鼓角鳴遙知下吏苦逢迎氷霜透骨㣲名縛軒冕凌人四體輕枯栁門閒無限趣紫芝山静有餘清衡茅真自髙風在榾柮煨爐睡到明次韻秋日書懐二首簡紀湛泉機頭鼷䑕靳千鈞芰製曽教汚紫塵掇得籬英輕斗粟步來谿壑謝蒲輪不才白髮違明主多病滄浪縱逐臣忙裏琴書醒後酒秋風瀟洒自由身歎老驚秋倚畫屏摶沙功業竟何成心勞刻葉終無補技擅屠龍豈令名撫劍停杯不自醉横琴弔古為誰鳴兒曹别有岩廊業林壑清風且讀耕詠漁萬頃滄波恣所如水雲清曠豈忘渠長烟鷗鷺情偏洽細雨蒹葭興有餘幾日醉來村舍酒一生飽足釣船魚湖天縹𣺌無相識一笛幽襟月下紓詠樵翠巘千尋斧白雲髙風杳不染塵氛襟裾毎帶烟光潤毛骨常從蘭氣薫松下看棋迷甲子夜中煮石待燒焚山深嵗老韜名姓一笑那知麋鹿羣詠耕一犁沉跡野雲邊百畝蕭然桑柘烟慊意杏花春雨後浩歌金石晩風前飯抄雲子終年厭酒盡霞觴對月眠鼓腹豈云非帝力明良應慰老林泉詠牧野趣閒情一跨牛烟簑雨笠此生謀挂書旭日桃花塢叩角秋風蘆荻洲笛裏關山今古恨笑中榛莽貴豪休斜陽古道頻囘首多少英雄名利愁用韻寄答東萊張南溪老長府舊友二十餘年乆别來丘林衰老愧仙才觴詩即景心猶壯松菊怡情手自栽青眼故人常在夢白頭心事已成灰詩來慰我情如結舊恨新愁不易裁鹽城初夏官舍獨坐幽軒晴晝上瓊鈎長夏清光寂寞儔竹影恣狂風裊裊楊花隨意日悠悠短牆蝴蝶移春去獨樹黄鸝只暫留惟有海雲推不散欺人白日到牀頭夷齊廟二賢千載尚餘休古廟荒涼過客留秋圃空聞寒鴈度棠梨惟見野蜂遊拾薇谿壑孤忠老棄國烟霞百世謀一掃寒蕪倍惆悵可堪聾瞽更遺羞春日旅中春日融融雪漸消客懐鬱鬱思無聊虛庭風細松聲落薄海雲開鴈影遙書劒可堪淹嵗月樓臺何處厭笙簫朱簾不動爐烟細一曲絲桐慰寂寥次韻春日匡氏西堂二首沙暄遲日慕山堂拽杖東風踏莽蒼野鳥隔林清弄咮桃花流水暗生香閒依脩竹頻攜酒静愛孤雲獨據牀潦倒揮毫渾漫興髙名真自媿王楊野塘鷗鷺靜比鄰何用藏犀此避塵芳草緩尋違俗物落花沉醉作閒人溪頭緑浪無歸日栁外晴絲不繫春白眼寰中誰是伴青山海上一佳賓海壑吟稿巻三
