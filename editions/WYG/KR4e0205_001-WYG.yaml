body:
  text: 海壑吟稿巻一明趙完璧撰五言古詩感興淳風不可挽大道成微茫椒蘭不自保惡榝以充囊自愛瓊珮姿期以揚清芳美人改中路徒此明月光聞愼修兩臺交薦顧我寡昧子庸庸何所長祇有一寸心可以昭夜光藏息良有由持贈美人傍念此蹇修理愛惜以崇芳籠鳥歎山鳥胡不幸罹此樊籠中啄不獲野田栖不及深叢梳翎背旭日垂翅當寒風徒抱曠逸懷側目雲霄鴻祇縁笙簧音乃滯幽囚窮嗟嗟耳目娛盍以物我通冬夜書懷新月衘寒山北風下簷楹羈人夜秉燭孤坐遠含情𣺌𣺌海山曲依依鳳凰城禄薄十口饑官卑一身輕印綬鉗鐵堅風塵魂夢驚枳棘忍自栖鹽車向誰鳴舞劒尚餘輝彈琴不成聲賴有杯中物嘯歌仰太清月林遺酒西臺感賦故人遺我酒我悲故人心故人不可見使我愁思深畫地誰能違刻木威難禁烟霜夜凄凄鴻鴈秋沈沈衣葛當北風餐荼絶衷腸怨艾去禍胎今古歸福堂把酒且自飲淋洗欝寃傷嗟嗟同心人翦燭今何方冬夜感懷髙齋夜獨坐寂寂銀蟾生疎簷素影下閒堦秋水明冷光侵我體清輝怡我情獨酌不成醉幽吟無與賡坐乆静不寐松風落寒聲悠悠東山下嵗晩沈髙名拔劒自撫拭咄唶空悲驚飲馬長城窟行飲馬長城窟馬渴飲不巳馬飲良易足我懷當何止疇昔離故鄉淹淫㡬萬里明月缺復圎邊聲日充耳精魂遶天涯日夜邈伊邇仰天不可呼歸鴻背我起燕然勒㡬時大刀難自揆一身寄他人未保生與死横頤斷腸淚墮落長城水長城水不竭離情不終歇棄婦辭棄婦出蘭房長辭薄倖郎憶昔授綏曰合􅈟雙鴛鴦相為琴瑟歡宜室期餘光自君蕩春心嬖愛章臺倡冶容盲爾明荆布成惡裳嬌歌褫爾魄沈黙非巢簧銷神復索家顧謂邂逅良劬勞敬克室反目卒為殃子為邪孽迷妾為君子傷賤妾不足惜古道孤肝腸淚出身亦出請試倡短長代鶴言山人遺鶴蓄乆而馴擾彌甚家人斁焉羈諸柙無令縱恣嘖嘖晨暮不休余聞而歎乃代言元化洩靈淑産此神異姿皓潔煥氷彩不雜塵埃緇啄慊四海雲九霄惟所之忘機天壤間何意虞羅欺鎩我紫氛羽劇我青田思垂翅雞鶩羣矯首燕雀嗤良玉汚塗泥仙格奴𨽻司昔為青雲器今為糞壤遺鬱鬱寥廓抱依依知者誰開此含丹睛迹滯無異窺胡為作近翫養翮以前期静寧曉發曉出静寧郭山川鬱蒼蒼初日韜𤣥霞凄風下崇岡鉛花肅寒色嵐氣昏朝光山木涵烟古雲泉𠻳石凉我車亦何之高誼圖忠良日短不遑食暮夜成倉皇空谷越營魂冷候嗟薄裳遙途力應躓修坂馬𤣥黄鴻鴈聲嗷嗷望之思𣺌茫飄颻迥不見横涕知㡬行漁父詞世道乆交喪人心不如水蕭然一釣舟滄波吾老矣棹去鏡中天歸來蘆葉裏魚鳥作比隣風月還知巳江山萬古情烟雨平生喜雲静捲釣絲得失何心爾雪中無羊裘日長迴獵士坐看驚濤帆戒險知誰是而無名利懷禍患胡罹此買得孤村醪醉中冥甲子悠然快一眠化契青蓑底覺後作長吟横竹雜流徵浩然天地間無復逾樂只誰能質姓名鼓枻不相俟樵父詞太古不可挽空山潛幽人世務無縶縛樵蘇不為辛游日曠烟靄騁懷極嶙峋咄惜聳壑材聊斧臃腫薪空翠冷入骨殘霞每在身谿谷適跫然鹿豕夙所親朗唱振林木長嘯超風塵寓興雲與石逃名秋復春巢由慕狂蹤堯舜非所欽豈云負叔敖含笑棄買臣此中有眞趣物外曾憂貧丹崖一千丈不願圗麒麟夕陽二三束重負嗤丘民頽然卧明月身外安足論七言古詩古道傍古道傍雙垂楊長風颯颯聲欲狂行人巳去寂𣺌茫黄塵一陣空斷腸禽言水兒者小水鳥也天將雨飛鳴曰水兒水兒俗為雨占鹽城乆雨為災猶聞此怏怏以賦水兒水兒穿雲呼雨今何之連天秋水苖巳稀汝慰何多民何其寒食吟芳春苦扃朱户疎簾㡬㸃寂寥雨醇酒何能刷我懷朗吟豈盡幽情吐平湖春草緑如烟安得杖藜緩步桃花阡春夜曲烏夜啼月欲西沈沈院落春雲低玉漏無聲夜將半金盤有酒人欲迷桃花扇底苦夜短千金一刻催隣雞淮村八景為安丘黄甥作淮川晚渡淮水浩以廣滔滔下滄溟長風吹落日烟雨時㝠㝠行人欲渡不可行灘頭且莫相喧争方舟自有濟川術不比無人盡日横朱寺曉鐘山僧睡欲足攜鯨戲蒲牢疎星帶殘月殷殷來曙號驚風吹落仙臺高雲際裊裊回林臯大千種種塵夢勞虛空一破無秋毫浯水澄清奫泫何清澂上徹太虚明纎雲不敢翳萬古誰能并惟有孤貞契心骨波瀾不為生倐忽如何獨漉水中泥水深月暗行人沒蓋峯聳翠嶔崟不可仰縹𣺌通天衢翠色照終古正氣永不渝斜陽斷靄濃未釋過雨晴嵐藹欲滴對爾亭亭一正色彷爾巍巍千仞壁書帶餘香斷簡那可覿秀帶留餘芳乾坤假私息雨露滋春長王孫一去不復返牛羊歸來日應滿野火空將化刼灰斯文根蒂終難斷囊沙報雨夙仰淮隂名不識淮隂陳囊沙今尚存報雨無從信蟲沙之化自可猜千秋殺氣神與偕多多益辦真雄才軍聲十萬風雨來搭嶺連雲碧嶺何崔巍行雲日縈迴相看不相厭怡爾重徘徊衣裳炫爛資爾補蛟龍早晚憑爾雨秋風吹動桂花香跨騰直抵清虚府松池印月皎皎松上月湛湛松下池水月本無意相逢如有期微波不興擬鏡淨一片琉璃迥相映靈機悟取真境中萬海千江同一性海屋添籌二首夀尹金峯侍御太翁涼飇西下吹洪濤秋空怒捲雲山髙紫霞緑霧從逰遨金銀臺畔追仙曹醉指三山看海屋此中籌筭原於穆瀛海仙來九天手挽白鹿秋風前童顔鶴髪不知年五雲竒覯欣何縁滄溟會見歸神籌相尋今古良有由籌同運人同休天同久地同悠夏日小莊即景細柳孤村白日長柴門流水芰荷香幽軒獨撫翠岩光閒庭芳草晴烟薄南薰細細餘花落虞絃静抱憑誰作夢囘修竹聽啼鶯百鳥叢中囀玉笙如何迥不近蓬瀛八龍濟美行贈劉春臺太守丈夫合作人中龍生子擬與荀氏同荀龍之名不可核轉看八子迎春翁翠濤紅雨奮頭角江門霹靂斡春工八荒鴻潤暢枯槁九天一息袪氛雺姬周達騧直蝘蜓高辛才子俱蠛蠓老龍種種赤帝宗要亦海若瑞錫乎天東楊烈婦辭楊子椒山因同難西臺相知乙卯冬被刑避時禁託烈婦辭以傷之楊烈婦情可傷生平雅操氷與霜小姑作逆誠無良衆人黙黙將誰匡直言為姑陳丹心照中堂不惜一人生大義或可揚何意觸姑怒青蠅白璧反無光抱我寸心曲終始誰能詳死以天下事辱為小姑償彼蒼不墮淚萬古摧肝腸西山行西山行苦難去去愁無端盤盤朝還暮登頓凋朱顔孤雲巉巖不可攀羊腸詰曲天漫漫車輪摧盡馬蹄缺頽年病骨傷心酸風霾暗黄日妖鳥哀林巒􅉘虎晝縱横行人恣饑飡艱哉此行良可嘆拊膺摧折心與肝滄溟何在生羽翰白雲石上垂綸竿春溪行送鹽城蘇二尹擢判夀州春溪柳黄君祖行烟開錦浪桃花明瓊􅆽醲凸暖風軟綵舟望絶仙雲程芳聲楚天濶斜日滄波悠孺子縆宓絃寵駕遄西州曠此山水音乖彼蘭蕙儔青陽無定所碧樹生涼秋短髪蕭蕭春欲歇故鄉未去故人别送君天衢努力答明王蓬山迤邐餘休烈懶起懶起懶起六十餘齡閒懶巳癖布被昏明僅庇身竹窻風雨無侵耳農耕不思商利莫齒紛華氷炭權勢巳矣山海悠悠春復秋風花擾擾從人喜醒復成眼覺曾開視輾轉無期非午辰巳枕畔安眠蓬島仙不知牀外有書琴在裏香煖從容一欠伸笑他横足帝腹何心爾爾鹽城獲雙鶴淮南偶得雙仙禽野人慰我高雲心昔閱滄涯彷彿盡凡格適爾華亭清絶誇靈音雪衣六月開煩襟霞顛一夕來遙岑昂昂烟華猶在翮皎皎塵㸃胡相侵天風吹酡顔海月鳴瓊琴爾志九霄逺我懷千古深世無知己沈幽潯日斜逢君猶斷金萬里終當作遐舉徘徊暫爾狎青林清宵篇送孫小渠故人子荆何處來清宵紅燭心眼開燕山一别二十載停雲望斷空徘徊淮南小邑桃李香青藜白髪從翺翔春來㡬日風雨狂閒庭岑寂古蘚蒼錦帆一夕飛滄江相持夢寐驚華堂話來往事歡復傷人生離合參與商顧我㡬多殘嵗月君行咫尺登雲闕神虬靈鳳又何期清漏玉杯君莫歇己丑開都城有妬妻斮其妾之雙足者妻就刑夫逋焉感而賦青娥倐隕雙秋蓮玉魂悽斷千里縁纎弓射反伏未覩凌波履險知誰憐入室之妬莫可測他人所慕吾所捐前魚淚落後魚船飛燕褫魄班姬姸天涯弱質胡相及仇讐乃在香塵邊翦忌不遑圖掩鼻甘心共棄滄浪天昔以要寵今殺身膏蘭自取焚與煎薄命速辜闔室延一朝三褫尤物愆猩猩之履猶在前晚春西原衰翁三月不出城春深早已過清明西原偶爾踏芳草且幸春光猶未老桃花半笑如有情新柳垂青度妖鳥溪聲送客去潺潺村落迎人來𣺌𣺌歩入翠紅徑松烟逸高興墮紫惜年華緑隂怡日静嗟我塵埃人幽境罕相並不如野鴉明月巢林隈空憐海鶴來往啄蒼苔喜來悲晚從徘徊斜日寒山又欲頽曉帆歌送温玉齋玉翁張帆凌曉風飄飄飛向魯王宫涼雲凄雨不忍别把觴挹袂嗟相逢人生落葉全無據我胡來斯君胡去天涯𣺌𣺌無前期若更相逢是何處和風煦我春無涯朗月依人秋正華錯刀欲報媿瓊玖明珠割分懐逺遐汀草萋萋湖水緑烟波斷送人如玉丹蕖十里如有情君胡不醉陽闗曲碧山斜日餘㡬多夢魂失道如君何紅顔擬有青眼時白髪惟看鴻鴈過代鼇山王西渟大尹送周古栢先生擢教天城鎮邊嶔崟牢落滄溟東絳綃青眼濓溪翁雲飛巫臺碾寒魄雨餘金谷流清風瑤草珠簾曉涵翠夭桃瓊圃春搖紅圖丹繪碧耿交誼青燈細雨調絲桐芝蘭充庭舊食徳琬琰懿質今誰礱青鸞寵錫塞垣迥白首悵慕蓬瀛空鄒魯文旌逹荒裔奎壁瑞采流琱弓風樹銷魂苦蕭颯烟山送目悽㝠濛金石荒亭一動色萍蹤何處重相逢碧峯落日夢初斷青天杳杳涼秋鴻雙節辭宻人有兄弟相繼而亡者其姒娣各尋死之鄉人義而表雙節焉余因感賦山雲野水春漫漫我欲弔此雙節空含酸淳風死去不可挽聲華千載頽狂瀾烈哉二淑女氷雪凛腸肝誰令逓沈鴈各惜孤鳴鸞痛絶異時殞淚盡同日歡貞心逐幽𣺌落蕋随風湍金石何期抱一節淵泉偶爾尋相安春草空留翠羅綺秋風零落金琅玕紛華濁俗猥瑣觀珠聮青海星斗寒君不見鬚眉文夫盡楚楚胡為偷生反面視此曾無難南極歌癸酉夀辰時年七十四也南極秋轉青雲岑西風早下靈璈音飄颻老鶴過溟海滄州縹𣺌遙相尋獨上金銀臺祥烟四望開天空日月老海岳心悠哉瑤觴曉吸霞入口玉笻晚拖龍在手偕老金堂古亦稀重頒紫誥今何有蘭桂兒孫赫鳳儀樓臺簫鼓驚鼉吼未須更問綵雲人如何不醉華筵酒大兒武庫超擢頻小兒文塲聲價新燕山濟水亦千里方寸喜來青眼真唐虞化日樂不禁蓬瀛𤣥筭要千春祗恐無述底衰老天恩帝力空懷抱芳庭儘熱鷓鴣班後昌圖報精禋禱鹽城送姪懐慎逰杭州壯夫慷慨呉楚逰飛虹浩氣湖天浮我欲從之滯衰骨風流美事輸先籌束書腰劒觴髙樓北風日夜吹蘭舟片帆望迷殘雪浦孤鴻聲斷滄烟洲寒梅三弄出淮水黄鶴一跨輕揚州得魚沽酒風月濶閒雲逺水情思悠丈夫宏圖豈鹿豕乾坤勝概開雄眸雪濤澎湃江千里芙蓉秀削峯巒起海頭怒激子胥潮橋邊苔老黄公履江山人物盡繁華黄金紫玉何足誇收來圖畫寸心曲賦擬班張五色葩剡溪盡興一返艇錦城雖樂終還家椒盤遲爾起頌花華燈焰焰醺紫霞春宵客夢驚天涯懸河慰我卧逰賖行路難懐慎姪自鹽邑將浙逰不狎乘舟眩暈病歸戲作呉山迢迢㡬千里北人不狎南中水孤舟一葉浪吞天風帆激雪雲中起殘魂零落波心裏洄流俯瞰頭目旋山移岸轉何時巳昏然混沌之九天頽然沈迷於九淵仲子哇出心與肝莊舄長吟夜不眠甘息風塵機慰我方寸地履險不如夷未必江湖利石尤風急棹空回興盡何須苦復催三日淹淫一日來盧醫一笑非其災孤城半夜驚魚鑰嚴牙燈火吹殘角昨日逺逰今日歸偶爾沈痾倐爾豁古來聲利山水間鑿空萬里將何堪豈圖坎坷還平湍舉足世路俱間闗行路難良可歎頽室歎并序嘉靖丙辰秋余擢判鞏昌攜慎修兒以行過寓濟陽官署適風雨連朝次夜分乃巳輾轉不能寐芒刺隠然凡一再起如或翼之移裝間亦莫知所謂俄而所寢之一楹遂塴㡬致覆壓而幸免也亦神矣哉時維七月之二十有七日也悵悒以行是為歎倥偬七月來濟陽隴西遄駕秋山長狂風吹雨行不得瀟瀟二日雲茫茫中宵乍歇天兵休奔泉汩汩庭際流郵亭寥落少人遊我胡偶寄令嗟愁呼僮秉燭滅復明一夕再起莫我由束装三鼓為誰速歘然頽室非人謀飛我天涯魂顧我仙桂子一榻粉塵泥二命驚且喜始以宦走榮詎知患且幷㡬為立巖人幸免刑谷生揮淚忽盈把微名灰且輕樵雲釣滄水安知此阨傾人生脩短良自命神禹風波終亦慶白頭老我豈摧殘青春騰踏知何竟尼父從天亦泰然豪雄不變山隤前壯懐落落胡相牽前途有酒還如泉送陳肖玉長教擢教楚藩胡為孤竒姿覯此青海曲𤣥簡如有情綱常僻邑鵠朱絲返淳元綵筆振頽俗霡霂膏幽蘭剞劂試良玉炫日夭桃崇紫霞凌風瑤笋超貞華楚淮絃誦春無涯龍門蟾窟文澤賖歘有紫􅅺書仰翥丹霄鳳瀟湘杳靈翰琬琰破塵夢悵惘湖水春索寞山陽弄挹之不可留瀕溪薄相送青青楊柳搖碧波孤帆萬里情如何醁􅌬一酌强君酡青萍三尺為君磨江空嵗晚目力短霜寒秋老鴈無多荒城銀燭坐風雨春暉紫府迷笙歌陳琳負偉才仲舒抱俊䇿銀紀湘東豪仙集淮南客梁園授簡空陳編巫臺夢思俱雲烟風流儒雅懐千年壯圖此日輝前賢題張平山古山春色圖張生雅抱奈爾塵世何走筆驅此一段太古之嵯峨闢開天地不可紀杳絶人寰知㡬多青壁嶄巖以直上幽谷窈窕而莫窺雲澹澹兮空寂氣蒼蒼而陸離隠乎清颸浙瀝於窮壑藹兮幽芬逸泛於危􅇖林莽凄曠悄乎無人一鳥不鳴暗泉磷磷苔老麋鹿跡烟涵草樹春巢由秘高蹤車馬違驚塵中有金仙之寳刹浮圖隠隠重霄拔高僧姓字不可聞鐘磬沈沈隔斷雲閒情獨撫悲氤氲一生腸斷在人羣我忖張子懐景中情亦偕龍鍾老夷門霞想終難諧聊復快寫幽曠心使我亦得展慰揮千金題張平山溟海曦陽圖訝此尺素中滄波擬萬頃是誰為此圖蕩漾元無定此非摹我東溟無際之洪濤胡為一輪初日停朱影三山巔在何處長烟野霧茫茫去金光煥射紫霞飛晴飇歘掃青天曙不聞天雞鳴無復魚龍驚但見火輪簸蕩下不可測潮頭絳雪如山傾烟波迥撼赤城明扶桑灼爍金鴉輕一鳥飛百鳥歸一水燿萬水輝幽荒寒門開夕霏長江大河相依稀虞淵終古不相值妙造精光随手揮張公圖山復圖水巻首疇昔如豫此晚年别號偶相符海慚薄劣山維爾君負大造資我非補造才巍巍君名何可摧滄波猶笑能塵埃憶作畫時張號茅溪予號雲壑别來六十餘年間張更平山予更海壑當時巻首二圖殆彷彿後來之二號若豫為之者故末見其意云湯即墨太翁南還過膠墨人追送之華軒怱遽膠水東三子速我玉鉢詩無工仙翁夙仰天上客綵毫漫爾随春風一枝仙桂來墨陽相從懿訓稱龔黄滄海枯萊被時雨華胥仙夢交扶桑興高引斾下蓬闕春帆縹𣺌呉山月恩霑有自可能忘挽轡空教心力竭柳依依雨霏霏桃花亂㸃春衫稀子規啼歇暮山紫清樽酒盡滄雲歸望君擬南極雪顛方瞳瑞王國待君遊東瀛玉笙瓊珮飛天聲勞峯鳴鳳一時舉朱衣廌繡黄鶴輕山高而海清澤濊而永名赤子慕不輟青桂當重榮丹霄有道在平地皇靈厥艾還分明顧我迂踈老林水烟絲雲斧何如情長短有句長短亭聊爾為墨人之誠逺人之征次韻元遺山送李叅軍赴塞上嘗讀遺山塞上篇悲愁慘憤極邊塞之苦詞亦工矣但丈夫之氣何太靡耶想當時于叅軍必有為而發也余非敢以文詞相雄長特欲反其意以壯之耳慷慨出門去擊楫渡桑乾丈夫處世非鹿豕闗山談笑驅漫漫不䇿絶世勲虛生天壤間義氣摩青㝠肯教别淚澘惜哉折坂王孝子奉身廢義迴間闗更有呉江竊一隅偷安忍耻忘寄環要知西域竒功照青史要知燕然偉績垂毫端岐路情懐總兒女風雲六翮乗時摶身歸斧鉞命禄遺椿萱盤一朝樹功名家國同慶懽便教風雷烈烈肅沙漠直須名王授首霜刃赭花斑衝風單于庭踏雪賀蘭山孤臣夙中熱不知鐵衣單王靈振無極何恤凋朱顔雄飛本自猛將志丘園徒老㝠與頑君不見陶太守時憂過爾躭優閒移甓寄深意揚名合自甘辛酸一杯萬里與君訣無前戎㨗期君還春風篇春深暮夜春風號滄溟吹轉涼月高脩篁歴亂不成影長松滚滚飜江濤斷雲流空光慘慘歸鴻失侣聲嗷嗷迢逓琅璫下綺閣破窻耿坐燒蘭膏臺城柳條今又碧金谷花枝向誰赤一番草緑長楊基千載春光樂遊陌西陵無復望銅臺北邙一夜摧松栢春來春去奈人何古人今人春㡬多歎息風前一杯酒亦曽笑把昔人手今古情懐不相值祗合㝠㑹浮生意翩翩白馬金鞍光晴川𣺌𣺌桃李香東山華容莫相棄蘭陵美醖何可量梨花皜夜夜不寐秦筝金鴈飛高堂春風日日吹我袂春酒時時淋我觴但於芳春羡風物不向春風空斷腸吹頽瓊岳了不覺落來烏帽從數數百年幻夢瞬息爾莫令來者悲齷齪吁嗟太昊封姨兮難久依亦能布春兮送春歸今日清樽惜沈醉明日蒼苔紅雪飛海壑吟稿巻一
