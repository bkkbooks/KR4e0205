body:
  text: 海壑吟稿卷二明趙完璧撰五言律詩昌平道中濛濛寒食雨翦翦暮春風醉眼開新緑征衣點落紅山光憐靄靄王事苦匆匆空復尋芳意凄其望海東安寧寨曉發微雨曉初霽揚帆亦快哉輕風疏柳下晴景斷崖開簾影青山過潮聲雪浪回憑虛來浩渺頓覺出煩埃德州畫舫來天上黃昏泊德州滄波千里迥殘月片帆收吾境欣初入他鄉嘆逺遊雲山開曉色早晚步瀛洲阻雨安寧寨小雨阻孤村千山雲霧昏方舟繫枯柳落日傍柴門颯颯蒹葭冷悠悠蟋蟀頻疏燈照秋夜欹枕自驚魂癸酉新秋二首玄運不自巳清秋暗迫來金風軋煩暑爽氣溢樓臺世事全如夢韶華半不回餘光更幾許相賞莫相猜又幽賞莫相猜蟬聲故復催煩襟涼似洗塵慮暗須裁月轉高天朗花隨淡日開清風樽酒在千古幾人回再賦新秋清曉一登樓新涼報早秋風輕梧葉響露重竹光流山意淡青眼波澄瑩白頭老懷憐暮景瀟灑作間遊冬日靖虜曉發初冬發靖虜殘雪照山頭冽氣凝青嶂寒光迫翠裘孤臣愁絶塞萬里望中州擾擾無東計悽悽欲嵗遒寄黃海野天曹郎謫歸不見黃生久塵襟耿未忘玉堂周禮樂綵筆漢文章碧樹虛秋思黃花負晚香擬為滄海慰不久滯懷王登閲江亭亭在鎮江江南岸簡閲舟師者獨上江亭望長江豁壯眸風帆隨霧捲雪浪拍空浮天塹中原迥王靈百世悠酒酣千里客聊爾一優遊新中驛夜雨即次昏黃雨瀟瀟夜未停孤燈燒欲暗宿酒醉初醒輾轉那能寐淋淫不忍聽何如飛夢去繞我故山亭房山道中曉日房山道行看亦自幽空山鳴野鶴小水立間鷗斷靄迷村樹晴雲結海樓東風吹欵段倦客重回頭送范惠泉地曹南守滸關都城作别送滄江渺憐分青海情楚天春草合吳水暮煙平蘿月清無寐絲桐祕不聲關山勞望迥報績計仙程都城西望湖亭雲外下長坂湖南過小亭寒泉冷石竇細草暗沙汀駭鷺開青靄遊魚破翠萍釣磯來暫息波影俗懷醒縱舟張家灣早解雲邊纜初歸海上賔雙鳬衝翠靄孤鶴出紅塵回首燕臺月離情漢苑春雨昏留别浦沽酒暫相斟晚泊長蘆晚泊長蘆月涼生瀛海風雲川凄暮笛岸葦泣寒蛩酒盡空明裏詩成欵乃中天涯浮桂棹星畔老槎翁月夜飲靜寧劉陵沙太守涼月飛寒巘清宵遇故人共將遼海思相慰塞垣春把酒黃塵倦論文清興新挑燈放襟抱海內為誰真贈許空石解元刺史貴南荆識今何幸萍蹤亦可憐聲光齊魯外俊逸漢唐前塞日孤城暮蠻煙萬里天何當一朝寵相慰五雲邊廣濟寺迢遞驅山徑倥偬入梵宫長廊喧燕雀古殿鬱杉松採藥神僧去霏香禪榻空清魂欲延佇俗役未從容寄丘月林給事曠望天低樹孤吟月滿林斷雲春寂寂落日晚沈沈青瑣欽懷玉滄溟擬斷金封書將别恨迢遞過西岑月林見枉遙踐琴約西還賦送故人歡有隕永夜問何其釂飲酬良覿調絲慰夙期霜寒紅蠟短水冷玉龍遲竹裏清風起連牀無寐時晚行溪畔翠蓋斜陽外雕輿緑水邊清風吹細葛微雨散遙天沙鳥盟何在溪魚樂自牽好來垂釣處只是近人煙初秋暑退晚坐蟋蟀鳴階下涼風動檻前露華侵袂濕月魄綴簷翩酷暑知何去清宵自不眠幽吟對修竹相與鬭㛹娟對雪限韻錯落明垂地岑寥冷閉關寒庭花滿樹青海玉連山作賦才難企高眠迹可攀懷人清興發孤棹夜中還夏夜獨坐獨坐芳庭晚遙依銀浦清竹風披溽暑山月靜荒城有酒間仍醉無官負自輕年年滄海上高興此平生雨中冥雨朝還暮凄風夏作秋竹光聮榻潤苔色上衣浮古木驚濤轉飛甍瀑布流清軒人獨倚盡日看浮漚官衙夜雨清館鳴寒雨離人寄逺天高風嵗欲暮孤燭夜如年妻病沈雙鯉兒官苦獨賢羈愁千里外魚目五更前鹽城聞促織忽聞鳴促織應自感清秋花底來何暮風前聽未休異鄉人不寐故里思難酬骨肉經年别湖天回白頭八月四日官署晚坐海邑消煩暑星河坐晚涼清風來獨樹新月挂危墻水氣生寒早蛩聲向夜忙客懷秋漸老官邸漏初長鹽城八月十五夜二首飛鏡當庭靜銜杯向夜深清光霜滿地寒色水侵襟不覺銀河落偏宜玉漏沈暫將江國景聊慰海瀛心八月鹽城客孤吟桂魄秋閲時常惜老對月欲銷愁把酒添清興酣歌慰白頭郎官今不斁猶慊此同遊淮隂冬夜羈客當寒夜驚魂自不眠風簾清寂寂霜月冷娟娟衰鬢淮隂道歸心嵗暮天敝裘擁獨坐譙鼓暗雲川弔黃海野早發殘月䇿行驂青娥戒曉嚴征衣鳴落葉宿鴈起寒湍煙迥蒼茫外曦明紫翠間北風吹老淚悽惻度林巒歸宿柴溝餘映沈岡疾悲風捲地寒煙中度淮水月下扣柴關半醉霜猶冷孤眠燈欲殘可憐今夜夢腸斷野雲間十二月立春日簡欒侍御二首臘日逢春日新年入舊年野梅殘雪後江鴈暖風前老眼園林霧間身湖海天朱顔那可再偷向醉中還鼓角春初報陽和物自私氷溪澌欲緑岸柳媚將絲雲壑堪乘興霜臺好賦詩相知無異地相賞莫相違秋日出西直門秋日遊晴曠西風被面涼征袍紅葉滿羸馬白沙長曲水驚間鷺荒池度野芳碧峯千萬點一望慰愁腸秋日興教寺古寺青林外輕車白日斜秋懷開野色午茗愜僧家山鳥清吟興雲松靜物譁禪關醒俗夢坐晚意猶賖都城送欒岱滄進士尹溧水相逢忽復别羈客不勝情衰柳高秋晚寒山淡日明歌殘春酒盡帆逺暮潮生何慰潘郎夢芳聲達鳳城都城冬日公出同楊東川寅丈宿僧舍二首冬夜宿僧房萍蹤覯帝鄉松風韻騷屑窗月照蒼涼不寐清宵短論文雅誼長誰憐沈伯起相與慰壺觴僧寺清無極羈臣愁未涯月明寒吠犬風靜夜啼鴉心苦仍依國魂飛不到家悲歌逢義士彈鋏和京華朝回望西山初日早朝回金天秀色開綵雲連巘崿翠靄接城隈幽逺牽高興奔趨笑俗埃何時謝朝組隨意踏莓苔獄中不寐身老名何在嵗殘人未歸烏紗成晚祟白髮悟前非十口知誰託千山隔鴈飛淚痕揮不盡暮雨北風微落日落日崦嵫外新蟾粉蝶邊嚴扉栖暮靄悲角調霜天倦點燈前易徐調膝上絃酒醒無限恨頭白梵鐘前代送人二尹聞喜闌暑金風早離觴野館西關河秋杳杳雲雨晚凄凄良吏新承寵殊方久望霓即看今日業擬與古人齊次韻山行即事白雲幽石古青壁瀑湍鳴空翠侵衣濕山花照眼明啼鶯寒谷靜落絮晚風輕何處彌征蓋松門一慰情次韻宿𢎞恩寺殘陽投古寺乘月訪高僧佛土風塵淨禪心池水明玄關欣妙悟白首絆浮名半榻三生幸千緣一芥輕東歸過鄒平山下昔去氷霜嵗今歸五六年青山如舊約赤日自堪憐兩鬢空成雪孤忠負所天偷間過海畔故舊半蕭然硤石昔聞硤石嶮此日度應難煙洞深無極雲梯不可干人從天上落樹向井中看空翠茫茫裏征衣暗浥寒張茅道中世路應愁絶胡為來此哉嶮巇崖畔度窈窕壑中回仰面青天小低頭黃霧來艱危向衰老不覺此心灰郭城驛道中塞鴈驚斜日邊沙捲北風敝輿山霧裏冷飯驛亭中黃草連雲暗青巒帶雪叢壯懷元不老猶慕伏波翁塞垣曉行野寺疏鐘盡寒山殘月斜氷溪驚鴈陳石徑破霜花杯酒全無力邊風不可遮孤臣一萬里腸斷塞垣笳次韻夜過六盤山初月上銀盤登高夜倍寒谷風肌粟栗山露鬢珠團身為微名苦心應老病酸秦程良不易蜀道浪驚難次韻夜過分水嶺素娥迎暮嶺青女伴寒空龍劍明搖雪貂褕薄透風征車長入夜王事久忘躬穩羡山翁睡獨慚西復東靜寧道中用韻寄凌沙太守霜氣曉仍肅煙花迥未銷龍氷千尺繞烏景一鐺高同氣青天逺孤征紫塞遙行行不自己翻恨我車膏舟中夜雨細雨江風晚蕭條落小舟一身千里外百慮五更頭水繞還鄉夢雲凝去國愁沈沈不知曉一鴈叫寒洲聞蛩疏簾玉露冷深院候蛩鳴切切寒如訴悠悠夜幾更半窗山月白一榻竹風清秋色竟何意愁人自有情楊花點點過樓臺因風何處來庭空雪歷亂簾靜日徘徊漢苑春仍老吳宫寂可哀飄颻度江水腸斷幾時回春日西疇春日踏西疇東風陽焰浮暖雲屯隴畔活水浸溪頭百畝周王業一犁莘野謀此身同鹿豕此樂豈人侔次韻除夕燈前辭臘盡漏底易年華撥火圍青夜傾醪泛紫霞清香流柏葉懿頌起椒花學道侵衰暮經年愧聚沙彈琴彈琴有佳音對竹彈且吟清風來几席俗慮滌胸襟青峯對終日緑酒沽千金太古慕高調冥冥獨此心春日過涼臺寺野寺風塵靜乘春一暫遊參禪違俗世駐履傍林丘貝葉僧窗寂金沙聖迹留殷勤訪學地隨意却聞愁碧溝戰場微雨曉初歇隂煙過戰場悲風翻野蔓流水咽荒塘枯骨生新蘚殘魂斷故鄉誰輸全勝䇿干舞念虞皇月下聞鐘鴉影風前定鐘聲月下聞高僧間暮靄古寺隔河濆冷度千門雪清分雙樹雲夙懷超靜土終愧戀塵氛茨菰花忽訝秋風玉由來氷雪姿孤光明緑葦獨秀出汚池寵謝華堂翦間依野釣絲清芬煙水外不受一塵欺送薑省吾少參駐撫商州人去三秦地花飛四月天離魂銷别浦斷靄暗前川美政酬明主芳聲茂昔賢商山兼吏隱清暇抱琴眠晚發萊城羸馬䇿新秋清光自可遊殘霞依古木野水艤孤舟人迹新沙潤蟬聲落日遒征鞍何處息沽酒便淹留次韻南莊一心無俗物滿眼是春光楊柳孤村靜煙花曲徑芳看山同野鹿藉草當胡牀回首紅塵裏無如此地狂重陽佳節際重陽西風野日黃鳴鴻雲外度細菊目前香遣興詩從拙衝愁酒放狂獨醒還獨醉塵俗默低昂次韻雪聲片片落來輕幽聽細細鳴撲紗燈影靜瀉竹夜深清夢破黃蘆鴈愁添紫塞兵何堪擊鵝鶩蔡下不分明次韻雪色窮隂凝皓潔青女未依稀越犬風前吠梁園月下歸疏梅迷玉魄孤鶴失仙衣粹質誰能奪緇塵迥自違野鶴野鶴集沙渚悠悠向曉陽長鳴寒野濶振翼海天茫仙格違塵俗間身足稻粱好隨王子去已與衛軒忘無題秦筝聲琅琅越女歌繞梁響劇傾衆耳曲終斷人腸高情五陵客醲賞一朝償古音豈不雅寂然貯錦囊冬月感懷窗月明如練松風輕入簷不成清夜寐相對燭花殘往事翻新恨凋年損故顔餘齡春酒在何必問還丹招蜂何處黃蜂集招來野叟家鑿苔仍嵗計掇蕊閲年華努力知誰利依人正爾嗟君臣負明識何事戀塵譁乙丑正月二日愼修北赴禮闈十一日大雪懷思兒作燕山别親留溟海情北風吹大雪何處駐行旌春入瓊林早雲開玉殿明望遙天漸邇計日慰佳聲用韻寄答萊城張南溪老長府舊友相思分異地相應自同聲各抱懸懸意頻看字字情餘年知幾許何日續重盟南北應天限離鴻怨弟兄五言排律曉霽五仄五平細雨夜漸歇侵朝雲初晴竹檻宿靄散松階餘寒清旭日野鶴奮輕煙林鴈鳴逺巘潤畫碧新榮鮮圖猩亂蘚疊紫翠平池搖空明啓牖爽氣溢開簾微風生俯仰盡勝覽徘徊多高情作賦謝妙思橫琴鳴佳聲撫玩興未巳蕭然偕誰賡煎茶都城作斧氷寒泉下粉玉石瓶中鳳團沈夜寂獸炭燒春紅霜清上桂魄人靜騷松風芳香渙瑞靄靈味湍華鐘孤坐寒不寐一飲清無窮枯腸潤仙液輕汗回春融興逸崑崙外神爽桃源叢可以發清詠兼之韻枯桐長嘯仰蒼昊矯首聽高鴻壯心逐雲翮奮翼來天東西莊晚歸十韻褰帷一東望溟海正蒼然浪激潮頭雪山涵浦外煙蓬瀛迷落日蛟蜃幻長川孤鳥飛還沒歸雲暗欲連偶來逸清興勝覽脫塵緣景入仙源晚神逰霞際天短柯情自在一葦夢相牽慨古超塵外嗟今老目前不成黃鶴客深愧綵毫篇片片輕鷗下悠悠祗對眠中秋對月小飲十韻寂寂蒼虛濶明明皓魄來清風下黃葉白露濕青苔聽竹幽懷靜掃花逸興開霜前驚雁度嵗暮感蛩哀桐影侵瑤席鐘聲度玉臺賞心仍獨坐對影暫相陪把酒吞星冷浮生怯電催高歌謝塵慮清詠愧非才老矣休林際瀟然醉海隈百年寡知已蚌守竟凡埃代髙時齋節推賀平渡李兩山太守八帙有三二十韻渺渺雲龍裔悠悠蓬島春精英集海岱劒舄出風塵襟抱乾坤外風流泗水濵淳還髙邃古玄養裕天真芝采今來漢桃花久避秦朝廷須鶴髮俎豆瀆鴻賔晉楚聲光迥山川雨露均功成從絶粒冠挂學全身幽谷虛千載長林覯一人雲霞韜古洞麋鹿老比鄰丹鼎追瑤兔清波跨紫鱗再周新甲子七守舊庚申耄協薑侯返齡超籛老倫滄洲娛蔗境青鳥迓芳辰道氣通無極家聲演至仁芳流丹桂逺秀吐玉蘭新秋錦誇三捷春雷奮一伸優間一國老模範四朝臣竊幸紫關客會依青海津擬將冥造破遙祝老人頻悼世皇三十韻聖帝今何在皇恩不可酬康平叨四紀德業慰千秋刑賞天王政姦諛遐邇休神功昭絶域靈瑞輯中州尺土一心澤秋毫萬里眸唐虞軼高志秦漢眇凡儔千古英雄主羣生際會優一朝三世祿兩誥五雲浮羅織曾生死權豪已破謀晉慙天日末歸乞隴雲遊白面新承寵金門早見收天波春溢海晚眷雪盈頭終自懷芹曝無由報馬牛夙期天保祝不為鼎湖留龍劒空陳迹烏號遺世憂天風悲海嶽雲日慘旌斿山色悽還變江聲咽不流麻衣飛暮雪杜宇劇春愁賔旅辭華館絃歌靜玉樓鳳膏寒貝闕孔蓋杳瀛洲仙骨一區木神龍數尺丘忠肝悽欲裂苦節竟何求夏啓歸賢嗣周成佐故侯兒曹貞信義王業勉伊周壯士應崇孝殘軀不解籌徒將庭教意不盡此生謀力竭懷終古哀餘抱寸幽龍顔瞻失覩天闕負無由悵望蒼梧老啼痕湘水侔山川兩不滅此恨共悠悠海壑吟稿卷二
