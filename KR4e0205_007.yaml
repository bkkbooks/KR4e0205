body:
  text: 海壑吟稿巻七明趙完璧撰賦寒宵賦海壑子讀書冬夜長宵沉沉凝寒凛如撫此窮隂悵然不寐是用有作辭曰顓頊司御兮移𤣥貞黒帝渙號兮趣朱明悲泉沉暉兮野靄㝠駟宿耿耿兮流長空素蟾碾碧兮寒光清青娥肅征兮鴛瓦氷蒼旻迥而星垂枯梢號而聲悲大河伏濤兮凝璐連輝温泉封凍兮瑶華瑩璀萬動闃寂兮清廟進假其何諠廣莫揚吹兮轅門號令之戒嚴寒雲㝠㝠兮鴻鴈哀而流連黄竹蕭蕭兮𤣥鶴警而鳴旋松杉隕兮欄檻冷而凄然皜梅粲兮掩寒紗而晚姢悵銅龍之煞絶兮銀籌淹息霜堞之笳奏兮魚柝杳以聲殘軒楯沉菽兮朱箔翩重扉幽扃兮疏房寒獸火無光兮嘘之不燃蘭燈冷青兮素膏凝盤抱雲和兮繩絶攬氷紈兮綿折龍涎熄兮芬滅鳳團委兮烟歇紅絲氷兮𤣥結猩頴强兮摧缺悲暮節之隆嚴嗟衆處之曠别乃有貴奢兮搆羅綺於雲霄暄蒸融融兮䕶絶域之重貂沉檀耀庭兮鬱攸而香飄龍燭熒煌兮星分而紅揺翠雉明兮襲錦袍據熊虎兮崇且髙烹胎胹膰兮肥甘充庖醇醪茢美兮紫霞春饒素霓迴旋兮舞纎腰貝齒聲琅兮遏雲遥瓊嶽頽兮紫綃金鈿落兮娥媌鴛被浮蘭兮恍巫陽之魂交金鉔暖薫兮惕永漏之易消淫約懸絶兮竟罔知此寒宵悲風發兮情自如而陶陶若彼塞戎之宵征兮慘邊聲而泗流關山迥絶兮望故土於中州負濃霜之重鎧兮寒徹骨而驅遒衝朔漠之驚沙兮月黯淡而雲愁孤臣萬里兮海天沉沉鳳城云逺兮銀漢無垠時易逝而嵗晩兮憂忡如焚愴遐荒之逆斥兮耿長夜而慮深愁思婦於雲屏兮心已摧氷珊瑚之絳漬兮腸終夕而九迴幽思沉以繚紆兮逰蛛絲於天隈合歡餘寒以輾轉兮金壺如海而鍾哀逰子未返兮天涯淪落羈館岑寥兮悵戍烟之殘角孤燈落而愁絶兮蝶悠揚而逺脫載夙興以行邁兮抱離懷之忉怛驅𣺌茫兮寂雞聲之咿喔陟崇巔兮俯荒原而曠濶霜風凛其被面兮嗟敝裘之凉薄氷溪皓膠以迷途兮情惻楚其如割㷀獨無眠兮哀生寒廬爐無宿燼兮惡裳無􅀈一飽無時兮凛切飢癯妻孥坐對兮相泣以吁冀今夕之昧旦兮傷來夕之何殊胡為終此嵗寒兮仰蒼穹其疇蘇皇天運化兮無私於好惡四時平分兮豈以斯人而輟其凝冱推有生之厚薄兮允𤣥機之攸賦感逆順之相遭兮憂樂安於所寓貴不可以擬賤兮貧與富之有數神祇無以辭其憾兮博濟為聖賢所懼但造命惟人兮我心皇皇仰燮理之任重兮惕此寒凉闢寢門而假寐兮趨火城之煌煌立雙闕之殘月兮霏裳履之滿霜啓九重以匡不逮兮吐瑶墀之雞香格君於仁聖兮沛天徳以懷萬邦裘帽釋兮三軍挾纊而相忘雪宫同樂兮胥肉帛而有常夫無外曠兮内無怨女之徬徨彼四方之人兮孰不期温飽而我望苦凍餒之無聞兮靄和氣而洋洋寒暑有代謝兮春暉煦而悠長固君相之能事兮又安危關運化之否昌坐喟嘆而漫漫兮其誰待旦汲汲於廟廊顧兹寒微兮何以𢎞被抱此區區兮暢回春之溥及淑氣敷以遐征兮罄寰宇而俱立偕物我而悠然兮慰是夜之悒悒帳詞為儒學師生送童貞菴太守入覲帳詞并引伏以圖靈啓秘㝠陶瑞世之賢方夏崇勲昭仰御天之睿故荒陬無久否㑹際貞良而善治有竒馨協欽隆渥恭惟某官炎鄉鴻筆羅渚仙才逸韻松颷冲懷桐月抱千古江山之秀擅一時文藻之宗錦捷秋風回首龍超萬蟻桂探寒窟揚眉虹貫九霄青錢遴慎於玉堂鶚飜易水赤邑寄専於墨綬驥展湘雲三禩政成江城花暖一遷福賚海國星高楚去而見思夢澤草長迷望齊來而嗟暮蓬瀛雨足騰歡徳化洽於渤匯豚魚畢信恩光流於原野草木均輝王風返而恬熙醉慊村烟桑柘文澤深而汪濊光生璧水桃花吾道孤旌金章企慕斯文正印玉笋聯翩幸傾圮之經營逺鑒麥葵揺蕩荷清寒之矜恤曽聞苜蓿䦨干秋鳳獨翔已慰吹嘘天上春龍旅應還期輔翼江濆五馬騁而恪詣宸楓三鱣違而嬋媛岐柳簾霏雞舌御屏題漢循良珮轉螭頭帝室延周篤棐沐無涯之天寵喜溢滄溟睽不世之邦侯情含翠岱晚山殘雪寒侵緑蟻芳樽古道酸風吹斷驪駒清詠冠裳郁郁絃管嘈嘈長憶天東短歌水右詞曰山館翠雲寒曉色新霽古木含風捲濤細川長烟𣺌情思啼鴻聲裏文翁金闕去留無計孤鶴霜明七絃錦秘五袴清歌溢流徵玻璃紅凸相送紫霄凌厲鳳池調舜鼎匡明世右調感皇恩為膠庠師生贈高時齋節推署州代還帳詞伏以竒器奮乎風雲留思徵淑庶情昭於日月協美揚焆道直天機淳元未泯聲芳人紀悠邈奚涯恭惟某官髙風周甸雅望秦川華峙英靈渭波精秀瑞岐陽之鳳鳥産自名家窮太后之龍圖紹由先世橋昂碧落未當世而擬後逹人桂占青雲訝鳴時而輝前繼美蚤圖九萬簸擊南溟晚慰黔黎銓榮上國明弼宸極緬尋鳥喙之芳使伴寒星遥徙爽鳩之域慶烏巢於春樹沉鬼哭於夜臺刑訖於措刑清息庭前鼓吹訟服於無訟赤違水面波濤忽吏渙膠西黄章生緑幸旌移掖北腐草回春寒谷恩光良慊自天之隕窮簷膏澤式占時雨之私栩春夢於華胥鶯花暢化悲晚來於青壤溝壑騰歡消䑕狗之妖蹤朗月清澄墟落屏豺狼之奸跡震霆烈赫山川赤子如傷豈云青眼丹心似水莫探𤣥淵洞寸照於水晶青焰炯玉荷之影涵萬機於藻鑒明湖流桂魄之光貞操垂晩節霜筠義概凜平生氷蘖宦海波而砥柱恥繫商帆世道溷而日新諱言阿堵風流儒雅攸欽璧水詞宗夷易温恭悚企窮陬道範青衿挹采宛在春風白面承休坐醺醇醴雨露忘情於桃李雲霄垂意於蓬茅有代及𤓰旌斾遥遥天上含情折柳稱觴悚悚溪邊復嵗月之㡬何五雲髙翥慨烟花之縹緲萬井疇依草凝望以連青不盡矗雲離恨桃無言而含紫聊将落日歌喉回首巖霏縈撁别緒斷魂鶯語屬和遺音詞曰郵亭沉月正杜宇送春時節淡靄連山柔風捲陌滿目楊花飛雪人渡溪橋晴渌斾裊碧山遼絶無可柰借野花啼鳥留觴英烈傷别難忘處三月彌旌恵政人人恱絃誦春長桑麻雨足方信海波恬滅何意孤城甫慰尋逺三秦豪傑便指日向烏臺青瑣傅霖望切右調喜遷鶯為鄉耆賀戈雨溪榮膺嘉奨帳詞并引伏以靈鳳徵祥羲馭光華海岱應龍神化豐隆靉靆山川故英雄奮明聖之期幸世道際亨嘉之運恭惟某官燕冀休靈古今俊彦深沉令徳慷慨高風逸韻稟自天陶冲氣含於特秀襟懷璞玉唾𠻳明珠蚤捷蜚聲載燿龍光於雲漢重輝接武旁昭瑞彩於虹霓鐘鼎之業合羡夫家傳儒雅之風争誇乎世繼忽宣綸於北極式贈馬於東州旌斾揚休枯槁樂陽和之候閭閻動色顛連仰怙恃之秋邇清光而巖電奪睛探幽格而松風遺響抗鴻鵠之志擬迹循良潔氷雪之操乃心民社清才實學君子攸欽純化義風匹夫胥慶禁奸不遺於毫髮馭黠果震夫豺貍仁恩與造化争流靈威共雷霆齊軌邇遐春盎政教雲行海國日長乍識華胥懿景村扃夕静頓回太古醇風温温乎豐嵗瑛清時可愛粲粲然荒年穀赤子所天亷班胡氏父子以天語流光勲繼董生南北之鄉評有在偉績茂昭於海域芳聲丕著於霜臺春日生輝驟䝉嘉奨秋風播譽竟復重褒甫期年而治効垂成未半載而恩榮荐至某等揖英賢之令範已踰白頭接錫命之寵光倐經青眼不勝歡躍競笳鼔以相迎奚啻聲音聊謳歌以敬夀心慚芹曝調謝宫商詞曰霜樹蜚紅烟峯凝翠雲齊秋晩揺落羣芳操持暮節方見籬英艷西風遥逐陽鴻征曉報到天恩重衍慶仁聲薄海窮山共欣夙懷今展琰譽播青珣名馳兖空自芳傳殘簡垂老躬逢清朝良吏無負虞湯選綵鸞枳棘飛黄庭際應是不堪狹淺行看取秉鈞異寵沛霖溥演右調永遇樂為千户所賀楊子承千兵完戎朝奨帳詞并引竊以眀聖神機旌淑恒先於厲世豪雄効節臨戎豈憚於捐身恭惟某官将軍胄子閥室俊人魁梧殊標端凝令範耿青年之義概正氣自天矢赤日之貞操壮心畫地八陣窮勞夢寐六韜紹邃宫庭申渙號之嚴兒戯豈沿陋迹本知權之善父書不滯陳言表海嶽之瑞靈慶風雲之猛士掄精夏府開基之華典重輝鎮肅遐陬禠魄之威聲四達建牙吹角寂不聞諠拔劒登壇强無與敵茂瀛壖之春草曾教戎馬長嘶澄淮海之滄波坐致鯨鯢永滅錦袍飜細柳康堵編氓鏐帶緩生花傾心儒雅佐政播霜臺之譽攝屯貽寒士之恩兩簡提兵躍然千里十年就煉惕爾萬全際國家悠久之隆飾部伍凋殘之弊推心置腹勞思自過吮含協苦分甘布恵頻空儲蓄貔貅争奮思兼報帥以報君葵藿紓忱誠非愛身以愛國指龍沙而禦侮迥熄狼烽旋鳳闕以趨勞靈成雀賀旌麾攸向績用倐登嵗月雖淹人咸恐後閱師而稱耗方殷當國憂虞離次者無聞獨美元戎紀律累黄金之腆賚莫稱丹𠂻慰紫極之温綸式驚青眼𤣥朔遥而飛檄青海𣺌以騰歡瓊醖充罍銀漢潤分恩渥天機遺錦綵雲蔚映仙葩沸金鼓之喧闐暢融梅雪萃人文之炳朗喜合春陽末忝葭莩曠見乗龍異寵秪承豪彦慚無躍虎英詞一闋清歌千鐘釂飲聊傾肝膈不解宫商詞曰翠巖碧海春初麗忽下綵鸞烟際玉闕布天恩鳳閣褒忠義生色煥山城芳譽飛迢遞總只為赤心丹陛况早遇英主明世家散萬金身餘一劍喜有戮力三軍鋭寵擬玉關封看取金章繫右調憶帝京表擬上元觀燈賜宴輔臣謝表某年某月某日臣等䝉賜觀燈與宴稱謝者桂魄騰光薄海仰初春之象華燈煥彩九天瞻聯璧之輝既醉太平何勝感荷臣等歡忭歡忭頓首頓首竊以天地交泰一元轉造化之機君相協和萬古慶明良之遇故貳室謙光乎唐帝而金臺賢譽乎燕昭火戯驪山奚取深閨之笑酒通淇水終貽烈焰之災南國臨春永嗟沉湎西風汾水徒自悲歌迺者候運青宫大地浹陽和之氣既而影盈玉闕鈞天昭皎潔之晶祈太乙於初元一燈破暗演炎劉之故事㡬夜揺紅烟雲斂而明月逐人簫鼓沸而暗塵隨馬宫城焜燿閭巷謳歌六鰲駕海上之山樂偕百姓雙鳳扶雲中之輦清暇萬機炬爛仙臺何幸微臣縱目風傳天樂渥䝉御宴稱觴允賢聖之高情實康平之樂事寒酸至願今古難逢兹遇皇帝陛下徳擬乾元明侔離照恩澤及物炳朗燭奸暢仁風而遐邇皆春被光華而隠顯畢逹三冬陋巷蚤䝉分暖杏林十載短檠頓致揚輝奎閣春臺謝調元之善玉燭負屯膏之愆甫奮幽微欲竭平生糟粕晉觀燈火輒施不世几筵珮轉彤庭眼開蓬島香飄桂宇夢入華胥誰家對月能閒而叨與鳯城之寵何處聞燈不看而曠瞻龍燭之竒紫府星輝藜影駭飜仙界絳臺風静蓮光幻逸神工月闕奪睛琉璃炳瑩瑶池高㑹龍虎優㳺煥􅌬醁於霞觴明及肝肺照珍竒於玉案暖入腹心簮笏燦銀缸冠纓豈遺纎手綺羅飛寶鏡瑛盤追笑含桃分黄柑於九霄罄白獸於一夕相遭道合期於不醉無歸從事軍嚴志在有懷必吐九重春色共翬仙桃永夜漏聲晩催銀箭飽飫皇仁而益足沉酣聖化以何知兢兢周誥之中洩洩堯天之下融查滓於親炙奚啻秋陽蕩邪穢於相酬豈云江漢東風吹酒旋看銀海初醒凉月伴人清到玉堂不寐身歸天上而常自光明夢想樽前而乃心麯蘖臣等昏昧不足以圖報稱潦倒曾可以効勤勞徒抱區區有懷耿耿伏願有象太平偕此春而永泰無疆福夀並斯月而恒盈演膏澤於幽隂煥文章於昭灼養賢以圖天下用繼權輿渙居以賚國中不獨盤樂則聖治清明而夜户不閉民心和暢而鳬鷖可歌矣臣等無任瞻天仰聖激切屏營之至謹奉表稱謝以聞擬夏日賜扇羣臣謝表某年某月某日䝉賜臣等以扇者湘筠破玉黄封隕自九天蜀繭浮香墨跡題當五月草茅增氣閭巷生光巽命猥頒賁恩仰荷臣等惶恐惶恐頓首頓首竊以八風吹嘘匪鼓舞無以育羣品一元槖籥非凉冷罔以濟至仁故廓寰宇之妖氛回颷動地而除酷炎之溽暑清商滿林此吾人仰披拂而豁如因大造以呼吸而咸若也乃者日貞曜於鶉首律遷度於林鍾祝融鞭赤雲之龍羲和典陽烏之馭温風翕以辰至星火燦以昏中處凉臺而有鬱蒸之煩浴寒水而嗟爍爛之慘聖王體好生之徳歌薫五絃哲人妙制器之宜來風一扇以形軋氣黙契𤣥機用上禮賢風髙前古盖始為者固有莫既之恵况分布者尤為不世之恩銅柱逼人慨殘酷於萬古雄風適已恨誇誕於一時夜色撲畫屏之螢宫闈䙝用秋光致素紈之詠篋笥深藏歌徹桃花醉裏不知炎灼舞殘白羽閒中獨翫飄揚緇塵染素於九衢清風安在束帶發狂於庶府明月何歸曾無蘇下以輕颸豈有假人以便箑王風因之而掃地􅀈焰於是為薫天何幸微臣驟䝉珍賜百工至願千載竒逢兹盖伏遇皇帝陛下古直徳健質素性成妙開闔之天機四方風動神屈伸之物感百世揚休鑒前王揺亂之鄙心蕩淑世刻薄之陋習出仙工於天上輔造化於隂初織女機絲霄漢乍流夜月石鯨鱗甲池塘蚤已秋風移寒色於瀟湘散清光於巴蜀絶塵凡之竒巧如璧如輪袪窮巷之煩寃非氷非雪捧持在手感荷生心發跡寒微沾恩稠疊開緘日下黄金輝暎蓬瀛回首雲中仙桂香遺青紫輕凉拂羅袂何須風蹬雲端溽暑散窮簷不向茅堂江麓酷吏去矣身寓青蘋故人來斯神逰空谷障朱明之燥烈䕃庇實多驅青蠅於暄炎肅清益至置懷袖而鄭重入依孔雀徐開慎把握以無忘出為貔貅指示舉動而毛髮灑淅揮揚而股肱戰兢臣等熱中未已恒思汗出沾衣寒心方殷竊恐情乖中道伏願嚴操縱之威權輕勿授人以柄善弛張之治道重惟持已以清作法於凉而罔貪守約施博而不亂推心及冷地痛懲炙手之徒示法向薄夫用戒趨炎之軰荷䝉遮蔽無為庾塵所汙不異寒温莫致班詩共歎則仁風擬大塊而同徳餘光昭汗簡以不磨四海播揚萬年快慰矣臣等無任瞻天仰聖激切屏營之至謹奉表稱謝以聞擬宋論翊戴功加石守信等官爵謝表建隆元年某年某月某日伏䝉聖恩加賜臣等官爵者臣守信等惶懼惶懼頓首頓首竊惟亂極思治實皇天泰復之機厯數歸仁正英主豐亨之運故神謨廟算克當乎天心而治定功成不由乎人力武功誠武丁之獨斷翊戴何論文徳允文王之寡儔加封實忝曾不以能而自負普施天地之恩何敢以功而是居仰荷生成之徳稽晉文於返國功高有不賞之嗟考漢祖於承家事集致當誅之禍狗兎數語竒功萬古以酸心龍蛇一章偉績千年而墮淚是皆刻薄之主頓忘勲舊之人臣等退思有愧犬馬何勞進補無能蟩蛩未報仰自天之隕實切愚𠂻慰好爵之懷真逾望外兹遇皇帝陛下乾坤至徳日月休明馭衆以恩雨露溥施春澤臨下有赫雷霆丕振秋毫徳威不爽於賞刑處制允超乎今古念八姓之僣竊君弱臣强傷五代之昏庸兵煩民敝黄袍被體雖天命而衆義無忘赤徳開基録軍功而大封不棄龍旌縹緲萬國生輝鳳詔光華九天流渥進有差之隆爵再焰寒灰沾並領之寵光重榮春槁轅門甲胄際風雲而高入青霄汗馬刀弓出塗泥而近趨丹陛人無不足恥龍泉擊柱之争勞無不酬絶虎士分桃之怨各叨一命較才程力以何思悉竭寸𠂻瀝膽披肝而圖報若都揮若㸃檢山河帶礪無疆或虞候或右廂日月貞明不替雲臺異眷越百世而同符烟閣竒褒曠千年而合轍侍龍顔之密邇共将紓悃一朝仗虎符之靈威誰復横行四國慶明時於無事不聞劍㦸扶危樂長夜於未央合聽笙歌聒醉託勲名之暴著詎致沉淪際君臣之交通永無猜忌臣等終延樂土大造無可言之仁蚤沐恩波滄海乏可述之潤起死人而肉白骨結莽無因忘何日而藏中心銜金未即伏願五位昌隆太平有象一徳貞固終始不移保誓命於萬全君臣一體綿本支於百世上下同休舅犯無棄席之憂恩信日固叔敖息負薪之慮徳恵彌深阿衡榮而商道致逺營丘永而周漢流長萬古無虞九泉不朽臣等無任瞻天望聖激切感戴之至謹奉表稱謝以聞海壑吟稿巻七
