body:
  text: 海壑吟稿卷八明趙完璧撰序海若效靈序春臺君三年守膠政徹滄涯民協青壤和氣蒸蒸溢於遐邇嶔崟者繁息潤澤者涵育桑麻鬱而風雲暢穀菜熟而康乂徵黃虞之治而華胥之風也父老子弟伏臘熙熙舉觴相慶且復精籲蒼漠其以斯民之生也治亂關於𢎞運休戚繫於相遭殘虐者流赤增波貪叨者地利惟盡我民何幸際我侯登我治耶往者天保之祝無亦感休慶而艾君以心也千古純誠殊無乖異此為三代直道而行者也是以不能無祝願於侯也南山之貞擬君之躬永君之躬不盡所願也松柏之茂擬君之操承君之操不盡所願也至情篤意殆超乎天保之外迓錫仰禧將望於君身之餘也如蘭之錫如麟之託昌厥後裕厥昆充厥公閭焉已矣天惟民聽而克享之篤生英秀實惟戊午之始秋君子卜其知本穹昊靈其效於溟水允矣且東溟濶匯百川長為委輸瀦秀二儀浡潏元綱嘉珍異寶獻瑞呈祥萬品類育千古可考也故夫木難明月尤補竒絶蓋涵於天一受於朏魄蚌之不知其獲於天珠之不知其成於蚌也造化之鍾於海者無窮而珠之産於蚌者曽無老少之異蚌之珠非海之靈耶君之子不猶蚌之珠耶於穆以無心福仁者而至仁亦不知所以承天休其時其地所適所遭皆莫可臆究今君侯年幾強仕宜蚤育江鄉而佳氣顧騰於海域宜多男於窮居而弧矢甫繫於朱幡其澤及生民而後天德之乎其涵濡滄津覽濤波之吐吞沐蛟龍之煙雨漸其秀而化於靈亦得以蓄結玄妙是皆未可知也但民情所寓人言所及依理符迹吾不得而遺論也烏可不謂之海靈耶况英物韡韡啼聲琅琅猶鴻鵠雖未羽而拂霄之勢可逆覩矣幻逸天池清瑩蟾彩異時光朝廷輝四海聲夷貊重古今兹公之慶也民之望也海之靈所以協於天也代贈劉氏樂夀堂序劉氏子者風神逸爽偉然三齊俊人襲先聲纍業雄於珠右拓故第而新之大搆霄峥川原動色且廣締四方豪彥一時儒紳率雅愛之甲子冬豫將北探江春戒行在即忽有欲為留行者倥偬氷雪間切諭劉子景懷今願竊導騰虬披珠雲移旌而南光乃鼎室遺乃珠璣以垂慶於無極惴惴然將不慰草茅覬私耶豫解莞唯唯用扁樂夀以贈主人揖而前敬觴為夀或曰智者樂仁者夀智仁之道亦大矣哲如顔樊猶待問焉劉氏其智仁矣乎奚扁為豫曰不然人心之天不終澌泯塗珠璞玉礱浣彌光匪情而揚誣也機萌而沮棄也皆非也軻命世英儒曽不知戰國風習顧以仁義爭論於時可謂智乎無亦以彼昏不愛仁義而利之出乎仁義者將不愛耶故梁惠好臺沼而進之聖齊宣好雪宫而推諸王齊梁不關民隱然齊聖興王諒足悚動方寸劉君為斯堂將自娛而永焉者吾不以樂夀開之堂胡為哉况望其知仁乎吾今冀其樂而夀焉融融斯泄泄斯伏臘斯子孫斯劉君其自得矣雖不告以仁知將不繹其所以而求諸浚源植本要有餘師因樂以崇知由夀以敦仁樂樂而逹於君底豫而逹於親塤箎而逹於兄弟琴瑟而逹於妻子笙簧而逹於賓友周流活潑莫非樂地罔惑於聲色罔誘於貨賄罔奪於威力安固永貞無戕所天樂示而智進夀啓而仁𢎞緣此獲彼魚網鴻罹誰則知之劉君將不為明理以終樂貞守以介夀者乎况東望滄溟西顧長河鯨波潮而虬帶環陽侯河伯君之適也大勞在瞻二珠伊邇青蒼藹而鴻龎基林林央央君之契也此又非樂夀出於堂之外而智仁之雅懷幽致會得於天者乎使君而淫於樂於智則昏焉已無述於夀於仁則悖焉已昏且悖其奚處於斯堂或曰博矣哉君子之言非淺夫所窺也僉勉劉君其慎審於樂夀勞山仙迹序勞為墨陽靈峙枕滄溟而峻迥東南秀於青聲於天下逸物外者咸兹樂慕逢冠挂而斯東安期老焉胥有取也世傳丘劉王馬輩舉此仙焉信耶渺茫之故適非青眼妄耶史籍攸徵殆難極詆嵇生之論存乎養久而仙或由兹也長春諸翁見超寰宇越嶔崟履竒峭奚啻千億秪惟勞焉依依無謂耶海嶽之吐吞雲物之舒卷冥化之往來必有竒趣入乎其心而契焉而陶焉者虛牝抱元精錬致極而還虛破造要所必至蓋亦自不知其喬松之趨也混古今於天地弄風月於川岑神遊意適罔非豫所寸靈之祕泄於英詞悟塵之幾託於幽石霞栖雪飱紫封碧蔭鳥窺而樵遊焉耳詠我思者誰歟嘉靖甲子載值君陽湯公尹墨宓絃之暇慰適宦况勞無餘區尋幽興懷撫迹增慨虛玄茫昧者空復夢思而垂悠寄逺者宛在貞堅猶可倣誦刳翳掃煙靡隱弗底獲詩詞古體五十餘篇玄珠之慶良慊夙私竊惟海內之嶙峋層見竒迹恆鮮乃有高林石之興而欲一騁歷覽之懷率皆滯於時牽於勢塵拘艱解悼種種豫毛卒未之酬者指可勝屈耶雖豫亦密邇海涯才百里耳覩﨑峭於目前聆勝絶於夙昔寸心如飛猶越萬里攀躋之志恆切而仍嵗無諧况其逺者乎君陽公以其迹諸勞者移諸梓邈歷逮兹曠逢懿舉俾無脛珠玉倏遍中原勝徵而情慰無勞而可勞間有微辭奧旨妙悟神會者得無樂際矣乎君陽之於道玄關幽鍵仰不可窺即仙迹攸崇無乃慕之篤飬之深臭味之相入賞音於善歌者歟于野之利何其博哉矧蒞墨以來軒黃之化而旌陽之政迹之寓乎墨者皆以銘諸心不但寓乎勞者存諸石焉耳噫演勞迹者君陽也昭墨迹者玉堂在今銀筆在後不知其當為誰也塵埃鄙人雕龍匪技詎敢為諸仙序聊復對君陽之命述其略兼章君陽之美意云贈儲少梅將軍掄典戎政序膠為遼右窮壤南北界萊靈二戍間徹三百餘里滄溟浩望曠然潮汐之區倭夷伺逞靡常撫圖籌釁者乃不顧兹陬凜森耶沿涘連兵以膠衝雄鎮崇墉以昭巖駐戎以張威選將厲才倡勇明政用宣聖武遐荒也始敦任七侯率由殊簡二百年中繼美揚聲海上者今莫仰矣儲氏少梅將軍將門英胄涵淹儒術毅然剛介中有雍容文雅之懿藝精力強才優識朗古名將風烈銜命以來文武屬心殆以安危輕重繫將軍也嘉靖辛酉春侍史檄執戎政遴選慎名實核協人望哉少梅將軍震惶罔自勝感一飯於思酬慚世祿於未補顧不幡然悟奮然興惕然求免厥艱耶中外熙熙卬首維新令而風霆威而霜雪介而金石操而氷檗樽爼可以折衝帷幄可以禦侮虎豹雄踞長城逶迤鯨鯢之波其幾息矣乎蛇豕之毒其或靖矣乎絃誦興耕耘無事太平之樂乃不賴將軍以有終矣乎冠裳相慶且從而祝之難副惟聲難克惟終細或不矜其罔有不傾將於上下負匪淺也尚自厲焉拊髀惟時築拜有期垂黃秉鉞萬里之封豈直區區一隅之顯已哉謹日夕以仰代薑省吾侍御送劉春臺太守考績序嵗辛酉搖光樹虛危寒颸凛如玉塵炯炯春臺侯敝車羸馬遄征之色溢於道亭庶黎超駭莫慰攀延熙洽中不知崇年效績檄速稽核將以旌淑德昭陟典也猝奪吾良奈若何省吾子榮其行君子也幾何人哉聖皇三五紹庥渴篤世英四紀相尋以躋嘉靖之治無他考核鼓舞爾也侯六載溟陬一貞永矢雖有橫陳漠然也楊稱四知弗來胡畏劉才一選弗贈胡辭侯曽未聞來且贈也殆奫淵方寸波瀾寂絶要難以漫窺焉者無蕩天機庶理懇至公斯也明斯也威而斷斯也本植而績庶凝焉孤魄停瀛清飈逸岱夫或得而禦且掩諸兹不稽焉攸勸今天下籍名寵以騁盡錙銖而利實有蓬心蠧乃紀經胡能侯擬繼侯而後皆侯耶匪侯耶種種豫懷無或諼焉若帝臣罔蔽萬里有明寵眷茂殊寄任出入以德諸郡者德諸天下此又人心無既之覬也省吾子煢煢南山之廬松楸外不狎塵機侯行念兹揆有言任愧無言徵制於時泥於迹即不能以侯圖報尚宣言臺垣庸罄忠赤行將采焉以聞慰夙私也姑以虛江公甫來竒侯之器不遑悉侯之澤樂聞而誦之趣張水石嬋媛增楚金石震而玉觴釂旍斿揚而五雲茫驪駒不忍聞執豫言以贈海屋添籌序夀年家楊參峯太翁添籌事邈不可知然造化之運甲子循環其或司冥紀者理亦有之近恆摹繪竒迹以相贈遺無亦援仙靈以擬長年非斯人之至情己乎此其圖者何夀洛之楊崑翁也其夀楊崑翁者何敦年家懿也吾郎慎修膠致乙丑春第適與賢嗣同之參峯君為崑岡片玉洛才俊逸也視海山牧豎奚啻倍蓰實竊蠅附及分令鹽瀆而又同宷淮隂洽情楚水且幾三祀郎嘗拜崑翁淮邸而衰質亦曽幸挹參峯通家之契良亦深矣戊辰春旅覲燕都王事竟參峯君怵然記翁當七帙稀古春秋喜溢顔色將汲汲便經故洛以觴初度郎聞而嘉之欲偕往不果遙致已心許焉歸而語諸庭余曰諾佳哉是不可無慶慶以神祉吾海人室廬潮汐間仙迹茫茫習聞已久雖不躬覿其異古史籍亮不厚誣添籌海屋兹用圖焉今復指三山之暗藹睇十洲於微茫銀臺金闕所寓紫鸞黃鶴所歸海之屋殆可究可言籌之添亦何終何始水淺蓬萊塵揚澥渤籠鳥之辰云誰數計而太虛浩劫要難紀極嵗易籌偕人依化運崑山翁其將優遊穹壤而不自知其夀擬玄昊也雪刺方曈烏紗玉杖餐霞咀芝雲卧天遊悠然伊洛中奚俟玄圃瑶池耶况桂林鬱鬱蘭茁森森而賢嗣參峯飛鳬之履甫過金門旌揚之聲上逹天闕行復大擢玉堂調鼎鼐以夀皇圖則黃虞斯世真不負所以義涵也龍章鳳采紫誥重褒自天之澤如海斯深此又添籌外無涯之福籌亦所不能盡算焉者矣小子乞豫言以信友篤敬也參峯事君不忘其親崇孝也崑山翁茂無疆之夀徵仁也敬則善交孝則不匱仁則與天地萬物為一體宏裕而可親焉者也余於翁神交久矣况今蠢延亦已六十有九晚齡同躋喜聞而樂誦之欲同慶華堂仙雲縹渺莫慰逖忱忝同盟之好假仙籌以獻同天之祝云代慎修送溫玉齋三尹榮擢魯藩司寶序余素耽清曠家世海山狎於心目出必登臨舒寫入則園林沼榭會心自娛同志者蓋寡焉乙丑夏謬領鹽寄違猿鶴而南勉蒞陬僻日夕塵勞頽乎俗吏回首雲阿夢寐渺然乃有少尹溫玉翁者風流醖藉曠古髙人雍容官署中峻結幽軒小築亭臺佳木蔥鬱琴鶴蕭然偷間機務而山林餘事隨其所適蓋超然不纍於喧囂之煩而灑然特逸於簮紱之外也余然後知其為仕而隱焉者况乃堅持凛凛不為苟汚豈特居處之清而高節更自嶄然可謂心迹兼得其養而孤竒塵表寡儔也余每喜其煙霞幽趣宛在咫尺簿書之暇假之遊衍資之咨諏相與上下數千載間古之是非得失以及今之賢不肖可否飛屑渢渢如燭斯照蔡斯卜也吁有是哉翁之可嘉樂也其裨於拙薄良不淺矣究極師友淵源翁汝人育汝秀而邇南陽山川之靈其亦有得伏龍鳳雛之遺風者不然胡高雅乃爾竊慶方殷忽有東藩之擢聖天子篤金玉之親重鳳鸞之輔去鹽就魯親親賢賢之義兼得之矣但江海之留思未艾鴻鴈之興懷無已也翁行矣魯周公舊國宣尼所生禮樂遺風千古不終澌泯翁覽龜蒙洙泗之勝撫浴沂風詠之迹回琴點瑟人逺而真樂猶有可尋翁臭味惟同慨慕依俙磨之嵗月當必有進於平生者翁慎厥司欽厥寶增輝滄岱以迓天休此其常業耳恪職之外更以寶之胸中者為國華焉則輝光日新清越以長綱常植彞倫昭主德敦教化隆亦幾乎變而至道矣魯將不遺其所常寶者而寶翁耶况懿德之好有生恆性竊恐魯不私其寶而揚于帝庭以為天下共寶之是又所日望而惓惓者翁其無自高以棄天下贈景節推重均膠役序斯民慕三代之風而千古無忘者何哉孟子曰三代之得天下以仁仁也者亦惟得其民心焉耳夫民情不一物理自然夫孰得而遂之乎是以傳大學者謂君子有潔矩之道亦莫非王道支流三代遺意也然明王圖治惟艱曽不以得人為要務乎哉肆我今上法祖𢎞恩求賢如渴親民宣化尤莫急於守令龔黃卓魯期其人三代之治覬其盛也且令非也而守正之守失也而府抑之此又設官之美意而行仁之令典也吾膠僻在海涯尤為弊郡土瘠民貧役繁賦重號稱難治久矣雖有循良之政猶不能速效於更生况舞文弄法者之相仍而姦偽萌生耶民焉攸賴國家例以三載一均民役隆慶庚午冬適當其期亨菴守以覲事匆匆未暇竟妥東方嗷嗷哀鴻之聲溢於海隅撫臺憂之思得風裁夙著者一為撫綏而我公當時已蚤為默卜矣公適以賀嵗聞命戴星而東秪惟負託是懼入膠來愴弊悲窮補偏剔蠧恤瘡痍如已子慰寒酸猶故知好所好惡所惡一徇民便而罔參已私真猶父母之愛其子也無矜容無厲色春風和氣中人未嘗不畏刑威痛懲下人未嘗不服斟酌得調停之善而會計無錙銖之差上不滯惠澤於當道下不致隅泣於窮簷一時膏雨宛蘇海壖白首絶荒自謂終於頽風已也何意驟覩善人之治曠瞻三代之澤不猶醉而醒瘖而鳴仆而起耶公青年甲第敻然燕雲雋才小試魯郡天假惠臨初挹其輝采侍其珠唾已識其逸絶風塵矣况復躬蒙德教而舉措間雅規度𢎞裕逆占所就更當何如噫宰肉細事也且以徵相今此休休之心優優之政章章人之心目時復金甌之卜舍公其誰士類歡慕之餘挽之固不可留望之又不忍去聊託衰殘以相贈誦然東野之鄙言諒不足為鴻筆齒草次揄揚一以為君子美一以為俗吏風焉張平山畫册序張平山者大梁祥符張路也字天馳初號茅蹊子先大夫正德辛未間判開封豫因識之時張遊府庠計其年可三十前也體質短小器識溫雅胸次灑有竒趣不多飲酒賦詩鳴琴志役物外而其筆造之妙初無所受於人天畀之巧雖心手亦不可得而知一落頴靡不駭訝時譽藉然每留連於豪商大賈妖豔珍竒羈縻百種以是士大夫慰其意者蓋寡矣而窘焉者恆有難色先大夫略常格曲意招之張感焉及晤談契合遂傾意相將而交好日敦始愛豫丱總知琴曽作高興圖為忘年贈其相與之情伯仲中於豫尤篤也燈宵手語時復連牀抵今有惻乘興揮灑甚多曽覩有象簮刻張路字盡妙處即識之倉卒之圖多而不暇且漫然有待遂因循終致不果丙子秋先大夫有武昌之命分袂來迥不相聞後訪其貢之太學珍於公卿名動京師先不知更號何年而天下莫不膾稱張平山也有得片紙尺素之遺者寶藏珍愛琬琰木難無以易之皆不知吾家之所蓄者多且久焉愛雖鍾於平日名復重於末年其進於後來者竟無一獲是為悵爾雖然但要其得意處雖少年猶老筆嘗聞昔之詩人有年未壯而風格亦已夙成者卓識異才豈論蚤暮張之筆妙殆亦無聲詩也何老少云良亦足珍逮今五十餘年間散之昆季而獨存者無幾張曽謂蓄畫莫如作册吾因而役志焉兹用永之以方付慎修慎祕以藏值嘉靖乙丑舉進士出宰鹽城余亦當隴西歸暇從容借遊攜取以資玩弄適覯溫栗翁三尹汝人也得平山之履歷甚悉始知夀以云殂也深為悼悒將追刻平山小印於諸所遺皆為補識庶不混真以衍厥聲又欲各勉題詠哀思之餘以終朋好之誼且恐才不逮志詞不能摹先生之精也夫姑曲為敘述以章諸首云賀張恂翁七帙序古今人恆多慕仙其慕仙者何謂長生也曠逸塵表也神變化於莫測意萌而罔不慰也其孰能破造化外五行與天地並日月侔哉借有勞心苦形如鑽盤閲壁負井揖枯精煉致極而至於吹笙跨鶴鳴簫乘鳳駕赤鯉於清波驅綵輿於碧落以相羊乎兩間者要皆理之所不可知也蠱惑之深雖帝王亦不能自己荒哉燕昭周穆秦皇漢武之為心也張翁寓於稠人之中而特異乎尋常之外産古即墨去鄒魯甚近陶然醉孔孟之風於數千載之下純乎其中而朴乎其外共德在家謙光在鄉庭教孜孜篤求善類以為師友之資乃爾賢嗣文伯秋雲效捷赫然揚海岱之光行復登瀛選膺台寵為時霖雨舟楫不賢而致是乎若夫役志渺茫以自沉溺於怪神誕妄皆所弗屑也然德本諸身靜而恆焉不期其夀自爾永年出入煙霞優遊山海閲世故於虛舟撫日月於籠鳥忽不知其瞳爾紺背爾鮐髮爾種種矣邈乎夀之不可及已然嘗冠切雲於暇日拽靈夀於清風褒衣芝馥濶帶蘭馨酣春醁而謳商山蕭然太勞峯下為帝懸解安期之儔歟偓佺之儔歟崑崙蓬島奚以踰兹芝顔玉彩快覩斯人其於生翰白日而清虛莫可倣佛者何如耶桂嗣蘭孫繩繩森立其於名存仙籍而苗裔莫可究極者何如耶况帝賚之榮莫逆其後天錫之齡未究其終翁之仙於人間而出乎天仙之上者蓋幾許矣福祉非常墨云胥慶膠之縉紳能無景德而希光已乎且託豫言以贈顧拙薄弗克誦述秪惟吾郎慎修嘗內交文伯舊有通家之雅乃勉於揚榷陳辭為諸公代夀贈鏡湖王司巡三載考績序夫觀政者聞其譽不若覿其人覿其人不若核其績績徵而慰覩焉宜其譽之不泯也鏡湖子淮陽美士楚藩淑僚擢巡逄猛司銓者拔英揚俊遙託荒陬謂其雄鎮要害而分寄山海也方其揚旌而來勵精應物雍雍楚楚溫然連城之輝毅然百煉之彩人咸謂兹貞良之質也豫聞之可哉容未必然既而士相與禮愛之無尤焉民相與敬畏之無厭焉有司悉從而付托之無惑焉人咸謂兹才能吏也豫聞之可哉譽未必然洋洋藉藉殆擬芳秋蘭比翼翔鴻矣君子要不得而盡信也某衰謝巖壑瞥然塵務冠裳車馬邈不相及吾於鏡湖子飢渴有情云覯未繇空復勞止乙丑春適泥書在庭填門有慶鏡湖子牽羊負綵以臨挹其光沖如也聆其音秩如也把袂惓惓好爾忘倦吁嗟人言其不謬哉及察膠南曠數百里靈鼇之衝而青徐之走集也變亂無常恆為當道憂乃者防禦有方馘俘屢效東南僻域殆坐靖耳曽不聞夷窺於溟寇恣於野也且催科有道不妨公不病民寸𠂻無纍而匹夫不怨得人若此亦難矣哉期當考績而去人咸思慕之君其勉諸方今用賢無方超陟不次君之晉未可指數切無懈清操弛壯圖乖古道負明時以自隳嘉譽而頽偉績也戒行晚秋庶情悒悒追而送之雲之涯酌我醴竭我忱臨風以贈君胡來東山孔懷君胡去五雲維翥君之心惟石與金矢彼石金君子攸欽送樓念竹太守入覲序古諸侯朝禮孔子列之九經以啓魯哀孟軻氏本之述職以悟齊宣振王綱以垂後法厥意豈其微哉我聖祖開基撫有華夏酌古準今制為三載一入覲天下有司莫不應期以從事是舉也立法之精又有超乎前代者寓焉考核由兹也旌别由兹也黜陟由兹也勸懲由兹也玉帛之萃有以光神禹之隆英俊之輯足以協虞庭之美乃不盛歟况今聖主虛已好賢孳孳圖治往年躬宣睿旨以勞逺臣宴賜之榮恩禮之篤懷忠良而有激者孰不精乃心竭乃力效乃職耶是使天下罔不臣政罔不舉民罔不順且治也熙洽之世何幸躬逢萬厯丁丑春又當其期我膠侯念翁將行膠人始仰而樂其進御宸極又不忍暫睽而忘情於翁也翁胡為乎來哉翁江山瑞靈簪裳淑裔早登甲第而首試以推鞫西江強禦不畏摧抑權姦者法無少貸聽斷惟明平反曖昧者衆罔不服徑節髙風悚動上下維時內詔殷勤秋曹暫署朝野方慶其弼教得人天下可以無寃民也何間乃萋菲生焉濟水别駕以行其亦黯而淮陽舒而江都焉者其誰不為之憤惋耶公忠勤自若漠然無動鞅掌塵埃中聲聞藹然當道以膠難其人遴擬我翁而疏遷之御命東下海人其更生時也五馬蕭蕭朱幡郁郁蓬瀛生色草木增輝不半載而田野辟餘糧栖畝也人民治華胥易境也訟獄均雀鼠相安也盜賊息犬吠不驚也較藝奎垣朱衣不違於青夜平徭窮壤蒼生溥被於春陽籬落鶯花山城絃誦豺狼屏迹鴻鴈無哀依俙太古之風倏以挽也吁嗟乎昔何時也今何時也而何其來之暮耶且今之慕古者以鄰境言之不過曰渤之龔遂密之卓茂伯起之介潔蓋公之清靜芳名雖茂而實惠澌泯語之人人亦罔焉耳乃者循名核實交相副焉青眼康乂間當漢之循良者其誰歟翁之過於古人不其逺乎方今明通萬里簡在無私斯行也甫邇天顔則晉接殊隆超踰非次騰翥當其時而久於膠不克終留也仁人之失可不為深慮乎迂叟沐岐陽之澤藏之乃心徒將不朽耳適辱諸縉紳以言徵竊愧頽齡昏耄謝頴楮久矣上無以悉衆善下無以盡羣情聊述鄙懷以僣達諸道左且祝之曰其人如玉挹公之光兮其德如春值古之良兮天子維明兮式穀之彰兮海人有懷兮亟矯首於帝鄉兮海壑吟稿卷八
