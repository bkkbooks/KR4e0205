body:
  text: 海壑吟稿卷十一明趙完璧撰與丘月林給事書前軒車東來未暇一言而返久許勞思不慰片時欵教悵恨何如聞即吉坐失趨候衰病窮居艱於動履惟賜體亮想北行不日此别仰陟鈞衡慰瞻盛世而丘林野老日趨凋朽再圖良晤河清之俟更幾何哉兹遣候情抱無涯書莫能悉臨楮悵然知復云何惟知己鑒原答毛行齋太守親家書牛馬走蠢愚無似苟延五紀何益明時消損天日負愧良多豈期謬辱盛使惠我好音眷我珍品捧慰登嘉感佩寧有既耶尚容遣候使還暫此伸謝又數月來家務瑣冗未遑馳候適聞道體違和鄙懷切切徒抱趨侍悃私奮飛安得想斯文之係匪輕吉人之佑有在擬復妥然倍常矣况君家孝子慈孫自善調攝無憂也謹專人齎小牘奉問惟避俗清心重加玉愛以永仙齡以慰天南寸慕不備又前令孫回已具啓謝近聞海屋初度在即擬將趨瑶臺執霞觴以效蓬山慶誠奈塵冗衰疴不果初志且若之何北望迢迢耿懷無已敬遣蒼奴持罌醐籠果少將逖忱其為我頥揮萬萬與舒城孫生書疇昔邂逅京邸垂我欵私示我肝膈揆照涼薄何緣雅遇胡十餘年來去留異迹離合靡常風塵中令人常抱惘思曽不得把臂朝夕以敦舊好情如之何卯科仰冀魁名蕡屈既徂午年傾候垂光轉加落寞是何不遇之數耶而倫絶見忌耶抑亦晚成而大器有需耶兹者酉宿天開文光照於廬嶽想休徴端在子矣秋風發而桂馡春江波而花暖得意驊騮長安之勝一朝遍矣不識通家兒曹獲蠅繫否不肖苟祿西城五年餘叨擢鞏昌出監靖虜邈在邊陲荒山紫草殊絶中原雖上下之情每有相宜而風土之薄良無所賴甫半載而來琴鶴蕭然海山恬若科名眊矂於少年勳業衰頽於青鏡閲來世務賢否之乖宜清濁之異遇物理顛倒幽獨祗默於邑耳然又嘗竊倣達人之觀乃不順適所天也耶栖遑林壑庇以先廬給以山田詩酒琴書此焉自足鶯花風月知己無多惟此老焉竟何足齒適舍親分教來始以彼之獲依於執事為甚幸而繼以不肖之得通於門下為尤幸也草此聊陳久曠懷私瑣瑣無倫惟髙明賜亮與任丘邊通府書别來久許不奉顔色悵惘彌深聞候京師不識擢補何城想暫復而大遷矣美質清才真明時利器他日寵榮曷可量哉何似不肖迂疏方稜動見觸忤滋謗賈禍竟所不免委棄山野適分之宜粗有敝廬薄田優遊海上與林壑居與雲霞侣鳴桐酣醴散帙詠歌瓊林桂闕付之三郎秋月春翹陶於百嵗清狂野叟何足為朝紳齒耶但夙蒙雅愛會晤無繇而音塵曠絶不敢不以私悃相寄也前所託海天泉壤二册近曾注意否倘不見遺萬一獲協初志沒齒曷忘千里惓惓不勝遙懇之至又違教六載忽焉逮兹海山修迥光景迅逝奈老懷何哉林谷岑寂偶辱華札兼蒙珍惠自天之隕感愧何如捧讀間既諗大擢曷勝欣忭及再聞尊閫謝棄之變震悼不任想鸞續已久探珠消息近不識幾許也此亦不肖為兄宿懷焉者然瓜瓞末豐理數必至敬候佳音足為遐慰蘇鸞回敬此奉謝仰恕不恭切切與濟南王羅溪通府書别來數載夢想光顔無由為慰每念疇昔叨侍京師稠人中俯辱髙情方寸懷私刻鏤何能泯沒適聞榮擢東藩佳聲騰播溥延海岱君侯竒績南北之間亦偉矣哉大拜明時畫期可待不肖西隴來歸棲遲海上劚山漁水聊復終老惡足云小兒慎幾以省試來謹兹候問惟台鑒不悉與王冠峯書再辱翰札謝謝别忽半載淮海悠悠何如為情撫良時抱長憶耳聞舒之士風純雅土俗竂寀兼際一時之盛慰慰惠來漁歌竒譜小試頗佳但訛謬太甚煩暑中不暇密審姑候涼秋徐按之以副遙愛使旋暫復祈賜照鹽城答王冠峯書昨淮上人歸得手教知浩然髙舉撫掌歎賞急流之勇當時孰有逾於君者煙溟雲嶠恣意徘徊况壯年強健天趣無涯不肖又輸君一頭地雖然滄浪潦倒中且猶勉爾競為風月主方日夜俟東攜取枯桐古音以相陶寫於雲水之陽每欲奮一揚翰蓬煙杳如楚天莫慰且若之何悵懷悵懷羽便率爾奉候涼秋蕭條瞻慕不能為情擬幽人會此區區是仰鹽城與薑石澤封憲老親家書别來不親教範奄歘逾年桑榆契侣頓致杳違淮海浩渺中時復令人回首俟期而旋何如慕渴吾兄頥養滄溟陶意種種天禧無涯而相業有託景羡景羡不肖從兒曺小宦邸扃鑰閴寂不任結束仰東山杖屨徒五內燥熱焉耳便中小致問私餘再候鹽城答黃海洲書仰間忽承手札兼再辱寵貺謝謝吾兄晦養雲需會心魚鳥於勢分莫攖清曠之娛迥自翹企不肖凝寒中逐孱弱書生閴羈粉邸顧淮海煙雲不任惆悵冀春來旋斾以慰夙况且復伺通猿鶴或有期也兒曹株守小吏久忝素延祇貽遙莞爾來教已悉想閥閲遺聲賢德休光自足感人於無既自分卑微揆不為人重輕也勉令轉為裁候聊致葭莩至意以自盡耳敢遽圖君家補益云乎愧愧鴻返此復希原照謝平度崔生疇昔京邸辱枉未遑從容聆唾音抱歉未既邇年來兒曹往返取戾門下良多鄙懷耿耿忽復瓊函有隕珍品猥頒捧誦拜嘉頓令慙汘豚犬兒謬附末第曾無足齒道沾被寵錫若此怖感曷勝久仰跌宕雅懷曠逸髙致海山風月中良儔也何白首衰殘經年百里竟不獲一挹芝采探玄機淑道妙川逝悠悠俟復何時此為悵恨使還倉卒敬此附謝與即墨湯君陽大尹邇聞寵陟鸞音别榮熊駕林壑慰然可謂無負賢勞矣似於俊才偉績少有不協殆明世登良要有漸次隆崇之典仍合旦夕期也然體國仁賢應自有後獲深識鄙窺何如何如但墨水蒼生無復冦借膠湄黃髮靡從斗瞻兹焉悵爾早圖參謁之行適為良晤何意井坐塵闠尊駕稅於王而不知尋候於薑而弗遇再要於匡而星軺長往矣縱橫顛越仙迹杳然徒令望塵愧恨負罪庸何可言敬兹遣謝兼附鄙稿用塵清閲佛頭之穢誠無足云亦聊以竟嚴命爾統惟原照鹽城謝劉雪溪太守書僕衰殘朽質沈迹溪壑方過眷西伯頓暌南服周悉髙情備辱臨岐殆偕日俱新也邇忽秋暮春回海山如失清顔曠别夢想何依竊念瀕溟枯稿罔不慰被青陽顧區區末路邈越楚雲可能侍粲花於清颸剪芳蘭於良夕叨恩如昔耶白首馳神青冥鎩羽俟時而東惡知其九霄靈鳳千里神虬亦焉攸寓嘉樂淑人竟我心惻奈我翁何哉風便小裁敬致遙悃岑寂中不盡惘懷仰冀德涵萬一答紀鑑塘司徒郎忽教音猥及髙情欵悉走衰朽林丘曷堪屑惠無乃德之至愛之深不我終棄爾耳足下清才朗識巍陟徒卿進依英主退協仙僚優遊鵷省中議政論文自是青雲竒趣昔人謂向長安西笑企慕何如時復大擢柱輔擬樹無前偉績於昌期走之所遙欽而仰羡者指可勝屈耶且不替兒曺舊好澤益有歸感念殊切逖謝幽忱良莫能極潦倒岩阿強勉報候苐恐煙霞鄙悖唐突風雲取罪萬萬清秋爽颯塞氣髙涼懇冀玉息以將天休臨書悵惘無既答福山郭嗣翁尚書瞻企間忽仙翰俯臨兼天機有隕發函愧感仰謝仰謝頃在淮咫尺無聞坐失良晤令人惘恨不肖自南歸俗務纒牽殊乏清興新聲舊譜兩負夙心向亦無得今且幾忘矣聞山居吟得之桐菴者想亦造妙而陽春樵歌曽記於邊邸譜贈或亦不可棄也數曲之雅真足以快適東山矣又奚以多為哉然嘗緬惟髙致風月邊空復劬勞每有東勞之思海市之想俄慰此行擬當一候門牆然白首桑榆知復將來何似亦聊云此一胡盧耳黨人之變諸子姪元妄被災苦何可言幸昭然餘不足憾矣辱蒙言念感感别啓來教已聞命今亦未敢輕擬其人俟從容馳報與安丘黃甥茂才書久曠情疏殊切懷念向聞春試優選欣慰不勝既而秋鏖失利更增悵悒然妙齡青紫時復當芥拾也雲霄天馬何患於暫蹶耶但淬礪無輟以速嗣前武丁寧耳吾庠吳冠老俊逸髙雅人也今擢貴庠教長將渠泮生輝春風轉徙也子其善事之渠修吾膠志創稿未半遽有此行將攜彼處終之及思我先君墓志乃若翁海野筆也今原稿已遺想賢甥家藏者猶存可檢出録致以備風采蓋首欲不泯英才鴻筆而先人實行亦賴以不墜吾與子不偕慊於心乎子其念之臨書不罄懇私惟孝子仁人鑒察之答章丘胡湖山三尹適辱教翰切慰渴懷幸接玉郎再諗吾兄二十餘年履歷動定深恨璠璵重器不獲大揚明時轗軻􅒈屼竟致山野遺逸自君子觀之不無倒植之嘆乃聞諸郎若孫桂蘭叢茂秋來當自有效竒捷者不將以信兄所未信耶亦姑陶適煙霞從容迓玄錫耳竊為默慶之再憶疇昔都城一覿英風而豪人意氣便投肝膈亦傾蓋猶夙契焉者未幾倏别悮觸權豪猶賴故人夙愛致蒙元老科臺俯為垂手公論不泯而瀕萬死者僅得一生何幸如之偷生苟祿忝擢鞏昌塞垣凄寞良非衰老所堪六越月而歸乃酬素願栖遑海嶽間犁鋤編簡傳家舊矣誨諸郎以是老焉已也何意二郎慎修濫叨甲第蠢子迂翁實出望外及謬尹鹽瀆亦嘗俯逐琴鶴聊適晚懷於淮海也三載還兒復忝附郎署曽何勞績近補維揚令人慙悚不肖衰齡適今七十又七老荆少五嵗而相偕豚犬兒三慎幾亦叨廩慎動附庠末小孫四而警當志學略知文字亦可粗繼書種供桑榆玩弄也且拾先人之餘材完小子之新第琴書餘暇松竹盤桓癡延崦嵫餘映朝夕所不可知者亦一付之冥造耳吾兄果有東山髙興秋風春日引首西岑正慊百年志願何如慕何如慕恃愛瑣瀆忘陋取罪仰惟老知已情鑒謝維揚嚴紹峯二守久企芳聞不階瞻挹瓊采拱聆珠唾以雪灑衰朽塵抱空復馳神江淮耳竊幸兒曹忝厠左右辱益良多琬琰華英不棄葭倚是為逺荷昨兒書來啓函得善册一帙倉皇再閲乃知鄙稿也又復捧誦首尾佳篇乃知二公賜愛也本海壖野語暫藏之敝笥終當覆瓿焉耳曷意塵之名家而且梓焉刻製端整裝繕雅麗自揆鄙俚豈宜過蒙稱譽重勞增美若是耶無乃陶瓦賤質朽株棄材悮飾之金玉章之青黃耳愛之深寧不使愧之益深乎又聞垂念賤辰猥惠錦製珠光玉瑩頓令南極增輝東瀛生色身膺垂老之慶家傳不世之珍也刻感更當何如便此統伸謝私衰眸病骨草次不恭臨風莫罄鄙懷邈越天南勞望靡既祈惟台照惓惓徐瞽道募緣疏竊以太玄溥化妙無外以何仁品彚肖形私有生以成性洪纎各足終始相忘稟賦惟均得喪或異椿齡芝秀草木且復歸根龜息鶴胎禽獸亦知有養是以智超苦海者不同腐於塵緣見爽真機者欲髙飛於仙界鼎湖龍去金華貽萬古之思函關牛歸紫氣協千年之瑞然道不可以易致必假修為况神每限於難通豈宜鹵莽金丹妙煉惟須靜定還虛玄關微機曾傍紛華入聖子晉長辭魏闕而笙鶴微茫希夷髙卧華峰而雲霞縹眇故奮凌霄之志者寧久滯於樊籠竭慕貞之誠者不暫依夫燕雀哀人身之一失萬劫惟難戀世法於七情九賊何滅徐子崇輝自九齡而波冥銀海返觀紫府清虛悟百嵗而電滅靈山長往白雲間寂早依禪室苦空金粟如來日奉沙門護持貝葉般若竹槎曾卓錫蓬雲十載潤袈裟鐵橛再開山池影幾年清智慧志上人力行妙道非不根徒誦狂言欲了真如可期後世奈仙緣之猶在赤松黃石每神交矧芳名之猶存玉室丹臺曾默識迷途猛省脫拋身入身之煩急流挽舟會用鉛棄鉛之妙違雪峯而趨玉極殷勤窺潭底日輪捨龍鉢而就鶴衣蕭散玩山頭月片修性而遺命何如性命之兼修得隂而失陽奚似隂陽之兩得江湖曠蕩荏苒曽遇髙真吳越徘徊繁華可能幽僻池亭水榭總為歌舞之區野寺山房盡是遊觀之所北人南悮空嗟萬里之勞紅霧白頭慨失半生之計利名場覷破罕得披沙見金聲色關打開誰識被褐懷玉幡然故國何假蘧廬吾黨多情仙鄊少遇秦皇漢武尚厪蓬島之懷龎萌海蟾且逸勞峯之興挾清風而載返還思滄海揚塵跨雪羽以言旋重嘆城郭如故真人所至從之者雲仍妙道攸存宗之者日盛望青蒼而髙蹈欲慰平生躋危嶮以幽居用償夙願翠屏岩畔怡三生舊日精魂華樓宫巔接萬里紫霄煙靄罔辭塵陌他年之蟬蛻何期小結蓬茅此日之龍珠堪養金爐玉鼎顧佳地以何妨水虎火龍還先天而有藉然身歸靜域自應削迹於闠闤道慕玄門詎合縈魂於世俗若無外戶豈得內修世財罔施仙緣難遇窮鄉孤坐初難氣滿而忘食多侣寡儲終當壁立以待哺伏望四方聖衆一切善流𢎞開惠愛之門大建慈悲之業負夙德者定圖後效於來生崇隂功者必致善果於旋踵施恩於不報乃所以廣種福田力善於無聞亦將以終歸樂土黃金緑鏹借天地以迎恩尺布斗糧託鬼神以降鑒善緣速結須知天道好還惡報難明宜察人夀有幾請為推心以利物豈謂假天以欺人庶大道可借以有成而小補聊資於託始陽谷之晷斯繼於燧鑽飛亷之功獲濟於揮翮勢以微而裨著事以瑣而助洪功同八百之中行合三千之內給孤長者事有明徴元始天尊照無私漏諸天傾耳一體回心蹉失善緣幽沈難悔海壑吟稿卷十一
