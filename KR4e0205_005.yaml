body:
  text: 海壑吟稿巻五明趙完璧撰七言律詩下庚戍京邸除夕的的寒燈照寂寥悽悽鄉國望迢遥樽前欲醉腸應斷客裏逢春冷未消雪暗歸鴻書不至雲迷孤鶴思無聊衰年合笑燕山客獨對東風慕聖朝再次韻孫小渠除夕一年将盡寄金臺千里蕭條獨舉杯臘候無聊燈下别春光有頃暗中來身羈異境添霜鬢心逐薫爐化刼灰鄉國好憑飛夢去數聲寒角故吹回白川萬頃長川入望平烟開𣺌𣺌澹虚清翔鷗飛鷺茫如失落絮遊絲迥未明極目晴光霜練淨迫人寒色玉塵輕悠然太素還千古一幅齊紈畫未成春夜飲王吉菴兄弟宅醉歸賦簡春夜沉沉漏未終畫堂銀燭暖揺紅鍾期古調塵氛外逸少家風談笑中紫陌醉迷青海月蒼苔健倒白頭翁天涯何幸逢知己聊慰羈愁日夜東京邸清明遥憶芳菲故里春長安憐作一羈人松楸望斷青山外花鳥清孤滄海濵黄霧樓臺相識盡玉壺醽醁為誰斟寂寥獨倚東風醉簾幕黄昏燕子新次韻送張省㡬司城歸休鏌干繁劇試多年報主衰顱惕皓然囬首不堪孤鶴怨拂衣曽為一絲牽斜陽晚浦憐樽酒歸鴈春風慰海天滿目紅塵陶令去羈人淚落五雲邊艾山晩歸斜日亭亭石逕歸秋風颯颯捲征衣林聲度晚醒殘酒山氣生寒下翠㣲黄菊暫留烏帽去落霞遥逐斷鴻飛蒼茫猶自餘清興新月依人弄夕暉癸丑寒食無限花開無限情此身那得一閒行銀鞍栁外誰家子玉笛風前何處聲俗務絆人春已老清光猶夢醉難成賞心乆負浮生意鷗鷺争如早締盟春暮感懐春色初闌杏雪飛惱人情思暗依依風塵滿目誰相慰觴詠無心乆自違雲斷逺山虛淑景簾垂清晝送斜暉天真欲寫仍羈旅白首淹遲未拂衣九日集飲邊樂亭工所二首不見黄花兩度秋西風此日共優游青山入望飛難近俗事侵人却未休佳節祗今憐白髪賞心思昔對金甌征鴻落葉無吟興暫把茱萸一破愁燕山風物向髙秋税駕塵機合暫游寒日晚籬黄欲破淡烟晴野緑初休官衙竊禄慚金闕人事傷懐到玉甌山水幽閒何日遂蓬瀛回首浪生愁晚秋過城西廣通寺用韻颯颯秋風静法堂幽吟無與共酣觴踈踈寳樹垂清影冉冉天花散異香落照催歸山郭寺漁舟看弄水雲鄉遲留合慰偷門意俗擾從來抱恨長次韻李東岡關山逢人是處説關山巖險真成百二關空谷隂寒催白髪崇巒顛頓損朱顏才輸周召應知止老入氐羌却憶閒落日啼猿腸欲斷可堪征袖淚痕斑流曲河流曲河邊促曉行桃源乍喜赴仙程溪聲雪激寒潮吼山色屏開翠黛明楊栁石磯白晝静桑麻村落碧烟輕倥偬不慰徘徊意風送黄塵無限情早春用韻東風䇿䇿拂餘寒静掩柴扉戴鶡冠晷影漸舒閒裏度梅紅初上醉中看燒蘭暖合芳庭靄煮茗清分活水湍衰謝却宜春色早韶華真與意相安次黄海野韻寄李翁明齋壮心飛向白雲頭桂窟蓬瀛擬漫遊勲業不堪青鏡老璠璵早為碧山留孤蹤悵望韶華暮雙眼迢遥烟樹稠風月滿天春寂寂相違相憶兩無休雨後夜坐赤日煎沙苦未休墨雲拖雨倐然收中天霽魄三更晝一夕新涼六月秋深院無人風細細古槐垂露夜悠悠坐斜星漢清無寐酒醒芳庭獨自謳次韻登艾山風塵夢想故山遊白髪投簪向急流世路不堪驚險絶幽懐自合老林丘放歌邈逸青𡨕鵠把酒茫然滄海洲黄綺一歸紫芝老白雲此日慰鄉愁次韻刈麥宦海風波已倦遊東山生計老春秋杜鵑啼歇桑重緑梅雨晴初麥乍收餅餌香風新足慰流移此日故還稠巢由何與唐虞事自是江湖魏闕憂庭下新鑿二小泉小泉新甃碧泓渟混沌鑿開雙眼明入夜淪光動銀漢浮空霽色接滄溟孤居適意寒江破一片閒心秋影澄不敢濯纓蕩萍翠魚龍時作雨雲𡨕七月苦熱纔喜新秋不自勝豈期煩暑轉相仍㣲風小動爐中出虚閣髙凌甑裏蒸汗浹徒勞白羽扇肺乾空想玉壺氷翛然欲奮凌風翼汗漫清虚去未能贈江龍所别駕署膠風流文藻挹英賢綵筆通靈有異傳冀北羣空還自負漢南獨歩更誰先滄溟治績曽無右青史勲名不道前垂老㑹逢今日盛相忘䕫契醉堯天曹文村晚歸斜日荒山返斾旌野烟迢遞暗孤城路迷春草連雲碧水遶寒川隔岸明細雨不禁花外冷驚風可奈樹邊聲芳菲有興催歸急每苦登臨不稱情癸酉夏日赴西莊翠栁千條拂曉風亂山如迓擁晴空閒情緩轡蟬聲裏幽興題詩烟靄中野草連天望迢遞人家隔水正㝠濛青松短壑遥相慰一入白雲暑自窮癸酉七夕雨霽風清佳夕閒從人遥指絳河間鵲橋誕妄今何在牛女虛無嵗往還秪以盈盈一水隔却疑脉脉兩情關人間底事仍相乞夢向顛迷話更艱癸酉秋閲慎幾應試曉發感書癸酉秋七月之望慎幾曉赴省闈宵雨甫霽曉曦蒼凉清吹激於虚襟烟光染於迢遞撫清爽之凝眸而早嵗壮懐怵然又動且慨老無成貽譏薄子良可莞恨但二郎己叨甲第三郎又覬秋捷亦海曲之螢光僅為末齡薄慰耳漫爾此賦一畨清爽雨初晴正是英才折桂行雲路秋風香颯颯海山曉色翠盈盈壮懐有激仍昔日大笑無成奈後生白髪關情還作喜㡬家麟鳯疊芳聲贈王碧溪太守晉魯勲名夙所欽朱幡適慰海之濱蒼生曠被岐風舊白首重看漢吏新妙簡無私遭聖主催科有政屬能臣虎牢晩託重關險謂崇墉有績犬吠生釐擬誦頻聞試滄海遺珠感賦精英夙自結驪龍明月清光重海東擬破幽昏當暮夜合増輝彩向瓊宮沉泥滄浦知誰惜按劍朱門總未逢安得髙風來象罔便應長價到隋公清明春入清明自可遊竊将樂事脱閒愁落花烟裏從春酌細栁風前縱野謳去嵗隴添今嵗墓千年人悞百年謀六龍不為人間駐莫遣風塵空白頭殘臘小雪晩晴小雪隨風旋復晴晚曛獨眺自分明雲歸海浦寒空淨烟迥川原冷玉輕頃刻作花非積素顛狂為瑞竟虚名冬深不協蒼生望徒遣㣲隂蔽太清書能仁寺上人壁間十二回廊月正明菩提相見悟三生法雲真際醒塵眼寳樹清隂慰客情一壑泉鳴驚卓錫半天風下質飛旌金繩夢想開迷境此日相從憩化城五夜不寐脩篁移影月初沉青女侵忩夜不禁星下繁機猶在眼海邊歸夢尚關心啼殘沙鴈燕雲冷開徧籬英塞日深輾轉寒更渾不寐媿羈升斗未抽簮旅夜霜清月白酒初醒嗚咽悲笳調鳯城紗静老梅横瘦影庭空踈竹送寒聲羈愁多病頭應白王事關心夢不清輾轉殘更眠未得宦情爭似故鄉情次韻秋園晚興殘照離離帶逺林秋園晚色豁塵襟玉欄風細梧桐落石竇烟涵蟋蟀唫題句恨無堪刻竹歸巢喜有倦飛禽金錢滿地知誰惜醉卧蒼苔興獨深喜月林奉使回京師他鄉大喜故人回塵抱相從一暫開芝宇三秋孤館夢萍蹤萬里五雲偕北風興逸燕山酒皎月歌殘郭隗臺宦海由來無定所老懐可奈濟川才海屋添籌夀尹金峰侍御太翁關河迢遞思無窮落照蒼茫望未通金闕日淹周柱史碧山雲老漢芝翁烟開青鳥揖金母籌徙滄溟禮木公天澤年來更優渥紫泥黄閣下清風将旦鹽城作忩外驚風颯五更敝衾時覺冽寒生乍囬旅夢聞殘鼓倦寫新詞向短檠斜月半忩餘紙淡踈鐘㡬杵帶霜清十年不為朝鷄擾今聽兒衙報曉聲夏日西莊炎赫西來耽野芳古槐踈栁䕃茅堂破忩不阻南薫細深院常涵宿霧凉茵枕清眠移白日柴門幽啓對滄浪杖藜散歩平沙晚悽送鶺鴒淚萬行時春泉兄新逝南忩晝卧石牀偃仰趂南風忩落閒雲雪倚空一枕清凉三伏外片時仙夢十洲中凌歊歌舞雲飛盡結綺繁華水自東七尺㣲軀滄海上悠然情興老崆峒感蝗六月飛蝗過目頻竒災何事苦斯民天空不斷囬風雪隴際還驚蔽日塵倐作青娥摧緑野旋看赤土泣蒼旻誰将無食悲生計秪有催租愁殺人次韻喜雨阿香驅車海上來白雨跳波雲暗隤靈澤千峰潤枯槁洪泉一息消氛埃荷喧戰劇明珠碎竹凈凉生寒玉堆何幸蒼生迓天錫從開一噱一銜杯明川晴碧横開灧灧春封姨乍息湛天真青㝠聚散孤雲影白鳥微茫落日津烟破不知鎔鑑客月臨擬有弄珠人清光不借銀河色瑩徹靈襟覺日新曉過章臺曉霜驅馬過章臺弱栁依依門半開夢破巫山雲未散香銷鴛被日初囬竹低護犬垂朱箔花落無人掃緑苔滿眼烟花無限恨獨輸劉阮到天台簡吳興謝生康樂清風費夢思敢題凡鳥到門時瑶華日仰今何暮玉樹雲停迥未期半夜絲桐還自貯平生塵榻為誰私碧忩看盡滄溟月寥落燕山濁酒巵雪中趨公半夜紅燈踏雪行北風凛凛玉珂鳴貂裘被體故仍薄羔酒衝寒力己輕千里辛勞成底事一官衰老笑㣲名海邊茅屋何時返金鉔融融睡到明春夜不寐金柝聲殘夜已深鴨爐香灺擁寒衾松根餘雪侵忩冷竹杪頑雲接地隂坐乆虗堂春悄悄夢囬瑣闥夜沉沉無眠不盡山城漏暗送啼鴻過北岑春曉水邊感興曉䇿花驄傍水涯清光何限竟誰知平湖雨霽兼葭緑曲㟁風柔楊栁垂烟渚鷗閒開逸興滄洲春晚負佳期塵埃滿目空奔走衰倦應慚歸去遲次韻李南川覽趙氏山泉啼歇鶯聲午閉關捲簾長晝看春山洞門花落憐風雨石窟泉鳴訝珮環幽景不知辭組去紅塵空自羨人閒相過聊對芳菲醉合釋羈懐頃刻間喜晴封姨夜半驅黒雲羲和海上推朱輪氛埃淨洗碧天闊物色清開𤣥圃新光景無涯輸老眼觴詩有興屬何人迂踈夙媿抽簮末白首紅塵悞此身秋晚孤城秋老欲黄昏扶杖閒堦踏蘚痕芳咀落英來砌畔吟聽促織傍籬根㣲風病葉先投地斜日寒烟半在門詩景滿庭人獨倚飛鴻送盡水南村寄酬陽信董光禄二首燕山鴻鴈惜離羣二十餘年杳未聞緑野可能敦夙好鳯城長憶醉宵分滄溟迢遞勞春夢嶺樹蒼茫送暮雲白髪巳衰空桂結瓊枝何以慰清芬碧筒銜鳯翠屏巖勞山巖名青眼披雲白雪篇風雅曠聞金石韻輝容宛覩玉堂仙東山乆亦從踈放西子那能鬭媚妍醉裏揮毫何以報不成金錯意茫然送丘月林制闋還京故人北上黄金臺烟花春暖滄溟隈荒山人逺不相送仙塵望絶空徘徊十載朝廷慰如渴九天雨露欣重回巖廊擬翼明聖績烟波一竿何快哉聞喜五詠嘉靖乙丑二月念九日慎脩春捷來喜慰存没因遥第其榮恩而五詠之用識草茅之溢慶云飛報㨗音癡兒謬附黄金榜阿祖今酬素日心六紀桂香承杏苑十年雲路到瓊林禹門雷吼蛟龍化魏闕風飛海岱音垂老不知天地報壮懐記取慎清勤臨軒䇿試太平天子肅臨軒廣輯英賢慎采言金殿日明春晝永翠簾烟捲御香翻鳯鸞際運鳴時盛豚犬傾愚答聖恩野叟媿無今日訓早期董賈此迴論臚傳丹陛瑞騰烟靄溢彤庭仙御旌幢拂曙星千載龍飛雲雨合九宵綍下姓名馨黄金臺上天恩渥𤣥錫人間曉夢醒濟濟鳯麟輝日月兒曹忝竊慶周寧宴賜瓊林瓊林賜宴平生慕粲子何知此日榮玉斚碧桃窮日醉宮花緑鬢裊烟輕恩光滄海三千里人在瑶臺十二城遥想逢山歸路晚新郎簫鼔競相迎榮釋褐衣褐衣本自草萊衣聖主登崇革賤㣲野水烟裾迥珮玉雲山芝袖謝牙緋春風文炳於莬變化日儀瞻綵鳯飛一介寵光何所報仲山衮補勉歸依十月初寒圍爐小飲一壺春酒對紅爐十月初寒慰老夫雲影滿忩松影亂雪花㸃地栁花鋪弄孫清夜歌唐句教子彤庭効禹謨一枕遊仙歡賞後樓臺深處擬蓬壺掖邑張南溪老友以趙見亭侍御詩扇見遺用韻寄答二首日攀危磴俯回溪遊賞清樽迥自攜花氣喜涵香靄榭潮聲驚落矗雲堤修篁對酌風前舞好鳥窺人林外啼醉裏狂歌閒裏卧簮裳回首是沙泥衰翁無復志磻溪山海逍遥一杖攜尋話野僧春日寺聽蟬髙栁夕陽堤閒情不遣花空落清賞曽教鳥自啼遥向舊知揮醉筆休教翰苑鄙塵泥趙侍御以翰苑擢也桐隂瑶臺鬱鬱緑生寒淨掃莓苔坐自看日下平鋪金翡翠月明齊上玉欄干來儀擬集丹山瑞戲翦休教紫禁殘老我琴書孤樾下不知冠盖滿長安栁色飜風弄日翠依依逐嵗春妍故不違映渚不隨流水去臨岐常送玉騘歸臺城堤上無興廢陶令門前有是非莫向笛聲怨憔悴好隨烟叟上魚磯竹韻幽響蕭蕭隔座迴秋聲遥送楚湘來驚風滿院清如許度靄閒窻静可猜瓊珮人歸明月下緑琴調合碧雲隈髙齋剰有銜杯趣七子襟懐曠古開蕉聲繁諠庭下卒難收風雨畨畨可自由朱箔不堪雲悄悄緑窻無柰夜悠悠綺羅萃蔡驚初度金石琤鏘聽未休獨倚珊瑚向殘漏不成蝴蝶惱荘周次韻髙雙泉翁登樓寫懐雨霽烟蘿故故凉悠然塵外豈皇皇垂綸適慰依滄海緤馬曽教度太行畫閣捲簾舒逺眺清泉煮茗潤枯腸山人本自無多事酬倡新詩静裏忙慎修以夏曹郎出守維揚經年懐想間書來鬢漸生白因而感賦庭教原來輔聖明十年燕闕又江城嗟予斜日青山暮聞爾秋霜緑鬢生南鴈怪遲滄海信北堂莫慰綵衣情遙知謇謇難為孝不遣書題老淚傾用韻丁丑除夕衰老頭顱盡巳絲挑燈又送臘歸時心慵萬事慙予拙骨隠餘酸秪自知倐去年華憐栢酒㡬迴春色向花期𤣥修巳與靈龜合詎向人間一朶頥用韻書懐三首紅塵回首笑牽絲正爾烟霞放浪時碧水青山如有待好風良月屬相知侯封姜望今非望夀擬安期那可期陶意琴尊從白首不将熊鳥作顛頥髙節桐江慕一絲壮心苦惜暮年時隨珠夜擲多相訝楚璞烟涵㡬見知碧栁自栽棲靖節朱絃欲奏失鍾期危樓惟有滄溟月弄向清風一解頥㝠搜太苦繹蛛絲得意酣歌向暮時花鳥閒情惟我適松篁雅操更誰知名虚蝴蝶湏㬰夢身寄蜉蝣浩漫期事變古今堪大笑悲絲何必淚交頥哭内弟髙介亭二首介亭負俊才尹畿邑之豐潤以覲事殂京邸聞訃哭之一宿中宵隕帝京悲風飛訃過逢瀛傷心迢遞還疑夢淚眼潺湲且未晴英采何歸空抱恨逺書猶在可堪情芙蓉别館塵凡杳腸斷朱絃夜夜聲英才何事委窮塵痛絶清時失鳯麟分桂有情憐帝子種花遺惠哭丘民道旁説易期何夕地下修文是㡬春獨倚東風一相弔知予滄海更何人戊寅新正四日雪中用唐韻一首粉蝶驚春下短墻楊花早㸃鬢邊霜月明迥徹清虚府帝澤先沾緑野堂穠李駭看初嵗艷枯槎猶借一時粧園林是處生春色愁殺窮荒仗節郎已夘新正年登八袠家宴偶成青眼明時八十春白頭竊擬渭濵人青藜不用扶衰骨絳雪何須健老身凰鳯雙偕桃洞乆桂蘭疊見武陵新神仙猶恐虚無迹歡㑹蓬瀛此更真次韻登城樓苦悲塵市上髙樓老眼遥開天際頭絃管雲霄窮晝夜海山今古幾風流汪洋萬里樽前興紫翠千重分外幽一縱豪吟來勝概雅懐曽計末齡遒金井小鋪金井碧粼粼瓊玉參差照眼新花落清防俗客至苔生喜趂緑錢勻月明細浪聲沉夜雨霽如篩淨脱塵醉向晚風從健倒摩挲驚汝莫相嗔七月十二夜幾日煩襟暑不清天街此夕慰凉生翩翩華月隨潮上靄靄青烟抱樹輕露下寒蛩悽四壁風前清漏杳孤城秋堂欲問如何夜竹影依稀石徑横春山學彎新月兩分明春靄連山淡欲盈入室纎蛾曽見嫉隔墻横翠重關情王書不至雙規損黛色初勻八字輕宛度清揚桃扇底怕教心捧更傾城秋波翠湖初落熨晴波明媚秋生奈爾何金鴈月輝珠未穏玉臺雲散鏡初磨霜紅宻意盈盈度銀浦幽情脉脉多幾許清光無限恨姑蘇一瞬罷吳歌哭黄海野妹丈三首可惜仙才黄海翁秋風星隕海山東驚人綵筆原無敵直已清朝本至公湘水不歸蘭蕙老長沙弔去古今同蒼生莫慰當年望横涕滂沱哭上穹逆前韻有懐無路訴蒼穹泉下人間𣺌不同何日化歸華表鶴千年腸斷石城公青山南卧心猶北白髪西沉我尚東終日憶君君我棄空餘殘夢哭山翁錯前韻暮景衰殘爾我同斷雲落日已辭公傷懐問疾虚青簡無計招䰟向碧穹遼海燕山總春夢惠音良晤失佳翁痛君洒盡平生淚淮水無情日夜東自傷二首幻身千古盡凋殘是幾登仙幾湼槃迷境難開千眼相衰顔誰駐九還丹晚來嵗月驚如擲老去情懐澹自酸㝠造不須愁裏誤酒杯端合强追歡同游漸損逝川波病體支離奈老何甲子已週仍有㡬春秋過盛亦無多仙凡枘鑿終難合海岳沈迷豈易磨學道未成雙鬢雪悠悠人事日蹉跎雪中偶書瑤霙萬里逐風回漠漠窮隂冷不開野水氷連龍甲去海山碧浸玉壺來八荒旋作殘年瑞三尺仍餘浩刼灰獨倚老松醒醉眼平原不辨楚王臺人日觀雪青靈乍喜布陽和滕六侵權恣意過漠漠彤雲昏日月皚皚白晝失山河東風欲拂全無力宿莽初萌且奈何老眼仰天開一粲飜飛看作撲燈蛾雪中潘邊二老見枉夜歸有懐黯黯山城暮雪天幽軒解榻集英賢蓬雲寒度潘邠老竹靄清延邊孝先暖玉醲醺醒紫茗博山香散拂朱絃情瀾未竭仙舟放無影月中人不眠首夏雨後曉起列缺奔雲裂海山夜闌雨歇曉開關修篁睡鶴寒烟紫小院無人細草斑啼鳥不來詩興寂落花飛盡酒杯閒蒼苔滿地抱孤悶獨眺滄溟縹𣺌間和穆少春前賜詩扇二首踈狂取笑草鳴蟲豈為幽蘭播遠風曽媿鯉庭無異教悞将䑕璞試良工玉堂綵筆馳聲乆丹桂青雲奕世雄池上鳯毛今不爽海人休説郢人同書翰忘辛擬蓼蟲酒酣隨意灑清風脂鉛不識慚愚婦剞劂無能媿拙工孫廏飛黄來藻鑑薛函結緑際豪雄𤣥珠未必遺滄海此日何堪象罔同和穆少春後賜詩扇二首翰墨齊紈謝鮑才龍門迢遞恨難裁銀盤爛自滄溟吐錦綺新從蜀水來白髪可能承玉唾清風猶慊滌煩埃神交徒爾侵衰暮却幸兒曹侍酒杯抱甕忘機老漢隂詩從鳯沼忽驚心孤髙莫和陽春曲千載俄聞大雅音武庫乍開寒凜凜文虹遙射影沉沉詩豪適快明時覩悔爇猩毫自不禁海壑吟稿巻五
